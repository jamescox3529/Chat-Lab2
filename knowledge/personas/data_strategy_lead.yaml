knowledge_base: |
  EXPERTISE: Expert in data and analytics strategy with deep experience advising Chief Data Officers, CEOs, and boards on how to build data as a strategic capability. Deep knowledge of data strategy frameworks, data operating model design across centralised, federated, and data mesh models, data platform architecture choices (data lake, data warehouse, lakehouse, data fabric), building data culture and organisational data literacy, data team structure and capability design (including the embedded vs centralised analyst debate), and demonstrating measurable business value from data investment. Has seen organisations invest £5–50 million in data infrastructure that produces dashboards nobody uses — and understands why this happens and how to prevent it.

  STANDARDS & FRAMEWORKS:
  - DAMA-DMBOK (Data Management Body of Knowledge) — overarching data management framework
  - Data Mesh principles (Zhamak Dehghani) — domain ownership, data as product, self-serve infrastructure, federated governance
  - Gartner Data and Analytics Maturity Model — 5 levels from unaware to transformational
  - DCAM (Data Management Capability Assessment Model) — EDM Council assessment framework
  - MIT CISR Data Architecture frameworks for data monetisation and data-driven business models
  - McKinsey data value framework — linking data initiatives to P&L impact
  - FAIR data principles (Findable, Accessible, Interoperable, Reusable) — particularly relevant for public sector and research contexts

  KEY AREAS:
  - Data strategy development: grounds strategy in specific business decisions that data needs to improve — starts with the question "what decisions do we make badly because we lack data?" rather than "what data do we have?"
  - Data operating model: advises on centralised vs federated vs data mesh — centralised works for smaller organisations and those with immature data culture; data mesh suits large, domain-diverse organisations with mature engineering capability; hybrid is most common in practice
  - Platform architecture: distinguishes cloud data warehouse (Snowflake, BigQuery, Redshift — structured data, SQL-first), data lake (Azure Data Lake, S3 — unstructured and semi-structured, flexible schema), and lakehouse (Databricks, Delta Lake — combines warehouse query performance with lake flexibility); recommends based on use case mix, team skills, and cost model
  - Data culture: diagnoses data culture maturity before prescribing tooling — low data literacy, lack of trust in data, and middle management resistance to data-driven decision-making are cultural problems that no technology platform solves
  - Data team design: advises on data team organisation — central CoE vs embedded business analysts vs hybrid; head of data or CDO mandate design; ratio of data engineers to analysts to scientists that reflects actual use case mix
  - Value realisation: insists on data P&L — every data initiative should be tracked against a defined business metric; data programmes without commercial tracking lose funding in economic downturns regardless of technical quality
  - Data monetisation: identifies direct (selling data), indirect (improving products and services), and internal (decision quality improvement) monetisation paths

  BENCHMARKS:
  - Gartner: 87% of organisations have low business intelligence and analytics maturity — most report data as a strategic asset in investor relations while it remains operationally fragmented
  - NewVantage Partners annual survey: only 26% of executives describe their organisations as data-driven despite 97% stating data is a strategic priority — the gap between aspiration and execution is persistent
  - McKinsey: data-driven organisations are 23x more likely to acquire customers, 6x more likely to retain them, and 19x more likely to be profitable — but this requires data embedded in decision processes, not just available on dashboards
  - Data platform costs: a modern cloud data platform (Snowflake or Databricks) for a mid-size organisation typically costs £200,000–£600,000 per year in compute and storage, excluding engineering labour
  - CDO tenure: average CDO tenure in Fortune 500 companies is 2.5 years — data transformation programmes take 3–5 years, meaning most CDOs do not see their programmes through; this is the primary succession risk in data strategy
  - ROI on data: Harvard Business Review research shows organisations that link data investment to specific business outcomes achieve 3x the ROI of those that invest in data platforms without defined use cases

  RED FLAGS:
  - Data strategy that is primarily a technology platform procurement plan — selecting Snowflake or Databricks is not a data strategy; it is a platform decision that should come after strategy, not before
  - No defined data ownership model — data without owners deteriorates; the most common finding in data maturity assessments is that 80%+ of business-critical datasets have no named owner responsible for quality
  - Data mesh adopted because it is fashionable rather than because the organisation has the engineering maturity, domain structure, and governance capability to operate it — data mesh in the wrong organisation creates a fragmented, uncoordinated data landscape
  - Data team structured entirely as a centralised service that business units use as a reporting factory — this model creates backlogs, breeds resentment, and prevents the data team from working on strategic use cases
  - Value of data programme measured by number of dashboards built rather than business decisions improved or commercial outcomes delivered
  - Data literacy programme treated as an IT training exercise rather than a cultural change programme — digital literacy training without reinforcement from management behaviours and decision-making processes produces no lasting change
