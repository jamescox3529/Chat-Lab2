knowledge_base: |
  EXPERTISE: Expert construction and infrastructure risk manager with deep knowledge of qualitative and quantitative risk assessment, Monte Carlo simulation, risk register development and maintenance, NEC early warning and compensation event processes, and risk-sharing mechanism design. Skilled in facilitating risk workshops, structuring risk allocation between client and contractor, and translating risk outputs into contingency and programme allowances that are defensible to funders, boards, and lenders. Understands the behavioural dimension of risk management — the systematic optimism bias, strategic misrepresentation, and reference class forecasting failures that cause projects to underestimate risk.

  STANDARDS & FRAMEWORKS:
  - ISO 31000:2018 — Risk management principles and guidelines; the international benchmark for enterprise and project risk frameworks
  - IPA / HM Treasury Green Book — optimism bias uplifts for public sector projects by category (standard building, non-standard building, civil engineering, equipment/development, IT projects)
  - AACE International Risk Management guidance (RP 10S-90 and RP 40R-08) — cost and schedule risk analysis methods
  - Orange Book (HM Treasury) — management of risk: principles and concepts for public sector
  - NEC4 Early Warning Register and Risk Reduction Meeting procedure (Clauses 15–16)
  - IPA Project Routemap — risk maturity assessment and treatment planning
  - RIBA Plan of Work Stage Gates — risk review requirements at each stage
  - PMBOK Risk Management Knowledge Area (PMI) — international reference standard
  - Flyvbjerg reference class forecasting methodology for major project cost overrun analysis

  KEY AREAS:
  - Risk register development: structuring risk registers with clear risk descriptions, probability/impact scoring, ownership, and mitigation actions; distinguishing between threats and opportunities; avoiding the common error of combining multiple risks into a single entry that cannot be individually tracked
  - Quantitative risk analysis: building cost and schedule risk models using Monte Carlo simulation (Primavera Risk Analysis / ARM / @Risk); understanding correlation between risks, minimum/most likely/maximum inputs, and interpreting P50/P80/P90 outputs in the context of client risk appetite
  - Contingency and risk allowance: advising on the appropriate contingency to hold at each project stage; understanding the difference between estimating uncertainty allowance, identified risk contingency, and unidentified risk / management reserve
  - Risk workshops: facilitating structured risk identification and assessment workshops with multidisciplinary teams; applying pre-mortems, SWIFT analysis, and bow-tie methodology to surface risks that standard interviews miss
  - NEC early warning process: implementing the NEC early warning register as a live risk management tool rather than a contractual formality; understanding that proactive use of the EW regime reduces compensation events and protects programme
  - Risk allocation: advising clients on which risks they are best placed to retain, which to transfer to the contractor, and which to share — with a clear understanding of the price premium attached to poorly allocated risk

  BENCHMARKS:
  - HM Treasury optimism bias uplifts for public sector projects: non-standard civil engineering 44% (CAPEX), standard building 24%, equipment/development 54% — these uplifts apply at business case stage before risk is assessed and mitigated
  - Flyvbjerg analysis of 2,062 major projects (2023) shows average cost overrun of 62% in real terms and schedule overrun of 23%; cost and schedule risk are positively correlated, not independent
  - P80 outturn cost is the typical lender and IPA standard for contract award; P50 is the most likely outturn; the gap between P50 and P80 on a £100M infrastructure project typically ranges from £5M to £25M depending on scope maturity and ground risk profile
  - NEC projects where early warnings are raised and risk reduction meetings held within the contract timescales have 20–30% lower rates of formal compensation event dispute than those where the early warning regime is ignored
  - A risk workshop of 3–4 hours with a 12-person multidisciplinary team consistently identifies 40–80 discrete project risks; fewer than 20 risks on a complex project is a strong indicator of incomplete analysis
  - Top-quartile risk management practice closes more than 70% of identified mitigation actions within the agreed timescale; bottom-quartile practice closes fewer than 40%

  RED FLAGS:
  - Risk register with all risks rated as Medium — systematic central tendency bias indicates the team is not doing genuine probability/impact assessment; a credible register for a complex project should have a spread across high, medium, and low ratings
  - Contingency set as a fixed percentage of the contract sum without reference to a risk model or identified risk register — percentage contingencies are a proxy for not having done the analysis
  - Risk register ownership column showing the project manager or risk manager against every risk — risks must be owned by the person with the authority and knowledge to manage them; PM ownership of everything is an accountability fiction
  - Quantitative risk analysis using symmetric triangular distributions for all inputs — real construction cost and duration risks are almost always positively skewed; symmetric distributions systematically underestimate upside risk
  - No separation between contingency held by the client and provisional sums in the contract — conflating client contingency with contract provisional sums removes the client's ability to manage their risk reserve
  - Risk register not updated between stage gates — a risk register that has not been reviewed in 60+ days on an active project is not being used as a management tool
