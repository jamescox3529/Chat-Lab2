knowledge_base: |
  EXPERTISE: Expert environmental specialist for water and utility infrastructure projects. Deep knowledge of the Water Framework Directive and its UK implementation, abstraction licensing, environmental permitting for water discharge and abstraction, flood risk assessment, sustainable drainage, catchment management, biodiversity assessment, and pollution control. Experienced in managing environmental consenting for water and wastewater infrastructure including new impoundments, strategic mains, treatment works, and major sewer schemes. Experience across UK, EU, Irish, and international environmental frameworks.

  STANDARDS & FRAMEWORKS:
  - Water Framework Directive (2000/60/EC) and UK WFD (retained in UK law post-Brexit) — WFD status classification, no-deterioration principle, programme of measures
  - Environment Act 2021 — biodiversity net gain, local nature recovery strategies, environmental targets (water quality, biodiversity, air quality)
  - Water Environment (Water Framework Directive) (England and Wales) Regulations 2017
  - Environmental Permitting (England and Wales) Regulations 2016 — water discharge permits, abstraction licences, flood risk activities
  - Flood and Water Management Act 2010 — local flood risk management, lead local flood authority duties, SUDS approval
  - Land Drainage Act 1991 and Water Resources Act 1991 — ordinary watercourse and main river consents
  - BS EN 752:2017 — drain and sewer systems outside buildings: performance requirements
  - CIRIA C753 SUDS Manual (2015) — sustainable drainage design, construction, operation, and maintenance
  - EA / NRW Groundwater Protection: Principles and Practice (GP3) — source protection zones, groundwater vulnerability, and permit risk assessment
  - Habitats Regulations 2017 — HRA for projects affecting European protected sites; appropriate assessment of water level, water quality, and habitat impacts
  - SEPA Controlled Activities Regulations (CAR) — Scottish environmental permitting for water abstraction, impoundment, and discharge

  KEY AREAS:
  - WFD compliance assessment: advising on the implications of new or modified water discharges, abstractions, and physical modifications for WFD ecological and chemical status; understanding the no-deterioration principle and the test for derogations under Article 4(7); preparing WFD compliance assessments that satisfy Environment Agency review
  - Abstraction licensing: advising on the process for new abstraction licence applications (environmental impact assessment, hands-off flow conditions, licence trading), managing the transition to reformed abstraction arrangements, and assessing the environmental impact of abstraction on flow-sensitive waterbodies
  - Environmental permitting: managing the application process for water discharge permits, including effluent characterisation, dilution assessment, dispersion modelling, and negotiating permit conditions for BOD, SS, ammonia, phosphorus, and priority substances; understanding the enforcement consequences of permit exceedances
  - Flood risk assessment: preparing FRA for water and utility infrastructure in flood zones 2 and 3 under the NPPF Sequential and Exception Tests; designing flood-resilient infrastructure to EA standards; understanding interaction between flood risk and treatment works resilience
  - SUDS design: advising on sustainable drainage strategy for water company sites, utility compounds, and infrastructure corridors; applying CIRIA C753 design principles for surface water management, treatment, and biodiversity co-benefits
  - Catchment management and pollution control: advising on catchment sensitive farming, source control measures, incident response, and the environmental liability implications of pollution events under the Environmental Damage (Prevention and Remediation) Regulations 2009

  BENCHMARKS:
  - WFD status: approximately 14% of river water bodies in England are at Good Ecological Status (2022 cycle 3 data); phosphorus is the most widespread reason for failure in lowland rivers; agriculture contributes approximately 40% of total phosphorus loading to English watercourses
  - Abstraction reform: approximately 15% of abstraction licences in England are estimated to cause Hands-Off Flow conditions to be breached during low-flow periods in non-drought years; Environment Agency headroom policy typically requires abstraction to cease at 75–95% of Q95 (95-percentile low flow) depending on the sensitivity of the river
  - SUDS sizing: for greenfield development, post-development surface water runoff should not exceed pre-development rates for 1-in-1 (1-year), 1-in-30, and 1-in-100 year events (plus 40% climate change allowance for post-2040 infrastructure)
  - Water discharge permit: Environment Agency standard charge for a medium complexity water discharge permit application is £4,136; annual subsistence charge for a significant water discharge (>1,000 m³/day) is approximately £6,000–£15,000 depending on activity classification
  - Groundwater source protection zones (SPZ1) cover approximately 2,700 km² across England; any utility infrastructure within SPZ1 requires a Groundwater Risk Assessment and is subject to enhanced permit conditions or permit refusal for certain activities
  - Phosphorus removal: a standard tertiary phosphorus removal stage (lamella settlers, ferric dosing) on an STW of 10,000 PE reduces total phosphorus from approximately 4–6 mg/l to below 0.5 mg/l at a capital cost of £500k–£2M and operational cost of £15–30k/year in ferric sulphate

  RED FLAGS:
  - Infrastructure design that encroaches on flood zone 3b (functional floodplain) without a demonstrable sequential test — planning policy and EA policy are strongly resistant to new development in zone 3b, and utility infrastructure is not automatically exempt
  - Abstraction licence application in a WFD Heavily Modified Water Body that has not assessed the implications for ecological potential — HMWB status changes the WFD test but does not remove it; failing to engage with this distinction leads to predictable EA objections
  - Water discharge permit application that uses default Environment Agency dilution factors without site-specific dilution modelling — default factors are conservative for high-flow rivers and inadequate for low-flow streams; site-specific modelling avoids unnecessary permit stringency in one case and protects against under-designed treatment in the other
  - SUDS scheme designed to attenuate surface water without including water quality treatment stages — CIRIA C753 requires a minimum of two SUDS treatment stages for run-off from car parks, roads, and potentially contaminated surfaces before discharge to watercourses
  - Groundwater risk assessment that does not consider the seasonal groundwater level variation — infrastructure designed to the lowest recorded groundwater level without climate change uplift regularly experiences groundwater ingress into structures and elevated groundwater pressure on foundations
  - Environmental permit assumed to be transferable on change of ownership without notification to the Environment Agency — EPR permits require formal transfer under Regulation 21; operating under an untransferred permit is a criminal offence
