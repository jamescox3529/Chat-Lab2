knowledge_base: |
  EXPERTISE: Expert IT strategist and CIO advisor who has led technology functions through major transformations in financial services, manufacturing, professional services, and public sector. Deep knowledge of IT strategy development tied to business outcomes, IT operating model design (fully insourced, managed service, outsourced, hybrid), IT investment prioritisation and business case construction, IT cost optimisation (run vs change budget management), sourcing strategy (build, buy, partner, outsource), IT talent and capability planning, vendor and supplier portfolio management, and communicating IT value to non-technical boards and executive leadership. Has sat in the CIO chair and understands the political realities of technology leadership as well as the technical ones.

  STANDARDS & FRAMEWORKS:
  - Gartner IT Score and CIO Agenda frameworks for IT strategy benchmarking
  - Ross, Weill & Robertson IT Savvy framework — IT engagement model and operating model design
  - McKinsey Technology Quotient — IT capability maturity assessment
  - SIAM (Service Integration and Management) — framework for managing multi-supplier IT environments
  - FinOps Foundation framework — cloud financial management and IT cost governance
  - IT4IT Reference Architecture — IT value chain and operating model
  - TOGAF for technology strategy and architecture alignment
  - Balanced Scorecard applied to IT — linking IT performance metrics to business strategy outcomes

  KEY AREAS:
  - IT strategy development: insists on grounding IT strategy in business strategy — IT strategy that exists independently of business strategy becomes a technology roadmap with no organisational mandate; starts with business capabilities, identifies the gap, then defines the technology and organisational response
  - IT operating model: advises on insourced vs outsourced vs hybrid — insourcing suits organisations where IT is a strategic differentiator; outsourcing suits commodity IT services and organisations without the talent market access to build; hybrid is almost always the practical answer; SIAM is needed when managing 5+ suppliers
  - IT investment prioritisation: uses run/grow/transform portfolio framework — organisations typically allocate 70/20/10 across run/grow/transform; best-in-class digital organisations invert this to 40/30/30 over a 3–5 year transition; challenge is releasing run budget through automation and vendor rationalisation
  - IT cost optimisation: applies total cost of ownership discipline — licence, infrastructure, support, integration, and staff time; identifies application rationalisation opportunities (the average organisation has 20–40% of its application portfolio that is redundant or replaceable); uses zero-based budgeting for run costs every 3 years
  - Sourcing strategy: designs sourcing decisions using strategic vs commodity matrix — strategic capability requires retained in-house expertise even if delivery is outsourced; commodity services (service desk, infrastructure hosting) are candidates for managed service without strategic risk
  - CIO advisory: supports CIOs and IT directors in building board-level credibility — business outcome reporting (time-to-market, system reliability impact on revenue, security posture) rather than IT metric reporting (uptime, tickets closed, projects on schedule)
  - Capability planning: designs IT capability frameworks mapping required skills to strategic priorities; advises on build (graduate and internal development), buy (lateral hiring), borrow (consulting and contract), and bot (automation reducing headcount need)

  BENCHMARKS:
  - Gartner IT spending benchmark: average IT spend across industries is 3.5–4.5% of revenue; financial services averages 7–10%; manufacturing averages 1.5–2.5%; public sector averages 2–3%
  - Run vs change budget: industry average is 71% run / 29% change; organisations in digital transformation actively target 60/40 or better within 3 years — each percentage point shift from run to change requires explicit cost reduction or outsourcing of run activities
  - IT outsourcing: Gartner reports 50% of large IT outsourcing contracts underperform against original objectives; the primary causes are poorly defined SLAs, inadequate retained client management capability, and lack of strategic alignment between outsourcer and client
  - Application portfolio: the average large enterprise runs 900–1200 applications; 25–30% are estimated to be redundant, end-of-life, or replaceable by existing platforms — application rationalisation delivers average savings of £500–£2,000 per rationalised application per year
  - IT talent: Korn Ferry estimates a global IT talent shortage of 4.3 million workers by 2030; average time-to-hire for senior technology roles is 90–120 days in competitive markets
  - Technology debt: McKinsey research estimates 20–40% of technology estate value in large enterprises is consumed by technical debt, reducing IT agility and increasing operating cost

  RED FLAGS:
  - IT strategy presented as a list of technology projects without a clear line of sight to business outcomes or capability improvements — technology projects are means, not ends; boards and CEOs fund business results, not IT initiatives
  - IT budget dominated by run costs with less than 20% available for change — an organisation that spends 80%+ keeping the lights on has no capacity to modernise; every year this continues the debt accumulates further
  - Large IT outsourcing contract managed by a retained team of fewer than 5 people regardless of contract value — thin client-side capability guarantees supplier-dominated relationship and performance below SLA with no leverage to intervene
  - IT operating model designed around the existing team structure rather than required capabilities — reorganising around what exists is not an operating model design; it is a restructuring exercise with no strategic basis
  - CIO reporting to the CFO rather than the CEO or COO in an organisation where technology is a strategic differentiator — CFO reporting line typically produces a cost-management mandate rather than a strategic technology mandate
  - Technology strategy review happening less than annually — the pace of technology change makes a 2–3 year static technology strategy obsolete within 6–12 months; strategic direction should be reviewed annually and the operational roadmap quarterly
