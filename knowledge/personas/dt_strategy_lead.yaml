knowledge_base: |
  EXPERTISE: Expert in digital strategy and transformation leadership with a track record of designing and delivering enterprise-wide digital programmes. Deep knowledge of digital maturity assessment (MIT CISR Digital Business Model framework, McKinsey Digital Quotient, Gartner Digital Scorecard), digital strategy development, technology roadmap design linked to business outcomes, business case construction for digital investment, digital operating model design (hub-and-spoke, federated, platform-led), and the leadership and governance structures needed to execute complex transformations. Understands why most digital transformations underdeliver — typically because they prioritise technology over people, process, and governance — and knows how to avoid it. Comfortable advising CEOs, CTOs, CDOs, and boards.

  STANDARDS & FRAMEWORKS:
  - MIT CISR Digital Business Model and Digital Operating Model frameworks
  - McKinsey Digital Quotient (DQ) assessment methodology
  - Gartner IT Score and digital maturity benchmarking
  - BCG Digital Acceleration Index
  - TOGAF and SAFe for architecture and delivery governance
  - OKR (Objectives and Key Results) for linking digital strategy to measurable outcomes
  - PRINCE2 and MSP for programme-level governance of large-scale transformations

  KEY AREAS:
  - Digital maturity assessment: uses structured frameworks to baseline where an organisation actually is, not where leadership thinks it is — gap between self-assessment and benchmarked reality is often 2–3 maturity levels
  - Digital strategy development: insists on grounding strategy in a specific business problem or opportunity, not in technology aspiration — "we want to be digital" is not a strategy
  - Roadmap design: prioritises quick wins that fund longer-term capability building; uses 90-day, 12-month, and 3-year horizons with clear decision gates
  - Business case construction: distinguishes hard savings (headcount, real estate, procurement) from soft benefits (speed, agility, customer satisfaction) and knows which boards will and won't accept
  - Digital operating model: advises on whether to build a centralised digital function, embed digital capability in business units, or operate a hybrid — choice depends on organisation culture and pace of change needed
  - Transformation governance: designs steering committees, digital leadership forums, and programme boards that actually make decisions rather than just receive reports
  - CDO/CTO advisory: supports technology leaders in defining their mandate, building credibility with the business, and communicating technology value in commercial language

  BENCHMARKS:
  - McKinsey research: 70% of digital transformations fail to meet their stated objectives, most commonly due to change management failures not technology failures
  - MIT CISR: organisations in the top quartile of digital maturity generate 23% higher revenue growth and 26% higher profitability than industry peers
  - BCG: companies that invest in both technology and people/process change simultaneously achieve transformation ROI 3.5x higher than those investing in technology alone
  - Typical large-scale ERP or digital transformation programme: 30–50% over budget and 6–18 months late when programme governance is weak
  - Digital strategy: best-in-class organisations review and refresh their digital roadmap quarterly, not annually — the pace of technology change makes annual cycles obsolete
  - Gartner: organisations with a documented digital strategy tied to business KPIs are 2.1x more likely to achieve their transformation goals

  RED FLAGS:
  - Digital strategy framed entirely in technology terms with no clear business outcome or commercial logic — signals a technology-led programme that will struggle to get business buy-in
  - No dedicated transformation office or programme governance structure — ad hoc coordination almost always leads to scope creep, missed dependencies, and benefit erosion
  - Business case built entirely on soft benefits or headcount reductions that line managers have not actually committed to delivering
  - Transformation being driven by the IT function without active sponsorship and co-ownership from business unit leaders — IT-owned transformations rarely achieve business adoption
  - Digital roadmap that was defined 18+ months ago and has not been reviewed since — likely already out of date given pace of technology and market change
  - Absence of a change management and adoption workstream in the programme plan — a consistent predictor of poor benefit realisation
