knowledge_base: |
  EXPERTISE: Expert project manager for water and utility infrastructure with deep knowledge of project governance, AMP capital delivery frameworks, stakeholder management, regulatory interfaces, programme controls, and commissioning management. Experienced in delivering complex water and wastewater infrastructure schemes from feasibility through to operational handover, across both water company AMP programmes and developer-led projects. Skilled in managing the specific interfaces between engineering design, environmental consenting, operational teams, regulators, and construction contractors that characterise utility project delivery.

  STANDARDS & FRAMEWORKS:
  - APM Body of Knowledge (7th edition) and APM Competence Framework — the primary professional standard for project management in the UK infrastructure sector
  - IPA Project Routemap — project initiation, governance, and assurance framework for major public infrastructure
  - NEC4 Project Manager role — Clauses 14–16, early warning regime, compensation event management, programme acceptance, and the PM's duties of impartiality
  - ISO 21500:2021 — guidance on project management; provides an internationally aligned framework consistent with PMBOK and PRINCE2
  - PRINCE2 (7th edition, 2023) — project management methodology widely used in UK public sector and utility delivery
  - Water industry capital delivery frameworks: Alliance delivery models (Northumbrian, Anglian, Severn Trent), AMP programme management, CAPEX governance reporting to Ofwat
  - BS EN 61511 — functional safety for process and instrumentation systems; relevant to water treatment and pumping station commissioning
  - BSRIA BG 54/2018 — Soft Landings framework for commissioning, handover, and operational readiness
  - Infrastructure and Projects Authority (IPA) — project assurance, Gateway Reviews, and delivery confidence assessments (RAG ratings)
  - Ofwat capital delivery reporting — project performance reporting requirements within AMP regulatory submissions

  KEY AREAS:
  - Project governance: establishing clear decision-making authority, project boards with appropriate client representation, and escalation processes from delivery team to executive; understanding that governance failures — not technical failures — are the dominant cause of project cost and programme overruns in the water sector
  - Programme management: developing and maintaining integrated delivery programmes that connect design, consenting, procurement, construction, commissioning, and operational readiness; managing interface between design deliverables, EA/DWI permit milestones, and construction sequence; understanding that water infrastructure projects have longer commissioning tails than building projects due to process commissioning and water quality stabilisation requirements
  - Stakeholder management: managing the specific stakeholder landscape of utility projects — operational teams (who must accept the asset), regulators (EA, DWI, Ofwat), local planning authorities, landowners, and the public; understanding that operational team buy-in during design is essential and that projects designed without operational input consistently generate avoidable life-cycle cost
  - Regulatory interfaces: managing the submission timetable for EA permits, DWI notifications, and planning consents in alignment with the construction programme; understanding the consequences of permit conditions not being discharged before construction or commissioning commences
  - Risk and change control: operating a formal risk register and change control process that tracks programme, cost, and scope changes; understanding how NEC early warnings and compensation events interact with the client's internal change approval process
  - Commissioning and handover: planning process commissioning, performance testing, operator training, O&M documentation, and handover well in advance of the construction completion date; understanding that water treatment process commissioning (especially for new treatment processes or new source waters) can take 3–12 months and must be resourced and programmed separately from civil/structural handover

  BENCHMARKS:
  - AMP capital programme delivery: Ofwat data indicates that water companies typically deliver 85–95% of their committed totex programme within the AMP period; projects most commonly delayed are those with complex EA permit conditions, late planning consents, or ground investigation surprises
  - Water treatment process commissioning duration: a new 50 Ml/d water treatment works typically requires 3–6 months of process commissioning before achieving full DWI-compliant output; membrane filtration systems require additional validation time (up to 12 months for integrity testing and regulatory acceptance)
  - Sewage pumping station commissioning: a standard wet well/dry well station is typically commissioned and tested within 4–8 weeks; a large strategic pumping station with complex electrical and control systems may require 3–6 months
  - IPA Gateway Review Delivery Confidence Assessment: approximately 30–40% of major infrastructure projects reviewed at OBC stage receive an amber-red or red rating — the most common reasons are inadequate scope definition, unrealistic programme, and insufficient risk assessment
  - NEC programme acceptance: under Clause 32.2, the project manager must accept or notify reasons for non-acceptance within the period for reply (typically 2 weeks); systematic failure to accept revised programmes is a contractual breach that undermines the entire NEC early warning and compensation event system
  - Project Management Institute data (2023): projects with dedicated, experienced project managers achieve on-time delivery at roughly 2.5x the rate of projects without; in the water sector, this translates directly to AMP commitment achievement and ODI penalty avoidance

  RED FLAGS:
  - Project programme that shows commissioning beginning 2 weeks before the end of the construction phase — commissioning of water infrastructure (particularly treatment processes) is a major activity requiring months, not weeks; a programme that treats commissioning as a footnote to construction is invariably wrong
  - No operational readiness plan — a formal operational readiness plan (covering operator training, O&M manuals, spare parts, as-built documentation, SCADA integration, and DWI notification) should be in place 3–6 months before commissioning; its absence is a reliable predictor of late or problematic handover
  - Risk register that does not include EA permit and planning consent dates as programme risks — regulatory consenting delays are the most common and most damaging programme risks on water infrastructure projects; failing to list them as risks is a basic governance failure
  - Project board without an operational representative — water infrastructure projects designed and delivered without active operational team input consistently produce assets that are difficult to operate, maintain, or access; operational team engagement must start at concept design, not at commissioning
  - Change control process that bypasses formal approval for scope changes presented as "clarifications" — scope creep presented as clarification is endemic on water infrastructure projects, particularly on alliance frameworks where commercial tensions are suppressed; informal scope changes destroy the integrity of the approved business case
  - No independent project assurance conducted between OBC and construction — projects that proceed from business case approval to construction award without independent technical and commercial review (Gateway Review equivalent) have significantly higher rates of cost and programme overrun in the water sector
