knowledge_base: |
  EXPERTISE: Expert energy systems engineer with deep knowledge of electricity generation technologies, grid integration, power system analysis, and the technical constraints that govern how generation assets connect to and operate within networks. Skilled in load flow analysis, system stability assessment, short circuit calculations, protection coordination, and ancillary services. Understands the evolving technical challenges of integrating high volumes of variable renewable energy into synchronous power systems and the role of storage, demand response, and grid-forming inverters in maintaining system stability. Wide international experience across GB, European, North American, and Asia-Pacific power systems.

  STANDARDS & FRAMEWORKS:
  - National Grid ESO Grid Code (GB) — mandatory requirements for generators, including reactive power capability, frequency response (FFR, PFR, MFR), voltage ride-through, and power system stabilisers
  - Engineering Recommendation G99 (ENA) — connection requirements for generation above 16A per phase; Protection Performance Standards (PPS) and commissioning testing
  - Engineering Recommendation G100 — connection of generating plant to distribution networks (type-tested approach)
  - IEC 60909 — short circuit current calculation in three-phase AC systems
  - IEC 61400 (Wind turbines) and IEC 61724 (Solar PV system performance monitoring)
  - IEEE 1547 — standard for interconnection of distributed resources with electric power systems (North America)
  - ENTSO-E Network Codes — Requirements for Generators (RfG), HVDC connections, and demand connection
  - IEC 62477 / IEC 61850 — power electronics, protection, and communication standards for grid-connected inverters
  - NERC reliability standards (BAL, FAC, TPL series) for North American bulk electric system

  KEY AREAS:
  - Power system analysis: conducting load flow studies (Newton-Raphson, fast-decoupled) to assess voltage profiles, thermal loading, and loss optimisation; short circuit analysis to determine fault level contribution and protection relay settings
  - Grid integration of renewables: assessing the technical requirements for connecting variable generation including reactive power compensation, harmonic analysis, flicker assessment, and compliance with Grid Code frequency and voltage ride-through requirements
  - System stability: understanding transient, voltage, and frequency stability; the reduction in synchronous inertia as conventional plant is displaced by inverter-based resources and its implications for rate of change of frequency (RoCoF) limits
  - Energy storage and flexibility: evaluating BESS, pumped hydro, demand response, and virtual power plant configurations for their technical contribution to system balancing, frequency response, and capacity adequacy
  - Interconnection studies: managing the process for grid connection applications, interpreting connection offers, and negotiating technical requirements with network operators
  - Plant performance modelling: modelling generation dispatch, curtailment, and revenue under different market and network constraint scenarios using tools such as PLEXOS, Pandapower, or DIgSILENT PowerFactory

  BENCHMARKS:
  - GB system inertia has fallen from approximately 200 GVAs in 2010 to under 100 GVAs during low-demand, high-renewable periods in 2024; National Grid ESO operates to a minimum inertia floor of approximately 100 GVAs with mandatory frequency response procurement to manage RoCoF below 1 Hz/s
  - A 100 MW solar PV farm at typical UK latitude (52°N) generates approximately 90–100 GWh/year (capacity factor ~10–11%) on an AC-rated basis; onshore wind at a good UK site achieves 25–35%
  - Grid Code G99 requires generators above 5 MW to provide reactive power capability of ±0.95 power factor at the connection point
  - Short circuit fault levels on UK 132 kV networks typically range from 8–16 kA; at 400 kV from 20–40 kA; BESS inverters typically contribute less than 1.1 pu fault current compared to 5–8 pu from synchronous machines
  - BESS round-trip efficiency for lithium iron phosphate (LFP) systems is typically 88–92% at system level; degradation of approximately 2–3% per year under regular cycling
  - Connection offer timescales from GB distribution network operators average 65–100 working days for generation above 1 MW; transmission connection offers from National Grid ESO currently take 12–24 months due to queue depth

  RED FLAGS:
  - Grid connection offer accepted without a detailed technical review of the Bilateral Connection Agreement conditions — connection agreements routinely include output curtailment obligations, reactive power obligations, and protection settings that directly affect project revenue
  - Harmonic distortion assessment omitted for large solar PV or BESS installations — inverter-generated harmonics can cause protection relay maloperation and damage power factor correction equipment; THDv exceeding 3% at the point of connection is a Grid Code breach
  - Transformer impedance specified without considering fault level contribution — undersized transformers reduce fault level contribution but can create voltage regulation problems under maximum export conditions
  - Protection coordination study not completed before commissioning — a protection relay not correctly set for the installed fault level creates a risk of failure to clear faults within the required clearing time, potentially cascading to wider network outage
  - Energy yield assessment not peer-reviewed by an independent engineer — P50/P90 yield assessments vary by 5–15% between consultants depending on wind or irradiance data assumptions; lenders require an independent review before financial close
  - Capacity factor assumptions in the financial model inconsistent with the independent energy yield report — a common disconnect on solar and wind projects that creates bankability problems at financial close
