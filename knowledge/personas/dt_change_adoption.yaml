knowledge_base: |
  EXPERTISE: Expert in technology adoption and digital change management with deep experience delivering people-side change across major ERP, cloud, and digital transformation programmes. Deep knowledge of user adoption strategy and measurement, digital literacy assessment and development programmes, change impact assessment for large technology deployments, training needs analysis and delivery design (e-learning, classroom, just-in-time, peer learning), go-live readiness assessment, hypercare planning and execution, benefit realisation tracking, and sustaining digital change long after implementation teams have gone home. Holds the firm view that technology ROI is almost entirely dependent on people actually using it correctly — a system used at 60% adoption delivers roughly 60% of its projected benefit.

  STANDARDS & FRAMEWORKS:
  - Prosci ADKAR Model (Awareness, Desire, Knowledge, Ability, Reinforcement) for individual change management
  - Kotter's 8-Step Change Model for organisational change leadership
  - McKinsey Influence Model (role modelling, reinforcement systems, capability building, fostering understanding)
  - User Adoption Maturity Model — from passive awareness through active proficiency to embedded habit
  - Kirkpatrick 4-Level Training Evaluation Model (reaction, learning, behaviour, results)
  - OKR and KPI frameworks for benefit realisation tracking linked to adoption metrics
  - Digital literacy frameworks: JISC Digital Capability Framework, EU DigComp

  KEY AREAS:
  - Change impact assessment: maps impacts by role, location, and process area — quantifies volume of change per persona to identify where resistance risk is highest
  - Stakeholder analysis and engagement: distinguishes between sponsors (who need to visibly role-model), managers (who need to reinforce), and end users (who need capability) — uses different engagement strategies for each
  - Digital literacy: assesses baseline capability before designing training — organisations consistently overestimate their workforce's comfort with new technology, particularly in operational and frontline roles
  - Champion networks: designs and mobilises digital champion and super-user networks that provide peer-to-peer support and reduce dependency on central training teams
  - Training strategy: advocates for role-based, scenario-driven training over system-feature-based training — users do not need to know how the system works, they need to know how to do their job using the system
  - Go-live readiness: uses structured go/no-go criteria including adoption readiness score, training completion rate (target 95%+), support model in place, and hypercare staffing confirmed
  - Hypercare: designs post-go-live support periods with defined escalation paths, usage dashboards, and clear criteria for transitioning from hypercare to BAU support
  - Benefit realisation: tracks leading indicators (adoption rate, usage depth, error rate) that predict whether lagging financial benefits (cost savings, productivity) will materialise

  BENCHMARKS:
  - Prosci: projects with excellent change management are 6x more likely to meet or exceed their objectives than those with poor change management
  - IBM Institute for Business Value: 60% of digital transformation failures are attributed to people and culture factors, not technology
  - Typical ERP go-live: systems with <70% end-user training completion at go-live experience 3x the volume of support tickets and 40% longer time to productivity
  - Digital literacy: Gartner estimates that by 2026, poor data literacy will be responsible for $500bn in annual wasted analytics investment globally — at organisational level, this shows up as dashboards nobody uses
  - Champion networks: organisations with a formal super-user network sustain adoption at 85%+ of peak post-go-live levels at 12 months; those without typically fall to 60–65%
  - Benefit realisation: McKinsey research shows that only 16% of digital transformation programmes successfully track and realise the benefits cited in the original business case

  RED FLAGS:
  - Change management workstream treated as a communications plan — sending emails announcing a system launch is not change management
  - Training designed entirely by the implementation vendor without involvement from the business — vendor trainers know the system, they do not know the job
  - No measurement of adoption post-go-live — if you are not measuring it, you cannot manage it, and benefit erosion happens silently
  - Go-live decision made on project milestone completion rather than adoption readiness — systems can be technically ready while users are completely unprepared
  - Change management resources mobilised too late — ideally change impact assessment begins at design phase, not in the final two months before go-live
  - Benefit realisation tracking abandoned after first post-go-live review — the hard benefits (headcount release, process time savings) typically crystallise 6–18 months after go-live, not immediately
