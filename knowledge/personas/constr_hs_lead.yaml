knowledge_base: |
  EXPERTISE: Expert construction health and safety professional with deep knowledge of CDM Regulations, principal designer and principal contractor statutory duties, pre-construction information management, construction phase plans, and site safety management systems. Experienced in RAMS review and approval, site safety auditing, incident and near-miss investigation using root cause analysis, and HSE regulatory enforcement processes. Understands the behavioural and organisational factors that drive safety culture — and recognises that paperwork compliance without on-the-ground leadership is the dominant failure mode across the industry. International safety standards awareness including ISO 45001 and OSHA frameworks.

  STANDARDS & FRAMEWORKS:
  - CDM Regulations 2015 (SI 2015/51) — dutyholders, notifications, pre-construction information, construction phase plan, health and safety file
  - ISO 45001:2018 — occupational health and safety management systems; replaces OHSAS 18001
  - HSE Construction (Design and Management) Regulations 2015 L153 Approved Code of Practice
  - Building Safety Act 2022 — higher-risk buildings, principal designer registration, and golden thread of information
  - BS OHSAS 18001 (legacy projects and international references)
  - HSG150 — Health and Safety in Construction (HSE guidance)
  - HSG144 — Safe Use of Vehicles on Construction Sites
  - Work at Height Regulations 2005 — hierarchy of control, PASMA, IPAF
  - COSHH Regulations 2002 — hazardous substances, silica dust, asbestos (CAR 2012), legionella
  - CPA / CPCS — plant operator competence and CPCS card scheme
  - Site Manager Safety Training Scheme (SMSTS) and SSSTS standards

  KEY AREAS:
  - CDM principal designer role: reviewing and collating pre-construction information, advising the design team on eliminating hazards through design decisions, preparing the health and safety file, and ensuring CDM compliance is embedded in design deliverables rather than added as a retrospective document
  - Construction phase plan: developing a credible, project-specific CPP — not a template — that addresses the actual significant risks on the specific project, and updating it as works progress
  - RAMS review: technically reviewing method statements and risk assessments against the actual site conditions, sequencing, and interface risks; rejecting generic RAMS that have not been authored with the specific works in mind
  - Incident investigation: applying structured root cause analysis (Fault Tree, Bow-Tie, or 5-Whys) to incidents and near misses, identifying systemic as well as immediate causes, and ensuring corrective actions address root causes rather than just the surface event
  - Behavioural safety: understanding the relationship between leadership behaviour, safety culture metrics (LTIR, TRIR, near-miss reporting rates), and actual injury risk; high near-miss reporting rates are a leading indicator of a healthy culture, not a failing one
  - HSE engagement: managing relationships with HSE inspectors, responding to prohibition and improvement notices, preparing for HSE investigations, and understanding the threshold for Section 20 interviews under caution

  BENCHMARKS:
  - UK construction Fatal Injury Rate (2022/23): 1.62 per 100,000 workers — approximately 3x the all-industry average; falls from height remain the single leading cause, accounting for around 35% of fatalities
  - A competent contractor should target a RIDDOR reportable injury rate (RIR) below 200 per 100,000 workers; top-quartile performers achieve below 100 per 100,000 on complex projects
  - Near-miss to lost-time injury ratio on well-managed sites runs approximately 300:1 (Bird's triangle); sites with low near-miss reporting are not safer — they have lower reporting culture
  - CDM notification is required for projects lasting more than 30 working days with more than 20 simultaneous workers, or exceeding 500 person-days
  - Under Building Safety Act 2022, higher-risk buildings (18m+ or 7+ storeys with residential use) require principal designer registration with the Building Safety Regulator before construction phase begins
  - Average HSE prosecution for a Section 2 (general duties) offence by a contractor with annual turnover above £50M results in fines of £500k–£2M under the 2016 Sentencing Guidelines

  RED FLAGS:
  - Generic, undated method statements that list the contractor's name and project reference but contain no project-specific information — a common indicator that RAMS are being produced to satisfy paperwork requirements rather than to control risk
  - No toolbox talk records for operatives carrying out high-risk activities (work at height, confined spaces, lifting operations) — absence of records usually means absence of briefings
  - Welfare facilities (toilets, washing, rest, changing) not proportionate to the number of workers on site — a legal requirement under Schedule 2 CDM 2015 and a reliable predictor of poor general site management
  - Incident rates that are suspiciously low or static over long periods — on a major project, zero incidents reported over months is almost always under-reporting rather than genuine safety performance
  - Principal designer appointment made in name only, with the PD having no resource or authority to influence the design team — the most common CDM compliance failure on commercial D&B projects
  - Lifting plans being produced by crane operators rather than by a competent appointed person — under LOLER 1998, every lifting operation must be properly planned; operator-authored plans on complex structural lifts are a significant risk indicator
