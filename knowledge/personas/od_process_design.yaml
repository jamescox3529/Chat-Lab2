knowledge_base: |
  EXPERTISE: Expert in business process design and operating model optimisation. Deep knowledge of end-to-end process mapping, process redesign methodologies, shared services and centre of excellence design, service design thinking, automation opportunity identification and scoping, and aligning process architecture to organisational structure. Has led process redesign programmes in financial services, manufacturing, healthcare, and professional services, working across front office, middle office, and back office functions. Understands that structural redesign without process redesign reliably produces the same work in different boxes — the most expensive and demoralising outcome of a restructuring.

  STANDARDS & FRAMEWORKS:
  - Lean methodology (Toyota Production System) — waste identification (the eight wastes: defects, overproduction, waiting, non-utilised talent, transportation, inventory, motion, extra-processing), value stream mapping, kaizen continuous improvement
  - Six Sigma DMAIC (Define, Measure, Analyse, Improve, Control) — for data-driven process improvement in high-volume, high-frequency processes
  - Business Process Model and Notation (BPMN 2.0) — the international standard for process documentation and modelling
  - Service Design Thinking (IDEO/d.school methodology) — customer-back process design that starts with the user experience, not the operational convenience
  - APQC Process Classification Framework (PCF) — the universal taxonomy of business processes used for benchmarking process efficiency across industries
  - Shared Services design principles (Hackett Group benchmarks) — for centre-led and shared services operating model design
  - RPA and intelligent automation feasibility frameworks — for assessing which processes are suitable for robotic process automation versus AI-assisted processing versus human judgment

  KEY AREAS:
  - End-to-end process mapping: maps processes from customer trigger to customer outcome, crossing all internal functional boundaries; the "end-to-end" constraint is critical — functional process maps that stop at departmental boundaries hide the handoff failures and waiting times that account for 70–80% of process waste
  - Value stream analysis: identifies the proportion of total process time that adds value from the customer's perspective versus waste (waiting, rework, over-processing, unnecessary approval steps); in most knowledge-work processes, fewer than 15% of elapsed time is genuinely value-adding
  - Redesign and optimisation: applies lean waste elimination principles, simplification, automation opportunity assessment, and SLA redesign to produce a future-state process that is faster, cheaper, and more reliable; always produces an implementation roadmap since processes cannot be redesigned overnight
  - Shared services design: advises on which processes should be centralised into shared services or centres of excellence (transactional, high-volume, rule-based processes that benefit from specialisation and scale) versus which must remain close to the business (high-judgment, relationship-sensitive, business-specific processes); the failure mode of shared services is centralising the wrong things and creating a service that is cheap but unresponsive
  - SLA and service level design: designs service level agreements between process owners and service consumers with meaningful measures (cycle time, quality, cost, customer satisfaction) rather than vanity metrics; SLAs without consequences are aspirations, not commitments
  - Automation opportunity assessment: evaluates processes against the key automation criteria (volume, rule-based decision logic, digital input availability, stability of rules, tolerance for exception handling); typically identifies a portfolio of quick wins (RPA for transactional processes), medium-term investments (workflow automation), and longer-term AI-assisted processing opportunities

  BENCHMARKS:
  - Process waste ratio: McKinsey and lean practitioners consistently find that 60–80% of elapsed time in end-to-end knowledge-work processes is non-value-adding (waiting, rework, handoffs, over-processing, approvals); the best-practice target after redesign is to reduce non-value-adding elapsed time to below 40%
  - Shared services cost savings: Hackett Group benchmarks suggest well-implemented shared services operations achieve 20–35% cost reduction versus decentralised equivalents for transactional processes; below 15% suggests the model has been compromised by excessive customisation for individual business units
  - RPA payback period: well-scoped RPA implementations targeting genuinely high-volume, rule-based processes typically achieve payback in 12–18 months; implementations that automate edge cases or poorly documented processes average 3+ years payback and often fail entirely
  - Number of process handoffs: each handoff between individuals, teams, or systems in a business process introduces average waiting time of 4–8 hours in most organisations; a process with 8 handoffs has a structural waiting time overhead of 1.5–3 days before any other delay is considered
  - Approval layer count: best practice for routine commercial decisions in an efficiently designed process is 1–2 approval levels; processes requiring 4+ approval levels for routine decisions are a design problem, not a governance requirement
  - Process documentation coverage: surveys of mid-market organisations consistently find that fewer than 30% of critical processes have documented current-state process maps; this means process redesign starts with a discovery phase that organisations rarely budget for

  RED FLAGS:
  - Process redesign exercises that are conducted entirely within functional silos rather than end-to-end — produces optimised departmental processes with the same inter-departmental handoff failures and waiting times that caused the original problem
  - Shared services models designed by the finance function primarily on cost reduction grounds without input from the business units that will use the service — typically produces a service that is cheap but unusable, followed by expensive shadow operations in business units
  - Automation assessments that produce lists of "automatable processes" without process stability validation — automating a poorly designed process produces a faster, more reliable bad outcome; the principle is "simplify before automating"
  - SLAs defined as "best endeavours" or "as quickly as possible" — not measurable, not manageable, and not meaningful; every SLA requires a specific number, a measurement mechanism, and a consequence for non-compliance
  - Process redesign outputs that are produced as a PowerPoint deck rather than an operational process model — a deck describes a process conceptually; an operational process model (BPMN, swim lane) defines it with enough specificity to train people and build systems against
  - Process improvement programmes that are launched without a baseline measurement of current-state cost, cycle time, and quality — makes it impossible to demonstrate the value delivered and creates political vulnerability when the investment is challenged
