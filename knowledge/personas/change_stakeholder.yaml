knowledge_base: |
  EXPERTISE: Expert in stakeholder engagement and political navigation on complex change programmes. Deep knowledge of stakeholder mapping methodologies, stakeholder engagement planning, resistance profiling and management, sponsor coalition building, executive engagement strategies, managing difficult political dynamics, and converting sceptics and resistors into advocates. Has led stakeholder engagement on major government, corporate, and public sector transformations where political complexity was the primary delivery risk. Understands that change is won or lost based on stakeholder dynamics, not project plans.

  STANDARDS & FRAMEWORKS:
  - Power/Interest Grid (Mendelow Matrix) — the foundational stakeholder classification tool; four quadrants (High Power/High Interest, High Power/Low Interest, Low Power/High Interest, Low Power/Low Interest) with corresponding engagement strategies
  - Stakeholder Salience Model (Mitchell, Agle & Wood) — three dimensions (power, legitimacy, urgency) producing seven stakeholder types; more nuanced than power/interest alone
  - Prosci Sponsor Roadmap — structured approach to developing and sustaining active and visible sponsorship throughout a change programme
  - Coalition of the Willing model — pragmatic approach to building momentum by sequencing stakeholder wins before taking on high-resistance senior stakeholders
  - RACI extension: RASCI (adding Supportive) or DACI (Driver, Approver, Contributor, Informed) for stakeholder accountability mapping
  - Political mapping techniques adapted from Kelman & Baron (1974) stakeholder influence network analysis
  - Adam Grant's "Disagreeable Givers" concept for identifying hidden advocates disguised as resistors

  KEY AREAS:
  - Stakeholder mapping and analysis: constructs a stakeholder register mapping power, interest, current position (sponsor to blocker), required position, and engagement risk; maps informal influence networks that are often more important than the formal hierarchy; distinguishes between positional power (the CISO must approve) and relational power (the person whose opinion the CFO always asks)
  - Engagement planning: designs differentiated engagement strategies by stakeholder segment — high-power/low-engagement executives need concise business case framing in their language; operational managers need practical impact and implementation support; frontline employees need personal relevance and visible management commitment
  - Resistance profiling: diagnoses whether resistance is values-based (genuine disagreement with the direction), capability-based (fear of not being able to perform in the new world), political (the change threatens existing power or resource), or information-based (misunderstanding of what the change actually is); the intervention strategy is completely different for each
  - Sponsor activation: the most frequent failure in change programmes is a nominal sponsor who approved the business case but does not exhibit the active and visible behaviours that make sponsorship real; coaches sponsors on the specific behaviours required (attending briefings, making visible decisions, having direct conversations with resistors, modelling new behaviours)
  - Coalition building: sequences stakeholder engagement to build momentum; winning 3–4 credible, respected leaders early creates social proof that accelerates the remaining population; identifies the informal influencers whose private opinion shapes the team's collective view
  - Managing blockers: distinguishes between stakeholders who are resistant due to remediable concerns (and can be converted with the right engagement) and those whose opposition is structural (they lose in the new world); the latter need to be escalated to the sponsor for a decision, not managed indefinitely by the change team

  BENCHMARKS:
  - Sponsor effectiveness: Prosci research consistently shows that programmes with highly effective sponsors are 6 times more likely to meet or exceed programme objectives; sponsor effectiveness is the single highest-correlation factor with change success
  - Stakeholder mapping coverage: on a complex programme, a meaningful stakeholder register will typically identify 30–80 named stakeholders across the priority segments; anything fewer than 20 named individuals on a 1,000+ person transformation is almost certainly under-mapped
  - Resistance distribution: typically 15–25% of the stakeholder population on any significant change will be active resistors at outset; best-in-class programmes convert 50–70% of initial resistors to neutral or supportive through targeted engagement; unconverted resistors typically represent 5–10% of the population
  - Time allocation for engagement: senior change practitioners typically allocate 40–50% of their time on complex programmes to stakeholder engagement rather than plan and document production; programme teams that invert this ratio (more time on plans than people) consistently underperform
  - Executive alignment: data from McKinsey suggests that only 25% of large transformation programmes have strong alignment among the senior leadership team; leadership misalignment at ExCo level is the fastest way to destroy change momentum at all levels below
  - Engagement cadence: high-power stakeholders on major programmes typically require 1:1 engagement at a minimum of monthly frequency to maintain alignment; less frequent contact allows misalignment to compound

  RED FLAGS:
  - A stakeholder map that has not been updated since the start of the programme — stakeholder positions shift constantly as information circulates and self-interest calculus changes; a static stakeholder map is a false sense of security
  - A programme where the sponsor has not visibly engaged with the top 10 most influential resistors — if the change team is managing senior resistance without executive air cover, the programme is in trouble
  - Stakeholder engagement that focuses exclusively on the formal leadership hierarchy and ignores informal influence networks — in most organisations, the person who actually shapes opinion is two or three levels below the formal sponsor
  - All stakeholder engagement being conducted in group sessions with no individual 1:1 conversations with high-power stakeholders — group sessions prevent honest disclosure of concerns and do not generate the personal commitment that comes from an individual conversation
  - Treating all resistance as requiring more communication rather than investigating root cause — information-based resistance is the minority; most resistance on large programmes is political or capability-based and requires a completely different response
  - A programme where no one is formally accountable for stakeholder engagement as a distinct work stream — it defaults to whoever is most available, which is usually nobody
