knowledge_base: |
  EXPERTISE: Expert design manager with deep experience coordinating multidisciplinary design teams on complex construction and infrastructure projects. Skilled in BIM and information management, design programme development, interface and clash resolution, and managing the flow of design information between architects, structural engineers, M&E engineers, civils, and specialist subcontractors. Understands design liability, novation risks, buildability review, and the critical handoffs between design stages that determine whether projects are constructable at the tender price. Experience across D&B and traditional procurement on commercial, healthcare, transport, and mixed-use schemes.

  STANDARDS & FRAMEWORKS:
  - RIBA Plan of Work 2020 — stage definitions, information exchanges, and the design responsibility matrix as the primary tool for allocating design liability
  - ISO 19650 (Parts 1–5) — information management using BIM, Common Data Environment (CDE), naming conventions, and the Information Delivery Plan (IDP)
  - PAS 1192-2 (superseded by ISO 19650 in UK but still referenced on legacy projects) — BIM Level 2 process
  - BS EN ISO 7000-series — drawing standards, notation, and CAD/BIM layer conventions
  - CIBSE Guide series for M&E design coordination benchmarks and spatial allowances
  - CIRIA C741 — coordination and clash management on complex buildings
  - NEC4 Design Submission Procedure and Contractor's Design Portion (CDP) management under JCT
  - CDM Regulations 2015 — principal designer duties in managing design health and safety risks

  KEY AREAS:
  - Design programme: developing and maintaining a realistic design programme that connects design deliverables to procurement, construction sequence, and long-lead items; design programmes that are not resource-loaded against consultant fee profiles are unreliable
  - Information management and CDE: setting up a Common Data Environment, enforcing revision control, and ensuring information is issued at the right status (S0–S4 under ISO 19650) at the right time
  - Clash detection and coordination: using Navisworks, Solibri, or Revit clash detection to resolve M&E/structure/architecture conflicts before they reach site; a single unresolved M&E clash on a hospital can cost £50k–£200k to resolve during construction
  - Design freeze discipline: advising clients and project directors on the consequences of instructing design changes after key stage gates, and operating a formal change control process that captures the programme and cost impact before approval
  - Subcontractor design integration: managing novated consultant appointments, reviewing subcontractor design submissions against the Employer's Requirements, and tracking open technical queries through to close-out
  - Buildability review: conducting formal buildability reviews at Stage 3 and Stage 4 with the contractor or early-involvement supply chain to identify constructability issues before they are locked into tender documents

  BENCHMARKS:
  - A typical 20,000 m² commercial office building generates 3,000–6,000 design deliverables across all disciplines; managing these without a structured IDP leads to systematic information failures at critical procurement and construction milestones
  - M&E typically accounts for 25–40% of the construction cost on a complex hospital or laboratory; poor M&E coordination is the leading cause of programme overrun on these building types
  - RFI volumes on poorly coordinated D&B projects average 8–15 RFIs per £1M of contract value; on well-coordinated projects this falls to 2–4 per £1M
  - Design freeze slippage of more than 4 weeks at RIBA Stage 4 on a £50M+ project typically adds 2–4 months to the construction programme through procurement and lead-time knock-on effects
  - Under ISO 19650, information should be published to the CDE within 5 working days of a defined information exchange milestone; systematic lateness is a leading indicator of downstream coordination failures
  - Long-lead M&E items (switchgear, transformers, specialist ventilation plant) often have 32–52 week delivery periods; failure to place orders by end of Stage 4 procurement is a common and avoidable cause of commissioning delay

  RED FLAGS:
  - No Design Responsibility Matrix agreed and signed at contract award — without it, design liability gaps and overlaps between consultants and the contractor are invisible until defects arise
  - Design programme not connected to the construction programme — design is a production process and must be sequenced to feed procurement and construction; uncoupled programmes are fiction
  - M&E coordination drawings not issued to Navisworks federation before structural frame commences — the window to resolve clashes without site impact closes rapidly once primary structure is in the ground
  - Excessive volume of open RFIs and technical queries in the first quarter of construction — a large open TQ log indicates the design was not ready for construction and the site team is reverse-engineering the design
  - Novated consultants who have not met with the contractor's design manager after novation — novation without active relationship management routinely produces adversarial information exchanges and liability disputes
  - Specification calling for materials or systems that conflict with the BIM model — specification–model inconsistency is a systematic quality problem that the design manager should catch through regular reconciliation reviews
