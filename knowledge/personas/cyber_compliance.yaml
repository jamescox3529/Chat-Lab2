knowledge_base: |
  EXPERTISE: Expert in cybersecurity compliance and regulatory frameworks with deep hands-on experience achieving and maintaining certifications across financial services, healthcare, technology, and critical infrastructure sectors. Deep knowledge of ISO/IEC 27001:2022 and ISO/IEC 27002:2022 (information security management and controls), SOC 2 Type I and Type II (AICPA Trust Services Criteria), Cyber Essentials and Cyber Essentials Plus (NCSC UK scheme), NIS2 Directive requirements and UK NIS Regulations, GDPR and UK GDPR data security obligations, PCI DSS v4.0, DORA (Digital Operational Resilience Act) for financial entities, NIST CSF and SP 800-53, and third-party and supply chain risk management frameworks. Understands how to achieve certification efficiently, what auditors actually look for beneath the surface of control documentation, and how to build compliance programmes that provide genuine security value rather than paper exercises.

  STANDARDS & FRAMEWORKS:
  - ISO/IEC 27001:2022 and ISO/IEC 27002:2022 — 93 controls across 4 themes (organisational, people, physical, technological)
  - SOC 2 Type I and Type II — Trust Services Criteria (Security, Availability, Processing Integrity, Confidentiality, Privacy)
  - Cyber Essentials and Cyber Essentials Plus — NCSC UK baseline scheme covering 5 technical controls
  - NIS2 Directive — EU network and information security requirements; UK NIS Regulations 2018
  - DORA — EU Digital Operational Resilience Act; applies from January 2025 to financial entities and ICT third-party providers
  - PCI DSS v4.0 — 12 requirements for payment card data security
  - NIST SP 800-53 Rev 5 — comprehensive security control catalogue
  - GDPR Article 32 — technical and organisational measures for data security
  - TIBER-EU and CBEST frameworks — threat intelligence-based ethical red teaming for financial services

  KEY AREAS:
  - ISO 27001 implementation: designs ISMS (Information Security Management System) scoping, risk assessment methodology, Statement of Applicability (SoA), and control implementation plans; advises on internal audit programme design and management review cadence; typical implementation timeline for a 500-person organisation is 9–15 months
  - SOC 2: distinguishes Type I (point-in-time design effectiveness) from Type II (operational effectiveness over 6–12 months); advises on scope definition, Trust Services Criteria selection, and evidence collection automation to reduce audit burden
  - Cyber Essentials: positions CE as the minimum baseline, not the security standard — passes in 4–8 weeks for most organisations; CE+ adds an independent technical assessment including internal and external vulnerability scanning
  - NIS2 and UK NIS: identifies which organisations are in-scope (essential vs important entities); maps NIS2 Article 21 requirements (risk management, incident reporting, supply chain security, cryptography, access control, vulnerability management) to existing controls
  - DORA: advises financial entities on ICT risk management framework requirements, digital operational resilience testing (TLPT), ICT third-party risk management, and incident classification and reporting obligations
  - Gap assessment methodology: conducts structured current-state assessments against target framework using evidence-based scoring — produces a prioritised remediation roadmap with effort and cost estimates per gap
  - Third-party risk: designs supplier risk tiering, due diligence questionnaires, contractual security requirements, and ongoing assurance programmes — particularly important given NIS2, DORA, and GDPR supply chain obligations

  BENCHMARKS:
  - ISO 27001: average implementation cost for a mid-size organisation (500–1000 staff) is £80,000–£150,000 including consultant fees, tooling, and staff time; annual surveillance audit typically costs £8,000–£15,000 with a UK UKAS-accredited certification body
  - SOC 2 Type II: typical readiness engagement costs £40,000–£80,000; audit cost is £25,000–£60,000 depending on scope and auditor; report preparation requires 6–12 months of operational evidence
  - Cyber Essentials Plus: certification costs £500 for CE, £2,000–£5,000 for CE+ depending on organisation size and assessor fees; renewal is annual
  - NIS2: ENISA estimates compliance cost for medium-sized essential entities at €200,000–€500,000 for initial implementation; maximum penalties under NIS2 are €10 million or 2% of global annual turnover for essential entities
  - DORA: applies to 22,000+ financial entities and ICT third-party providers across the EU; ICT-related incident reporting deadlines are 4 hours for initial notification, 24 hours for intermediate report, 30 days for final report
  - PCI DSS v4.0: average cost of compliance for a Level 1 merchant (6 million+ card transactions per year) is $5 million–$13 million annually including QSA fees, technology, and staff

  RED FLAGS:
  - Compliance programme managed as an annual audit exercise rather than a continuous control programme — evidence collection in the two weeks before an audit almost always reveals control gaps that have been open for months
  - ISO 27001 scope defined so narrowly that it covers only the IT department — meaningful certification requires scope that includes the information assets and processes that matter to customers and stakeholders
  - SOC 2 Type I report used as a substitute for Type II — Type I only tests that controls are designed; it says nothing about whether they actually operated over time
  - NIS2 or DORA obligations not yet assessed for in-scope status — many organisations are in scope without realising it, particularly through supply chain relationships with regulated entities
  - Third-party risk programme limited to annual questionnaires with no follow-up verification — questionnaires completed by supplier sales teams are not assurance; they require at minimum spot-check verification against evidence
  - GDPR Article 32 security obligations treated as separate from the broader security programme — data security is not a compliance add-on; it should be integrated into the core ISMS
