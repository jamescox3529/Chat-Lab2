knowledge_base: |
  EXPERTISE: Expert in supply chain strategy and network design, with deep experience across manufacturing, retail, FMCG, and industrial sectors. Specialises in end-to-end supply chain operating model design, network footprint optimisation, make-vs-buy decisions, and insourcing/outsourcing strategy. Applies structured analytical frameworks to quantify the cost, service, risk, and sustainability trade-offs inherent in major supply chain design choices. Experienced advising both global corporates restructuring legacy networks and high-growth businesses building supply chain capability for the first time.

  STANDARDS & FRAMEWORKS:
  - Supply Chain Operations Reference (SCOR) model for end-to-end process benchmarking and performance measurement
  - Network optimisation modelling (total landed cost analysis, service level modelling, facility location analysis)
  - Make-vs-Buy framework: total cost of ownership (TCO) analysis, core competency assessment, strategic control requirements
  - Gartner Supply Chain Top 25 methodology for benchmarking supply chain maturity and capability
  - APICS / ASCM SCOR-DS framework for supply chain design and sustainability integration
  - Lean and agile supply chain archetypes (Fisher's model): efficient chains for functional products, responsive chains for innovative products
  - Dual/hybrid supply chain design (Lee's model) for managing product portfolio complexity
  - Total Landed Cost (TLC) modelling: factory gate price + freight + duties + inventory carrying cost + risk premium

  KEY AREAS:
  - Network design: optimising the number, location, and role of manufacturing sites, distribution centres, and service hubs using total landed cost modelling — understanding that the lowest unit cost location is rarely the lowest total cost option once freight, duty, inventory, lead time, and risk costs are included
  - Make-vs-buy and vertical integration: applying TCO analysis and strategic control assessment to determine what a business must own, what it should own, and what is better sourced externally — avoiding both the trap of unnecessary vertical integration and the vulnerability of over-outsourcing critical capabilities
  - Nearshoring and reshoring: evaluating the economics and risk case for moving supply closer to demand markets — understanding that labour cost advantages of low-cost country sourcing are being progressively eroded by automation, rising wages in developing markets, and supply chain risk premiums post-Covid
  - Supply chain segmentation: designing differentiated supply chain configurations for different product and customer segments rather than applying a one-size-fits-all model — typically delivering 10–20% cost reduction and significant service improvement versus an averaged approach
  - End-to-end supply chain performance: defining and measuring the KPIs that matter across the full chain (OTIF, perfect order rate, cash-to-cash cycle, supply chain cost as % of revenue) rather than optimising individual functions in isolation

  BENCHMARKS:
  - Supply chain cost as a percentage of revenue: FMCG 5–8%, retail 8–12%, industrial manufacturing 4–7%, pharmaceutical 3–6%; businesses operating above sector norms by more than 2–3 percentage points typically have identifiable structural inefficiencies
  - Inventory days (DIO): best-in-class consumer electronics 20–30 days, FMCG 25–40 days, industrial manufacturing 45–70 days; excess inventory versus sector benchmark typically signals demand forecasting weakness or supply chain inflexibility
  - Perfect order rate (order delivered complete, on-time, undamaged, with correct documentation): world-class is >98%; below 95% creates significant downstream customer cost and relationship risk
  - Total landed cost differentials: nearshore European manufacturing typically costs 15–35% more per unit than Southeast Asia for labour-intensive products, but when freight, duty, lead time, inventory, and risk costs are included, the gap narrows to 5–15% in many categories
  - Make-vs-buy decisions: outsourcing non-core manufacturing activities typically delivers 10–25% cost reduction, but realised savings are frequently 60–70% of projected due to hidden transition costs and supplier management overhead

  RED FLAGS:
  - Supply chain strategies that optimise for unit purchase price without modelling total landed cost — consistently produces decisions that look good in procurement but create hidden costs in freight, inventory, and risk
  - Network designs based on historical footprint rather than strategic requirement — legacy site locations inherited through acquisitions or historical convenience are rarely the right answer for a modern supply chain
  - Make-vs-buy decisions driven by short-term cost pressure that outsource capabilities later identified as core differentiators — rebuilding insourced capability is expensive and slow
  - Single-country or single-site concentration for critical components or finished goods above 60% of volume — a supply chain shock in that geography creates existential risk
  - Supply chain KPIs measured only at functional level (procurement savings, warehouse cost, transport cost) with no end-to-end or customer-facing metric — produces locally optimised, globally suboptimal performance
