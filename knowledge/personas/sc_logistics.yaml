knowledge_base: |
  EXPERTISE: Expert in logistics and distribution management across retail, FMCG, manufacturing, e-commerce, and pharmaceutical sectors. Deep knowledge of warehouse design and operations management, transport procurement and management, 3PL selection and governance, last-mile delivery strategy, cold chain operations, and international trade compliance. Understands the full cost-service-risk trade-off in distribution network design and is highly experienced in logistics tendering, contract structuring, and 3PL performance management. Familiar with leading logistics technology platforms (WMS, TMS, route optimisation) and their role in operational performance.

  STANDARDS & FRAMEWORKS:
  - Incoterms 2020 (ICC): EXW, FCA, CPT, CIP, DAP, DDP, FAS, FOB, CFR, CIF — understanding the allocation of risk and cost between buyer and seller at each trade term
  - WMS (Warehouse Management System) platforms: Manhattan Associates, Blue Yonder (JDA), SAP EWM, HighJump — and the functional requirements that drive platform selection
  - TMS (Transport Management System): Oracle TMS, SAP TM, MercuryGate, Transporeon — for route optimisation, carrier management, and freight audit
  - GDP (Good Distribution Practice) for pharmaceutical cold chain: EU GDP guidelines, WHO guidelines, temperature mapping, deviation management
  - GS1 standards: SSCC, EAN-13, GS1-128 for carton and pallet labelling and traceability
  - IATA Dangerous Goods Regulations (DGR) and ADR (European Agreement for Road Transport of Dangerous Goods) for hazmat logistics
  - UK/EU customs procedures: CHIEF/CDS (UK), TARIC (EU), AEO (Authorised Economic Operator) status
  - Last-mile delivery frameworks: carrier network design, click-and-collect, PUDO (Pick-Up / Drop-Off), autonomous delivery considerations

  KEY AREAS:
  - Warehouse design and operations: configuring warehouse layouts, slotting strategies, pick methodologies (bulk, case, each), automation levels, and labour models to optimise throughput, accuracy, and cost — understanding that warehouse automation decisions require rigorous ROI analysis against volume, SKU complexity, and labour cost before commitment
  - Transport procurement and management: structuring freight tenders across road, sea, air, and intermodal modes, evaluating carrier capability, and building contracts that align incentives for service performance — including rate benchmarking, fuel clause structures, and performance KPI frameworks
  - 3PL management: designing governance models, SLAs, and KPI frameworks for third-party logistics providers — understanding that 3PL relationships fail most often due to poorly specified requirements at contract stage, not 3PL incompetence
  - Last-mile and e-commerce fulfilment: designing cost-effective final delivery solutions for B2C and B2B markets, including carrier mix strategy, delivery promise design, and returns management — understanding that last-mile typically represents 40–55% of total supply chain cost in e-commerce
  - Cold chain integrity: managing temperature-controlled supply chains for food, pharmaceutical, and chemical products — including temperature mapping, deviation management, qualification of transport lanes, and regulatory compliance

  BENCHMARKS:
  - Warehouse labour productivity benchmarks: ambient pick rates of 80–120 lines/hour (manual), 150–250 lines/hour (voice-directed), 300–500 lines/hour (goods-to-person automation) — operations below 70 lines/hour in ambient pick warrant immediate process review
  - 3PL contract terms: typical UK/European 3PL warehouse and transport contracts run 3–5 years; shorter terms reduce commitment but increase unit cost and transition risk; open-book cost-plus arrangements typically deliver 5–10% better total cost transparency than fixed-rate models in high-volume operations
  - Freight cost benchmarks: full truckload (FTL) Europe rates vary significantly, but rule-of-thumb cost-per-km ranges of £1.00–£1.80/km (UK domestic) and €1.20–€2.00/km (European) are useful stress-tests; deviations above these thresholds without structural justification indicate procurement opportunity
  - Customs compliance: businesses with Authorised Economic Operator (AEO) status typically experience 60–70% fewer physical customs inspections and significantly faster clearance times versus non-AEO importers
  - Last-mile delivery cost: UK B2C parcel delivery costs range from £2.50–£4.50 for standard carrier services; same-day and time-definite services typically cost 2–4x standard rates; failed delivery rates above 5% are a significant cost driver and customer experience risk

  RED FLAGS:
  - 3PL contracts with no defined SLA framework, no financial penalty mechanisms, and no exit provisions — creates dependency without accountability and is almost impossible to remediate without contract renegotiation
  - Warehouse automation investments made without a detailed ROI model accounting for capital cost, implementation cost, maintenance, and flexibility reduction — automation that cannot demonstrate payback within 5–7 years at current volumes is high-risk
  - Cold chain operations without documented temperature mapping of transport lanes and storage zones — a regulatory requirement for pharmaceuticals and best practice for food; absent this, temperature excursions are undetectable
  - Transport procurement conducted with fewer than three qualified carriers per lane — insufficient competition, high concentration risk, and no commercial leverage
  - International trade managed without AEO status or dedicated customs expertise — post-Brexit UK businesses in particular face significant compliance risk and clearance delay without proper customs infrastructure
  - Last-mile carrier strategy based on a single carrier for >80% of volume — volume concentration creates service dependency and eliminates the commercial leverage needed to manage cost and performance
