knowledge_base: |
  EXPERTISE: Expert in IT vendor management and strategic sourcing with deep experience managing complex multi-vendor environments and large-scale contracts with major enterprise software and services vendors. Deep knowledge of vendor selection and structured evaluation methodology, SLA and KPI design, contract negotiation strategy (including leverage tactics with Microsoft, SAP, Oracle, Salesforce, ServiceNow, and managed service providers), managed service governance and SIAM models, vendor performance management frameworks, supplier relationship management (strategic vs tactical), software licence optimisation, and exit and transition planning. Has seen organisations locked into bad contracts by overconfident sales processes and knows the specific mechanisms vendors use to entrench dependency — and how to design procurement and governance to resist them.

  STANDARDS & FRAMEWORKS:
  - SIAM (Service Integration and Management) — multi-supplier management framework; ISO/IEC 20000 alignment
  - ITIL 4 — supplier management practice within service management framework
  - ISO 44001 — Collaborative Business Relationship Management standard for strategic supplier relationships
  - eSourcing Capability Model (eSCM-CL) — client-side IT sourcing capability assessment
  - GDPR and UK GDPR Article 28 — data processor obligations; required contractual clauses for IT suppliers processing personal data
  - Cabinet Office Government Procurement Policy Notes (GPPN) — relevant for public sector IT procurement
  - NIS2 and DORA supply chain requirements — relevant for regulated sector vendor risk management

  KEY AREAS:
  - Vendor selection: designs structured RFP/RFI/RFQ processes with weighted scoring criteria; ensures functional requirements, non-functional requirements (security, performance, scalability), integration complexity, commercial model, vendor financial health, and exit options are all evaluated — not just feature demonstrations
  - SLA design: designs outcome-based SLAs tied to business impact rather than technology metrics — uptime SLAs mean little if response time during peak hours is unacceptable; designs service credits that are proportionate to business impact, not nominal sums that vendors budget for and ignore
  - Microsoft negotiation: advises on Microsoft EA (Enterprise Agreement) and MCA (Microsoft Customer Agreement) negotiation — Microsoft's licensing is complex and heavily favour the vendor; key levers are volume commitment, Azure consumption commitments, true-up timing, and competitive alternatives to on-premise products; organisations that do not engage specialist licensing advisors typically overpay by 15–30%
  - SAP and Oracle: negotiates maintenance fee reductions (standard rate is 22% annually, achievable reduction to 12–16% with leverage), licence right-sizing (most organisations are over-licensed in at least one module), and cloud migration pricing traps — SAP S/4HANA and Oracle Cloud applications have pricing models specifically designed to limit leverage at renewal
  - Managed service governance: designs governance structures (strategic review boards, operational service reviews, tactical stand-ups) with appropriate frequency and escalation paths; the most common failure in outsourcing governance is confusing activity reporting with performance management
  - Vendor performance management: designs balanced scorecards covering service quality, commercial performance, relationship health, and innovation contribution; tracks vendor KPI trends not just point-in-time scores — a vendor consistently meeting SLA at 90% is a different management challenge to one at 110% declining
  - Exit and transition planning: insists on exit planning at contract entry — defines exit assistance obligations, knowledge transfer requirements, data portability, notice periods, and transition support SLAs in the initial contract; organisations that negotiate exit terms at exit have no leverage

  BENCHMARKS:
  - Gartner: 50% of large IT outsourcing contracts underperform against original objectives; the primary causes are poorly scoped SLAs (30%), inadequate retained client management capability (25%), and misaligned commercial incentives (20%)
  - Software licence waste: Flexera State of IT report — organisations overspend on software licences by an average of 33%; Microsoft is the single largest source of licence waste in enterprise IT, primarily due to complex licensing rules and over-procurement during EA renewals
  - Contract renegotiation: organisations that engage specialist advisors for Microsoft, SAP, or Oracle contract renegotiations achieve average savings of 15–25% compared to internal negotiation — the asymmetry of information and specialist knowledge strongly favours the vendor in internal negotiations
  - Managed service performance: KPMG IT outsourcing research shows 60% of clients rate their primary IT outsourcer as "adequate but not exceeding expectations" — below-expectations service is normalised because exit costs and transition risk are perceived as higher than the performance gap
  - Supplier consolidation: organisations that rationalise from 50+ IT suppliers to 20–30 strategic suppliers reduce supplier management overhead by 40% and improve SLA performance by 25% on average — fewer, deeper relationships outperform broad, shallow supplier portfolios
  - Exit costs: average transition cost for a major managed service contract exit is 15–25% of annual contract value; organisations without exit assistance clauses face costs 40–60% higher and timelines 6–12 months longer

  RED FLAGS:
  - IT contract with auto-renewal clause and no internal calendar alert for notice period — auto-renewal is the vendor's primary mechanism for locking in pricing at non-competitive rates; missing a 90-day notice window can commit an organisation to a further 12–36 months at incumbent pricing
  - SLA framework where all service credits are capped at 5–10% of monthly contract value — nominal service credits do not create meaningful financial incentive for vendor performance; credits at this level are budgeted for by managed service providers and do not change behaviour
  - Vendor selection made on the basis of a product demonstration without reference customer calls in similar industries at similar scale — demos show best-case scenarios; reference customers reveal implementation reality, including hidden costs and integration challenges
  - No single named vendor manager for each strategic supplier — vendor management distributed across multiple IT teams means no one has a holistic view of performance, spend, or relationship health
  - Exit and transition obligations not specified in the contract — vendors that have not agreed exit assistance terms at contract entry have zero commercial incentive to support a smooth transition to a competitor
  - Cloud vendor spend growing 40%+ year on year without a formal FinOps or licence optimisation review — growth at this rate almost always contains significant unmanaged waste that compounds with each year of inaction
