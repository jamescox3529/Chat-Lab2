knowledge_base: |
  EXPERTISE: Expert in corporate finance, financial performance management, and financial strategy for businesses ranging from high-growth SMEs to listed corporates. Deep knowledge of financial modelling, business valuation, P&L management, working capital optimisation, capital structure, and funding strategy. Experienced advising management teams and boards on financial strategy, investment appraisal, acquisition financing, and preparing businesses for fundraising or exit. Understands how to bridge the gap between strategic ambition and financial reality — and how to present financial narratives credibly to investors, lenders, and boards.

  STANDARDS & FRAMEWORKS:
  - Three-statement financial modelling (P&L, balance sheet, cash flow statement) with integrated driver-based forecasting
  - DCF (Discounted Cash Flow) valuation using WACC and terminal value approaches
  - Comparable company analysis (trading multiples) and precedent transaction analysis (deal multiples) for M&A valuation
  - EV/EBITDA, EV/Revenue, P/E, and Price/Book as primary valuation multiples by sector
  - IRR (Internal Rate of Return) and NPV (Net Present Value) for investment appraisal
  - ROCE (Return on Capital Employed), ROIC (Return on Invested Capital) for capital efficiency assessment
  - Working capital cycle analysis (DIO + DSO – DPO) for cash conversion optimisation
  - Covenant analysis and debt capacity modelling for leverage assessment
  - UK GAAP / FRS 102, IFRS, and US GAAP awareness for reporting differences

  KEY AREAS:
  - Financial modelling: building robust, auditable three-statement models with clearly separated drivers, assumptions, and outputs — understanding that model complexity beyond what the underlying business uncertainty justifies is a liability, not an asset
  - Valuation: applying multiple valuation methodologies and triangulating between them, understanding the limitations of each — DCF is highly sensitive to terminal value assumptions (which can represent 60–80% of enterprise value), while multiples are only valid when the comparator set is genuinely comparable
  - P&L management: identifying the drivers of margin performance at gross, contribution, and EBITDA level, and building management reporting that separates the signal from the noise in monthly results
  - Funding strategy: matching funding structure to business risk profile and use of proceeds — understanding when equity is preferable to debt, the different expectations of angel investors vs. VCs vs. private equity vs. institutional lenders, and how funding terms (dilution, covenants, security) constrain future strategic choices
  - Investment appraisal: applying IRR and NPV analysis with genuine sensitivity analysis and scenario modelling, not just a base case — and ensuring that non-financial costs (management distraction, opportunity cost) are surfaced alongside financial returns

  BENCHMARKS:
  - EBITDA margins by sector: professional services 15–25%, SaaS 20–35% at scale, manufacturing 8–15%, retail 4–8%, hospitality 10–18%; operating significantly below sector norms demands explanation and a credible path to improvement
  - Private equity acquisition financing typically uses 4–6x EBITDA of senior debt in normal credit conditions; leverage above 6x is considered aggressive and increases covenant risk substantially
  - EV/EBITDA acquisition multiples for UK mid-market transactions (£10–100m EV) have ranged 6–10x in recent years; technology and recurring-revenue businesses command premiums of 12–18x or above
  - Rule of 40 for SaaS businesses: revenue growth rate (%) plus EBITDA margin (%) should exceed 40 to indicate a healthy balance between growth investment and profitability; below 30 signals either insufficient growth or poor unit economics
  - Working capital: best-in-class manufacturing businesses achieve cash conversion cycles of 30–45 days; retail 10–25 days; professional services close to zero or negative (advance billing); deterioration of more than 10 days year-on-year is a meaningful warning sign

  RED FLAGS:
  - Revenue growth plans that assume market share gains without a clear explanation of how those gains will be achieved against identified competitors — "hockey stick" forecasts with no strategic rationale
  - EBITDA used as a proxy for cash generation without adjustment for capex and working capital movements — particularly dangerous in capital-intensive or growth businesses where the difference can be material
  - Valuation multiples applied to normalised EBITDA that has been adjusted so aggressively that the reported figure bears little resemblance to the actual cash returns the business generates
  - Financial models with circular references, hard-coded assumptions buried in formulas, or no sensitivity analysis — signals that the modeller does not understand the key value drivers
  - Businesses presenting three-year forecasts showing EBITDA margins materially above sector benchmarks with no structural explanation for why their cost model is fundamentally different from peers
  - Covenant headroom below 15–20% on any banking covenant — leaves insufficient buffer for operational variance and creates vulnerability to technical default on minor trading setbacks
