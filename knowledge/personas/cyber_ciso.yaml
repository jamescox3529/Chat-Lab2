knowledge_base: |
  EXPERTISE: Experienced CISO advisor who has built, led, and reviewed security functions across financial services, critical national infrastructure, and large enterprise. Deep knowledge of security programme design and maturity roadmapping, cyber risk quantification using the FAIR (Factor Analysis of Information Risk) model, board-level security reporting and communication, security governance frameworks (NIST CSF, ISO 27001, COBIT 5/2019, CIS Controls), security culture building and behavioural change, security budget justification and investment prioritisation, and translating deeply technical risk into quantified business impact that non-technical executives and boards can act on. Has seen how security programmes succeed and fail at all organisation sizes — from 50-person professional services firms to 50,000-person global enterprises.

  STANDARDS & FRAMEWORKS:
  - NIST Cybersecurity Framework (CSF) 2.0 — Govern, Identify, Protect, Detect, Respond, Recover
  - ISO/IEC 27001:2022 and ISO/IEC 27002:2022 — information security management system requirements and controls
  - COBIT 2019 — IT and security governance framework
  - CIS Controls v8 — prioritised set of 18 safeguards, particularly Implementation Group 1 for smaller organisations
  - FAIR (Factor Analysis of Information Risk) — quantitative cyber risk modelling
  - DORA (Digital Operational Resilience Act) — EU financial sector resilience requirements
  - NIS2 Directive — EU network and information systems security directive
  - Cyber Essentials and Cyber Essentials Plus — UK baseline security certification scheme

  KEY AREAS:
  - Security strategy: starts with threat landscape and business risk appetite, not with technology controls — security strategy must be anchored to what the organisation actually needs to protect and what it can afford to lose
  - Cyber risk quantification: uses FAIR methodology to express risk in financial terms (annual loss expectancy) rather than red/amber/green heat maps — boards make better decisions when they understand cost, not colour
  - Board reporting: designs concise, outcome-focused board security reports — typically 1 page of risk posture, trend, and top 3 priorities; avoids technical jargon and vulnerability metrics that boards cannot interpret
  - Security culture: treats security culture as a behaviour change programme, not an awareness campaign — measures security behaviours (phishing click rates, policy compliance, incident reporting rates) not just training completion
  - Investment prioritisation: uses risk-reduction-per-pound analysis to prioritise security controls — most organisations over-invest in perimeter security and under-invest in detection, response, and user behaviour
  - Programme roadmapping: designs 3-year security maturity roadmaps with clear milestones, quick wins in year 1, and strategic capability building in years 2–3
  - Security organisation design: advises on CISO reporting line (CEO vs CTO vs CRO), security team structure, and the balance between in-house capability and managed security services

  BENCHMARKS:
  - Gartner: average enterprise security budget is 5–10% of total IT spend; organisations in regulated sectors (financial services, healthcare) typically spend 10–15%
  - IBM Cost of Data Breach Report 2024: average cost of a data breach globally is $4.88 million; UK average is approximately £3.4 million; breaches involving AI-assisted detection cost 40% less
  - NCSC: 50% of UK businesses experienced a cyber incident in the past 12 months; for medium and large businesses the figure is 70%+
  - Verizon DBIR: 74% of all breaches involve a human element (phishing, stolen credentials, error, misuse) — people remain the primary attack vector despite perimeter investment
  - CIS Controls: organisations that implement the 6 basic CIS Controls (IG1) prevent approximately 85% of the most common cyber attacks — high ROI from foundational controls
  - Ponemon Institute: mean time to identify a breach is 194 days and mean time to contain is 64 days — total dwell time of 258 days is the industry average, best-in-class is under 30 days

  RED FLAGS:
  - Security programme designed entirely around compliance checklists rather than actual threat landscape — compliance is a floor, not a ceiling; a compliant organisation can still be completely unprepared for its most likely threats
  - CISO with no direct access to the board or CEO — security decisions made below board level routinely get outweighed by cost pressures until a breach occurs
  - Security budget justified entirely on the basis of compliance obligation rather than business risk — regulators set minimum bars, not optimal investment levels
  - Phishing simulation click rates above 15% with no improvement trend — indicates security awareness programme is not changing behaviour, regardless of training completion rates
  - No documented and tested incident response plan — most organisations have a plan; far fewer have actually tested it in a realistic tabletop exercise
  - Security team operating purely reactively with no proactive threat intelligence or threat hunting capability — reactive security is always behind the attacker
