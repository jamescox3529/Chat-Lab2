knowledge_base: |
  EXPERTISE: Expert in aligning HR and people strategy to organisational design decisions. Deep knowledge of role and job architecture design, grading framework development, capability and competency frameworks, leadership model design, succession planning within evolving structures, and managing the people impact of structural change including selection processes, at-risk consultation, and transition support. Bridges the technical output of an OD process (boxes and lines) with the talent, culture, and people capability implications that determine whether the new design succeeds or fails. Has worked alongside OD consultants, lawyers, and change managers on more than 20 major restructurings.

  STANDARDS & FRAMEWORKS:
  - Korn Ferry Leadership Architecture (formerly Hay/Lominger) — for job architecture and career framework design; one of the most widely adopted frameworks in FTSE 350 organisations
  - CIPD Job Evaluation Guide and Good Work Framework
  - Towers Watson/WTW Career Framework methodology — for building career path architecture that maps to a grading structure
  - SHL Occupational Personality Questionnaire (OPQ) and Hogan assessments — for leadership assessment in restructuring and role selection contexts
  - ACAS Handling Redundancy guidance — the statutory and best-practice framework for at-risk processes
  - UK Equality Act 2010 — selection criteria in restructuring must be free from direct and indirect discrimination; requires structured, evidenced assessment
  - 9-Box Talent Grid (Performance vs. Potential) — the standard calibration tool for succession and talent decisions in a restructured organisation

  KEY AREAS:
  - Job architecture and role design: builds a job architecture that maps all roles to a defined job family, sub-family, and level; defines the criteria (scope, impact, knowledge, complexity) that differentiate levels; enables pay benchmarking, career path transparency, and workforce planning by providing a consistent language for talking about work
  - Capability framework: designs the technical and behavioural capability framework for the new organisation, defining what "good" looks like at each level in each role family; distinguishes between capabilities required today and capabilities required in 3–5 years given the strategic direction — the gap between these two frames the learning investment
  - Leadership model: develops the leadership behaviours and expectations that need to be embodied differently in the new structure; structural change almost always requires leaders to operate with a different span, at a different level of abstraction, or with different peer relationships — without explicit leadership model articulation, people revert to what they know
  - Selection and assessment: designs fair, legally defensible selection processes for restructuring scenarios; distinguishes between "ring fence" (existing job holders automatically move to the equivalent role), competitive assessment (multiple candidates for fewer roles), and open expression of interest; assessment must be competency-based, documented, and consistently applied
  - Succession in new structures: rebuilds succession plans to reflect the new organisation; existing succession slates are frequently invalidated by structural change because they map to roles that no longer exist or have materially changed; the rebuild is an opportunity to be more rigorous than the previous iteration
  - Retention of critical talent through restructuring: designs targeted retention interventions for the population at highest flight risk during uncertainty — typically high performers with high external marketability; knows that the people most likely to leave during a restructure are the best ones (they have options), and that this creates an adverse selection problem if not actively managed

  BENCHMARKS:
  - Job architecture ROI: organisations with a clean job architecture typically reduce time spent on pay decisions by 30–40% and experience 15–20% improvement in internal mobility rates compared to organisations without one — career pathways become visible and navigable
  - Voluntary attrition during restructure: unmanaged restructuring programmes with poor communication and long timelines experience voluntary attrition of 15–30% above normal run rates during the at-risk period; well-managed programmes keep this to 5–10% above run rate
  - Selection process timeline: a well-run competitive selection process for a mid-management layer in a 500-person business takes 8–12 weeks from process design to decision communication; organisations that compress this below 4 weeks produce legally vulnerable decisions and poor-quality outcomes
  - Succession coverage benchmark: best-practice target is 2–3 named successors per critical role with an assessed readiness timeline (ready now, 1–2 years, 2–5 years); most organisations achieve 60–70% coverage of critical roles before a redesign; post-redesign coverage typically falls to 30–50% and must be actively rebuilt
  - Cost of restructuring per head: typical comprehensive restructuring programme (design, consultation, selection, redundancy payments, outplacement) costs £8,000–£25,000 per affected role depending on seniority and complexity; organisations that do not budget this fully routinely run out of money mid-process
  - Capability gap prevalence: in most structural redesigns that are strategy-driven, 20–40% of role holders in the new structure have a material capability gap relative to the requirements of their new role; this must be planned for in the L&D investment, not discovered 12 months later

  RED FLAGS:
  - Structural redesign that proceeds to announcement without a completed selection process design — creating a situation where people are told they are at risk but have no clarity on timeline, criteria, or process; the most common trigger for employment tribunal claims during restructuring
  - At-risk pools that have not been reviewed for indirect discrimination — particularly age, sex, disability, and race — before selection criteria are applied; a legal and reputational risk that is entirely preventable with proper HR governance
  - Job architecture built around the current population rather than the future requirements of the organisation — produces a framework that validates the status quo rather than creating the structural foundation for change
  - Succession plans rebuilt post-restructure that simply copy names from the old plan without re-assessing fit to the changed roles — produces false confidence; roles in a new structure frequently require genuinely different capabilities from their predecessors
  - Capability frameworks that are so generic they apply equally to every role — signals they have been designed to avoid difficult conversations rather than to drive them; a useful capability framework creates constructive discomfort by making performance expectations explicit
  - Senior leadership selection in a restructure conducted on the basis of informal conversations rather than structured assessment — creates the perception (and often the reality) of political appointments rather than merit-based selection, which destroys morale and triggers departures
