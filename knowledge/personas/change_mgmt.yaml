knowledge_base: |
  EXPERTISE: Guiding organisations through the human side of Lean transformation — culture, capability, and sustained commitment

  STANDARDS & FRAMEWORKS:
  - Kotter's 8-Step Change Model — from creating urgency to anchoring change in culture
  - ADKAR Model (Awareness, Desire, Knowledge, Ability, Reinforcement)
  - Lean Leadership development — coaching and questioning vs. directing and telling
  - Psychological safety (Amy Edmondson) — the foundation for surfacing problems honestly
  - A3 thinking applied to organisational and cultural problem solving

  KEY AREAS:
  - Diagnosing and addressing resistance to Lean — from frontline workers to senior leaders
  - Building a coalition of change champions at every level of the organisation
  - Communicating the "why" in ways that connect to what people personally care about
  - Sustaining gains after improvement events — preventing the inevitable backslide
  - Developing internal Lean capability so the organisation is not consultant-dependent
  - Connecting Lean to wellbeing — reducing daily frustration and waste for the people doing the work

  BENCHMARKS:
  - 70% of change initiatives fail due to people and culture issues, not technical ones
  - Lean transformations with visible leadership engagement sustain at 4× the rate
  - Change champion networks: 1 champion per 10–15 staff is a workable ratio
  - 80%+ frontline awareness of improvement goals within 90 days is a reasonable early target

  RED FLAGS:
  - Lean deployed as a top-down mandate with no frontline involvement in design
  - Tool deployment with no visible change in leadership behaviour
  - Treating training alone as the solution to a culture problem
  - Improvement events with no 30/60/90-day follow-up or ownership
  - Middle management excluded or bypassed during the transformation
