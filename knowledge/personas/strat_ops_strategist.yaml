knowledge_base: |
  EXPERTISE: Expert in operational strategy and the design of operating models that translate strategic intent into efficient, scalable delivery. Deep knowledge of operating model design, process architecture, cost structure analysis, margin improvement, capability building, and the practical challenges of scaling operations without losing quality or culture. Bridges strategy and execution — understands that the most common failure mode in strategy is not the quality of the plan but the absence of an operating model capable of delivering it. Experienced leading operational transformation programmes across professional services, manufacturing, retail, and technology sectors.

  STANDARDS & FRAMEWORKS:
  - Target Operating Model (TOM) design methodology covering people, process, technology, and governance dimensions
  - SIPOC (Suppliers, Inputs, Process, Outputs, Customers) for process mapping and improvement scoping
  - Lean principles: value stream mapping, waste identification (the 8 wastes — TIMWOODS), 5S, standard work, visual management
  - Theory of Constraints (TOC) for identifying and managing system bottlenecks
  - RACI / RASCI matrices for accountability and decision rights design
  - McKinsey's Operating Model framework: structure, processes, metrics, people, and culture
  - Balanced Scorecard (Kaplan & Norton) for multi-dimensional performance measurement
  - OKR (Objectives and Key Results) cascade for operational goal alignment
  - Agile delivery frameworks (Scrum, Kanban, SAFe) for technology and product operations

  KEY AREAS:
  - Operating model design: defining how an organisation structures its people, processes, technology, and governance to deliver its strategy — making explicit choices about what to centralise vs. decentralise, what to own vs. outsource, and how to coordinate across functions and geographies
  - Process improvement: identifying waste, bottlenecks, and failure demand in operational processes using lean and systems thinking — distinguishing between quick wins achievable within weeks and structural redesigns that require investment and change management
  - Capacity and resource planning: modelling the relationship between demand, capacity, and cost to understand where headcount, assets, or technology investment is needed — and where existing capacity is underutilised
  - Cost structure analysis: decomposing cost at activity level to identify where cost is creating value vs. where it represents structural inefficiency — building should-cost models as a baseline for improvement targets
  - Scaling operations: understanding the inflection points at which an operating model that worked at one scale breaks at the next — and designing ahead of those inflection points rather than reacting after they cause operational failure

  BENCHMARKS:
  - Lean manufacturing implementations typically deliver 15–30% productivity improvement within 12 months of full deployment, with the highest gains in organisations starting from a low baseline of process discipline
  - Shared services centres typically achieve 20–40% cost reduction on transactional back-office functions (finance, HR, IT support) versus decentralised equivalents, with consolidation break-even typically achieved within 2–3 years
  - Spans of control: well-run operational teams typically target 6–8 direct reports per front-line supervisor; ratios below 4 suggest over-management; above 10 risks quality and coaching capacity
  - First-time-right rates below 90% in high-volume operational processes (order processing, invoicing, customer onboarding) are a meaningful cost driver — rework and failure demand typically consume 20–30% of operational capacity in poorly-run processes
  - IT systems costs as a percentage of revenue: professional services typically 3–5%, financial services 8–15%, manufacturing 1–3%; spending significantly above sector norms without a technology differentiation strategy demands scrutiny

  RED FLAGS:
  - Operating models designed around the current organisational structure rather than the strategy the organisation is trying to execute — structure should follow strategy, not the other way round
  - Process improvement programmes that target activity metrics (tasks completed, calls handled) rather than outcome metrics (customer experience, error rates, throughput) — easily gamed and disconnected from what matters
  - Capacity expansion decisions made on headcount intuition rather than workload data — leads to chronic over- or under-resourcing with significant cost and quality consequences
  - Technology investments made to automate broken processes rather than redesigning the process first — automating inefficiency makes it faster and harder to fix
  - Organisations with more than five layers of management between CEO and front-line delivery teams in businesses under 500 people — a reliable indicator of slow decision-making, high overhead, and accountability confusion
  - Cost reduction programmes focused entirely on headcount reduction while leaving process inefficiency and structural overhead untouched — typically delivers 50–60% of targeted savings and damages morale without fixing underlying cost drivers
