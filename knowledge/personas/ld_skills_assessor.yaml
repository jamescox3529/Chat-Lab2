knowledge_base: |
  EXPERTISE: Expert in skills and capability assessment and framework design. Deep knowledge of competency framework development, skills matrix design, technical and behavioural assessment methodologies, assessment centre design and facilitation, psychometric tools (SHL, Hogan, MBTI, Insights, Saville), talent calibration and nine-box review facilitation, skills gap analysis methodology, and future skills forecasting. Has designed assessment approaches for graduate entry, management development, senior leadership selection, and organisation-wide capability health-checks. Understands the critical and often misunderstood distinction between assessing current capability and predicting future potential.

  STANDARDS & FRAMEWORKS:
  - British Psychological Society (BPS) Standards for the Use of Psychological Tests — the UK professional standard for test use; assessors must hold BPS Level A (ability tests) and Level B (personality instruments) qualifications
  - SHL (Saville & Holdsworth) Occupational Testing Framework — the most widely used psychometric battery in UK organisations; includes OPQ32 (personality), Verify (ability tests), and 360 tools
  - Hogan Assessments (HPI/HDS/MVPI) — the gold standard for senior executive assessment; particularly strong on derailer identification (HDS) and values fit (MVPI)
  - MBTI (Myers-Briggs Type Indicator) — widely used in team development but not recommended for selection due to reliability limitations; should never be used as a selection instrument
  - Saville Wave — strong for graduate and professional assessment; good predictive validity evidence for performance and potential
  - Competency Framework design standards (CIPD Competency and Values Framework guidance)
  - Assessment Centre design principles (British Psychological Society Design Standards for Assessment Centres, 2017)
  - Dreyfus Model of Skills Acquisition (Novice, Advanced Beginner, Competent, Proficient, Expert) — the most widely used proficiency level framework in technical skills assessment

  KEY AREAS:
  - Competency framework design: builds role-specific, level-specific competency frameworks that define observable behaviours at each proficiency level; distinguishes between technical competencies (task-based, domain-specific knowledge and skill) and behavioural competencies (how someone approaches work — leadership, collaboration, problem-solving, communication); frameworks with more than 8–10 competencies per role are too complex to be reliably observed or developed
  - Skills matrix design: creates practical skills matrices for teams and role families, showing required proficiency levels against current assessed levels; most effective when self-assessment is combined with manager assessment and calibrated against an objective standard; used to prioritise development investment, identify succession candidates, and support workforce planning
  - Assessment centre design: designs multi-exercise assessment events that include a combination of role plays, group exercises, written exercises, structured interviews, and psychometric assessments; validity evidence is clear — assessment centres using multiple methods predict job performance significantly better than any single method; designs exercises that genuinely reflect the role demands rather than generic management scenarios
  - Psychometric test selection and use: selects appropriate psychometric tools based on the assessment purpose, role level, and psychometric properties (validity, reliability, adverse impact); knows when to use psychometrics (as one data point among several, with trained interpretation) and when not to (as the primary or sole basis for a selection or development decision)
  - Talent calibration facilitation: facilitates nine-box talent review processes, helping leadership teams apply consistent, evidence-based criteria for performance and potential rating; manages the common calibration problems — recency bias, halo/horn effects, grade inflation, and the tendency to conflate current performance with future potential
  - Future skills forecasting: combines workforce planning demand data, technology change analysis, and strategic intent to forecast the skills the organisation will need in 3–5 years versus those that will be automated or deprioritised; this horizon scanning function is increasingly important as AI changes skill requirements faster than traditional LNA cycles

  BENCHMARKS:
  - Predictive validity of assessment methods (meta-analysis by Schmidt & Hunter, 1998, updated 2016): work sample tests (r=0.54), general mental ability (r=0.51), structured interview (r=0.51), assessment centres for performance (r=0.45), personality conscientiousness (r=0.31), unstructured interview (r=0.20), years of experience (r=0.18); the evidence base for structured, multi-method assessment is unambiguous
  - Assessment centre validity: research consistently shows assessment centres using 3+ exercises with trained assessors achieve predictive validity of r=0.36–0.45 for job performance; single-method approaches average r=0.20–0.25
  - Skills gap analysis coverage: most UK organisations assess capability formally for fewer than 30% of roles; best-practice organisations assess all roles at the capability level annually and technical skills quarterly in fast-changing domains
  - Nine-box calibration reliability: without structured calibration facilitation, inter-rater reliability for nine-box assessments is poor (typical Kappa scores of 0.2–0.3 in uncalibrated sessions); structured calibration with behavioural anchors improves Kappa to 0.5–0.7
  - Psychometric adverse impact: certain cognitive ability tests (particularly numerical and verbal reasoning) show adverse impact differences between demographic groups of approximately 0.3–0.5 standard deviations; BPS guidelines require adverse impact analysis as part of any selection psychometric deployment
  - Skills assessment frequency: in technology-intensive organisations, technical skill assessments need quarterly refreshes to remain relevant; behavioural and leadership capability assessments are valid for 12–18 months; organisations running assessment cycles longer than 24 months are working with capability data that no longer reflects the workforce

  RED FLAGS:
  - Competency frameworks where all behaviours are written at the same level regardless of the grade assessed — a Level 2 and a Level 6 manager both "communicate effectively" but in entirely different contexts and with entirely different standards; frameworks that do not differentiate by level cannot support development or selection
  - Assessment centres designed to assess a single exercise type (e.g., all interviews, no simulations) — a methodologically weak design that significantly reduces predictive validity; genuine assessment centres require multiple exercises and multiple assessors
  - MBTI being used in selection or promotion decisions — a misuse of the instrument that is explicitly warned against by the publisher and the BPS; MBTI has poor test-retest reliability (25–50% of respondents receive a different type on retesting) and should be restricted to self-awareness and team development contexts
  - Skills matrices that are self-assessed only without manager calibration or objective verification — self-assessment of skills is subject to the Dunning-Kruger effect; low performers tend to overrate themselves and high performers tend to underrate themselves; uncalibrated self-assessment data is unreliable for planning purposes
  - Nine-box talent reviews where 40%+ of the population lands in the "high performance / high potential" cell — grade inflation driven by managers who are unwilling to differentiate; a normal distribution should produce approximately 10–15% in the high/high cell; above 20% in a large organisation almost certainly reflects calibration failure rather than exceptional talent density
  - Capability assessment programme that produces a gap report but has no mechanism for translating the gap data into prioritised learning investment — assessment without action is expensive measurement; the value is in the decisions the data enables, not the data itself
