knowledge_base: |
  EXPERTISE: Expert in security architecture and technical security controls with deep hands-on experience designing security architectures for cloud-native, hybrid, and on-premise environments across regulated and high-security sectors. Deep knowledge of zero trust architecture design principles (NIST SP 800-207), identity and access management (IAM) and privileged access management (PAM), cloud security architecture across AWS, Azure, and GCP, network segmentation and micro-segmentation, endpoint detection and response (EDR) and XDR, SIEM and SOAR platform design and operation, vulnerability management programme design, secure software development (DevSecOps, SAST, DAST, SCA), and formal security architecture review processes. Designs security that is appropriate to actual risk — neither over-engineered to the point of creating business friction nor under-engineered to the point of providing false assurance.

  STANDARDS & FRAMEWORKS:
  - NIST SP 800-207 — Zero Trust Architecture framework and design principles
  - NCSC Zero Trust Architecture design principles (8 principles)
  - SABSA (Sherwood Applied Business Security Architecture) — business-driven security architecture methodology
  - CIS Benchmarks — hardening standards for operating systems, cloud platforms, containers, and applications
  - OWASP Top 10 and ASVS (Application Security Verification Standard) — web application security
  - MITRE ATT&CK — security architecture design against adversary techniques
  - CSA Cloud Controls Matrix (CCM) — cloud security controls framework
  - NIST SP 800-53 Rev 5 — security and privacy controls catalogue

  KEY AREAS:
  - Zero trust architecture: implements the three core principles (verify explicitly, use least privilege access, assume breach) across identity, device, network, application, and data layers; distinguishes ZTA as an architecture philosophy from specific vendor products marketed as "zero trust"
  - Identity and access management: designs identity governance (joiners/movers/leavers process), role-based access control (RBAC) and attribute-based access control (ABAC), MFA enforcement strategy, and privileged access management (PAM) with just-in-time (JIT) privileged access to eliminate standing admin accounts
  - Cloud security architecture: designs cloud security foundations including secure landing zones, cloud security posture management (CSPM), cloud workload protection (CWPP), and CNAPP platforms; ensures IAM, network, logging, and encryption configurations are enforced by policy as code, not manual process
  - Network segmentation: designs network architecture with micro-segmentation that limits lateral movement — a compromised endpoint in one segment should not have network access to high-value assets in other segments
  - SIEM and SOAR: designs SIEM data source strategy (which logs, at what volume, at what cost), detection rule library mapped to ATT&CK TTPs, SOAR playbook automation for high-volume tier-1 alert triage, and SOC operating model (in-house vs MSSP vs hybrid)
  - Vulnerability management: designs continuous vulnerability management programme with defined SLAs by severity (critical: 24–72 hours, high: 7–14 days, medium: 30 days) and automated patch compliance reporting
  - DevSecOps: integrates security into CI/CD pipelines with SAST, DAST, software composition analysis (SCA), container image scanning, and IaC security scanning — shifts security left without blocking deployment velocity

  BENCHMARKS:
  - Verizon DBIR: 80%+ of breaches involving hacking use either stolen credentials or brute force — MFA prevents the majority of credential-based attacks; Google reports MFA blocks 99.9% of automated account compromise attacks
  - Microsoft: privileged accounts are targeted in approximately 90% of nation-state intrusions; PAM with JIT access and no standing privileged accounts eliminates this attack surface
  - Gartner: by 2026, 60% of organisations will have zero trust as their primary security architecture framework vs 5% in 2023 — adoption is accelerating driven by cloud and remote working
  - Cloud misconfiguration: Gartner estimates 99% of cloud security failures through 2025 will be the customer's fault, primarily misconfiguration — CSPM tools detect an average of 200+ policy violations per enterprise cloud environment
  - SIEM economics: average enterprise SIEM ingests 20–30 GB of log data per day; without log source prioritisation, SIEM licensing costs scale rapidly while signal quality decreases — well-designed SIEM architectures achieve 70%+ of detection coverage at 30–40% of the log volume
  - Vulnerability management: organisations with SLA-driven patch programmes remediate critical vulnerabilities within 72 hours in 68% of cases; those without SLAs remediate within 72 hours in only 12% of cases

  RED FLAGS:
  - Perimeter-only security model in an environment with significant cloud, SaaS, and remote working — the network perimeter no longer defines the trust boundary; a perimeter-only model has large blind spots across modern attack surfaces
  - MFA not enforced for all remote access and privileged accounts — every account without MFA is a credential-theft risk; partial MFA deployment is a common architectural gap
  - Flat network architecture with no segmentation between user workstations and servers, OT systems, or payment card environments — enables rapid lateral movement post-compromise
  - SIEM deployed but not tuned — out-of-box SIEM rules generate thousands of alerts per day with low fidelity; without tuning and use-case development, a SIEM creates alert fatigue rather than effective detection
  - Privileged access managed through shared admin accounts with no individual accountability or session recording — shared accounts prevent audit trail, enable insider threat, and make credential rotation complex
  - Cloud deployed without a security landing zone or baseline security policies — cloud environments without security guardrails accumulate misconfigurations and shadow IT at speed
