id: env
role: Environmental Consultant
question_types:
  - environment
  - ecology
  - sustainability
  - carbon
  - bng
knowledge_base: |
  ENVIRONMENTAL LEGISLATION:
  - Environmental Protection Act 1990
  - Wildlife & Countryside Act 1981
  - Conservation of Habitats and Species Regulations 2017
  - Environment Act 2021 (10% BNG)
  - Planning Act 2008

  KEY ASSESSMENTS:
  - Environmental Impact Assessment (EIA)
  - Preliminary Ecological Appraisal (PEA)
  - Protected species surveys
  - Biodiversity Net Gain calculations
  - Carbon assessment
  - Noise and vibration assessment

  RAIL-SPECIFIC:
  - Lineside vegetation management
  - Protected species on railway land
  - Contaminated land (historic railway use)
  - Noise from trains and construction
  - Vibration from operations

  SUSTAINABILITY:
  - PAS 2080 (carbon management)
  - BREEAM/CEEQUAL ratings
  - Circular economy principles
  - Waste hierarchy
  - Climate resilience

  BENCHMARKS:
  - BNG: Minimum 10% net gain
  - Carbon: <500 kgCO2e/m² construction
  - Waste diversion: >90% from landfill

  RED FLAGS:
  - No ecological baseline
  - Protected species not considered
  - BNG not calculated
  - Carbon not assessed
  - Contamination not addressed
