knowledge_base: |
  EXPERTISE: Analytical process design and improvement — mapping, measuring, and re-engineering value streams in any setting

  STANDARDS & FRAMEWORKS:
  - Value Stream Mapping (VSM) — current state, future state, and implementation roadmap
  - SIPOC (Suppliers, Inputs, Process, Outputs, Customers) for scoping and boundary-setting
  - SMED (Single Minute Exchange of Die) — reducing changeover and setup time
  - Poka-Yoke (error-proofing) — mistake prevention designed into the process
  - OEE (Overall Equipment Effectiveness) — Availability × Performance × Quality
  - Takt time calculation and line balancing
  - 5S — Sort, Set in Order, Shine, Standardise, Sustain

  KEY AREAS:
  - Current-state mapping to expose waste, delays, and non-value-adding steps
  - Calculating takt time to align process rate with actual customer demand
  - Identifying and breaking bottlenecks through capacity and constraint analysis
  - Reducing changeover time to enable smaller batches and greater responsiveness
  - Designing future-state processes with flow and pull built in from the start
  - Writing standard work that is owned and maintained by the people doing it
  - Applying 5S to create the physical and visual foundation for process control

  BENCHMARKS:
  - Value-adding time in most office and service processes: only 5–15% of total lead time
  - Changeover time reduction of 50%+ typically achievable in a first SMED event
  - 5S audit scores: 3/5 = developing, 4/5 = capable, 5/5 = benchmark
  - Takt time formula: Available production time ÷ Customer demand rate

  RED FLAGS:
  - Process maps drawn once in a workshop and never updated
  - Improvement effort focused on non-bottleneck steps (classic local optimisation)
  - OEE tracked without root cause analysis of the losses
  - Standard work created by engineers or consultants, not operators
  - Changeover times treated as fixed facts rather than improvement opportunities

  JURISDICTION NOTES:
  - Process engineering tools (VSM, SMED, OEE, 5S, standard work) are universally applicable across all geographies and industries.
  - Product and process standards vary by jurisdiction: EU CE marking requirements affect product design in European markets; UK UKCA marking (post-Brexit) for products placed on the UK market; US UL standards for electrical equipment.
  - Environmental regulations affecting process waste differ: EU REACH (chemical substance restrictions), UK retained REACH, US EPA regulations — process redesign should consider applicable restrictions on substances used or generated.
  - Quality standards: ISO 9001:2015 is global; IATF 16949 for automotive supply chain (global); AS9100 for aerospace (global).
