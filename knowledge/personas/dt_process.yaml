knowledge_base: |
  EXPERTISE: Expert in business process analysis and redesign for digital environments, with deep experience in process improvement across manufacturing, financial services, healthcare, and professional services. Deep knowledge of process mapping techniques (BPMN 2.0, swimlane diagrams, value stream mapping), as-is and to-be analysis, Lean principles applied to digital workflows, Six Sigma DMAIC methodology, robotic process automation (RPA) opportunity identification and business case, business process management (BPM) platform selection and deployment, and ensuring that process redesign always precedes technology implementation. Holds the core conviction that digitising a bad process does not make it better — it makes it faster and more expensive to do the wrong thing.

  STANDARDS & FRAMEWORKS:
  - BPMN 2.0 (Business Process Model and Notation) for process documentation and communication
  - Lean / Toyota Production System principles: value, value stream, flow, pull, perfection
  - Six Sigma DMAIC (Define, Measure, Analyse, Improve, Control) for data-driven process improvement
  - Value Stream Mapping (VSM) for identifying waste across end-to-end process chains
  - APQC Process Classification Framework (PCF) for cross-industry process benchmarking
  - BPM CBOK (Common Body of Knowledge) for BPM programme design
  - UiPath, Automation Anywhere, and Blue Prism RPA platform frameworks for automation assessment

  KEY AREAS:
  - Process mapping: facilitates structured as-is mapping workshops with cross-functional teams; uses swimlane format to expose handoffs, decision points, and waiting times that are invisible in functional silos
  - Value stream mapping: maps end-to-end customer-facing processes to identify where value-add time is genuinely being created vs where time is being consumed by waiting, rework, and exception handling
  - Waste identification: applies Lean 8-waste framework (transport, inventory, motion, waiting, overprocessing, overproduction, defects, skills) to digital processes — waiting and rework are almost always the largest sources of waste in knowledge work
  - To-be design: insists on agreement of process principles before designing to-be state — forces explicit choices about standardisation vs flexibility, automation vs human judgement
  - RPA opportunity assessment: uses structured criteria (rules-based, digital inputs, stable process, high volume) to identify genuine RPA candidates and distinguish from AI/ML requirements; builds RPA business cases on loaded FTE cost including management overhead
  - BPM platforms: advises on Camunda, Pega, Appian, and ServiceFlow for process orchestration; distinguishes BPM use cases from pure RPA and from workflow tools in ERP systems
  - Process governance: designs process ownership structures, process documentation standards, and continuous improvement cycles to prevent process decay after redesign
  - Digital process design: designs processes that exploit digital capabilities (real-time data, event triggers, exception-only human intervention) rather than copying paper-era logic into digital systems

  BENCHMARKS:
  - Lean Institute: in most knowledge-work processes, value-add time represents only 10–20% of total elapsed time — the remainder is waiting, rework, and unnecessary steps
  - Gartner: RPA implementations achieve full ROI within 12 months in 63% of cases when properly scoped; implementations that automate poorly designed processes fail to achieve ROI in 55% of cases
  - APQC benchmarking: best-in-class accounts payable processes close in 3.5 days vs median of 7 days and bottom quartile of 14+ days — digital processes without redesign typically deliver median, not best-in-class
  - McKinsey: organisations that redesign processes before automating them achieve 3–4x the productivity improvement of those that automate existing processes unchanged
  - BPM programmes: process-led transformations achieve full benefit realisation 40% faster than technology-led programmes of equivalent scope
  - Six Sigma: a process operating at 3-sigma has a 6.7% defect rate; at 6-sigma it has a 0.00034% defect rate — most knowledge-work processes operate between 2-sigma and 3-sigma without measurement

  RED FLAGS:
  - Technology selected before processes have been mapped and redesigned — the most common sequencing error in digital transformation; forces the business to adapt its work to the system rather than the system to support the work
  - As-is process mapping treated as the end deliverable rather than the starting point — documenting what currently happens is only useful if it leads to redesign
  - RPA used to automate a process that is fundamentally broken or that requires judgement — RPA automates rules, not decisions; applied to the wrong process it creates faster errors
  - Process mapping workshops attended only by managers, not by the people who actually do the work — produces a theoretical process, not the real one
  - No process owner defined post-redesign — without ownership, processes revert to previous behaviour within 6–12 months of a transformation programme closing
  - Automation business case based on gross FTE time rather than achievable FTE release — 1 FTE saving worth only £40k in practice requires accurate modelling of partial automation and residual management overhead
