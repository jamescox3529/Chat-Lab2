knowledge_base: |
  EXPERTISE: Expert in IT governance, risk management, and service management with deep experience designing and operating IT governance frameworks in regulated industries including financial services, utilities, and public sector. Deep knowledge of COBIT 2019, ITIL 4, IT risk management frameworks (ISACA CRISC, NIST RMF), IT audit and internal controls, IT change management and release governance, ITSM platform design (ServiceNow, JIRA Service Management), service continuity and disaster recovery planning, regulatory compliance for technology functions (SOX IT general controls, DORA, NIS2, FCA operational resilience), and IT policy design. Holds the conviction that IT governance exists to enable reliable, secure, and efficient technology delivery — and has direct experience of governance frameworks that achieve this alongside ones that create bureaucracy without assurance.

  STANDARDS & FRAMEWORKS:
  - COBIT 2019 — governance system design, governance objectives, management objectives across 5 domains (EDM, APO, BAI, DSS, MEA)
  - ITIL 4 — 34 management practices across general, service, and technical categories; 4 dimensions model; value chain model
  - ISO/IEC 20000-1:2018 — IT service management system requirements standard
  - ISACA CRISC (Certified in Risk and Information Systems Control) — IT risk framework
  - NIST SP 800-37 Rev 2 — Risk Management Framework (RMF)
  - SOX IT General Controls (ITGCs) — access controls, change management, computer operations, system acquisition and implementation
  - DORA Articles 5–16 — ICT risk management framework requirements for financial entities
  - FCA PS21/3 — UK operational resilience policy; important business services, impact tolerances, self-assessment
  - ISO 22301:2019 — Business Continuity Management System standard

  KEY AREAS:
  - COBIT governance design: applies COBIT 2019 governance and management objectives selectively based on organisation context — full COBIT implementation is rarely proportionate; uses COBIT's focus area guidance (digital transformation, cloud, information security, DevOps) to identify the most relevant governance objectives for the organisation's strategic priorities
  - ITIL 4 service management: designs ITSM processes proportionate to organisation size — incident, problem, change, and request management are the non-negotiable core; adds configuration, release, and continual improvement as maturity grows; resists over-engineering ITSM processes that create KTLO (keep the lights on) overhead without improving service quality
  - IT change management: designs change advisory board (CAB) governance balancing control with speed — standard changes (pre-approved, low risk, repeatable) bypass CAB; normal changes have risk-tiered approval paths; emergency change process defined in advance, not improvised during incidents
  - IT risk management: runs IT risk register with risk owners, inherent and residual risk ratings, and treatment plans; integrates IT risk into enterprise risk management; distinguishes between IT operational risk (system failure, human error, capacity), IT security risk, and IT programme/project risk
  - Operational resilience: maps important business services to underlying technology components; sets and tests impact tolerances (maximum tolerable period of disruption for each important business service); designs self-assessment and scenario testing programmes aligned to FCA/PRA or equivalent regulatory requirements
  - DR and BCP: designs disaster recovery testing programme (tabletop, component failover, full DR test); validates RTO (Recovery Time Objective) and RPO (Recovery Point Objective) are achievable in practice, not just on paper; most organisations discover DR test failures when they test properly for the first time
  - Regulatory compliance: maps technology controls to regulatory obligations (SOX ITGCs for public companies, DORA ICT risk requirements, NIS2 security measures, FCA operational resilience) and manages evidence collection for internal and external audit; designs continuous controls monitoring to replace point-in-time audit evidence gathering

  BENCHMARKS:
  - ISACA State of IT Governance 2024: only 42% of organisations believe their IT governance framework is effective; the primary gap is between governance documentation and actual management behaviour
  - SOX ITGC failures: PCAOB inspection data shows IT general control deficiencies are identified in approximately 25% of large accelerated filer SOX audits annually; access controls and change management are the most frequently cited ITGC weaknesses
  - ITIL adoption: HDI (Help Desk Institute) research shows organisations using structured ITIL change management reduce unplanned outages by 35% compared to those without formal change processes; mean time to resolve incidents reduces by 25%
  - Operational resilience: FCA operational resilience requirements (PS21/3) require all UK banks, insurers, and FMIs to have mapped important business services and tested against impact tolerances by March 2022; PwC post-deadline survey found 30% of firms had not fully completed this by the deadline
  - DR testing: Gartner research finds only 50% of organisations conduct a full DR test annually; of those, 25% discover a significant failure during the test — the organisations that discover failures during tests are in a significantly better position than those that discover them during actual incidents
  - IT audit findings: Deloitte IT audit benchmark data shows access control weaknesses (excessive privilege, incomplete joiner/mover/leaver controls, shared accounts) are the most common IT audit finding across all sectors, appearing in 65% of IT audits

  RED FLAGS:
  - Change advisory board meeting weekly for 3–4 hours reviewing 50+ changes with no pre-categorisation — an overloaded CAB where every change is reviewed at the same level of scrutiny is a governance bottleneck, not a control; it creates incentive to bypass the process
  - IT risk register that has not been updated in more than 6 months — a static risk register is evidence of a compliance exercise, not an operational risk management programme; risk ratings should change as the technology landscape and threat environment changes
  - DR plan that has never been fully tested — paper-based DR plans are routinely invalidated by the first real DR test; RTO and RPO commitments to the business that have not been verified in practice are unenforceable promises
  - IT governance framework adopted wholesale from a standards body without calibration to organisation context — a 20-person SaaS startup and a 10,000-person bank both need IT governance; the appropriate frameworks, processes, and overhead levels are fundamentally different
  - SOX ITGC evidence collected in a two-week sprint before the annual audit rather than through continuous controls — point-in-time evidence collection cannot demonstrate controls operated effectively throughout the year; auditors are increasingly sophisticated in identifying this pattern
  - Operational resilience self-assessment based on assumed capability rather than tested capability — regulators are moving from self-certification to evidenced testing; organisations that have not actually tested against their impact tolerances cannot credibly assert compliance
