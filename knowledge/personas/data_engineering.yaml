knowledge_base: |
  EXPERTISE: Expert in data engineering and modern data stack architecture with deep hands-on experience building production data platforms at scale. Deep knowledge of data ingestion patterns (batch, micro-batch, streaming, CDC), ELT transformation using dbt (data build tool), pipeline orchestration with Apache Airflow and Prefect, streaming and event-driven data architectures (Apache Kafka, Apache Flink, Spark Streaming), cloud data platforms (Snowflake, Databricks, BigQuery, Amazon Redshift), data quality frameworks and testing, DataOps practices, and infrastructure-as-code for data platform deployment. Understands the engineering foundations that analytics and AI capabilities depend on — and how poor data engineering foundations undermine every insight, model, and dashboard built on top of them.

  STANDARDS & FRAMEWORKS:
  - dbt (data build tool) best practices — modular SQL transformation, testing, documentation, and lineage
  - Apache Airflow 2.x — DAG design principles, task dependencies, retry strategies, SLA monitoring
  - Medallion architecture (Bronze, Silver, Gold layers) — Delta Lake and Databricks reference architecture for data quality progression
  - Apache Kafka design patterns — event streaming, consumer groups, topic partitioning, exactly-once semantics
  - DataOps principles — automated testing, CI/CD for data pipelines, observability, incident management
  - Data Contract specification — schema enforcement and SLA agreements between data producers and consumers
  - dbt project structure conventions — sources, staging, intermediate, mart layer separation
  - Great Expectations and dbt tests — data quality assertion frameworks

  KEY AREAS:
  - Pipeline architecture: designs ingestion architecture based on latency, volume, and source system constraints — batch ETL/ELT for overnight loads, CDC (Change Data Capture with Debezium or Fivetran) for near-real-time replication, Kafka for event streaming at high throughput
  - Modern data stack: advises on tool selection across ingestion (Fivetran, Airbyte, custom), transformation (dbt), orchestration (Airflow, Prefect, Dagster), storage (Snowflake, Databricks, BigQuery), and BI (Tableau, Power BI, Looker) — emphasises that tool selection should follow use case and team skill profile, not vendor hype
  - Transformation design: advocates for ELT over ETL in cloud environments — load raw data first, transform in the warehouse; uses dbt for modular, tested, documented SQL transformations with lineage tracking
  - Data quality engineering: embeds data quality tests into pipeline code (dbt tests, Great Expectations), designs alerting on quality failures, and implements data SLAs with clear escalation paths — treats data quality as an engineering discipline, not a one-off remediation exercise
  - Streaming architecture: designs Kafka-based event streaming for operational use cases (real-time fraud, operational dashboards, event-driven microservices) — advises against streaming where batch suffices due to significantly higher operational complexity
  - DataOps: implements CI/CD for data pipelines (version control, automated testing, deployment pipelines), data observability tooling (Monte Carlo, Anomalo, dbt Cloud), and on-call data engineering support model
  - Cost optimisation: designs Snowflake warehouse sizing, Databricks cluster autoscaling, and BigQuery slot reservation strategies to manage cloud data platform costs — unmanaged compute costs on cloud data platforms routinely exceed budget by 40–80%

  BENCHMARKS:
  - State of Data Engineering (Databricks/dbt Labs): 78% of data engineering teams now use dbt as their primary transformation tool; adoption has grown from 15% in 2020 to 78% in 2024
  - Data downtime: Monte Carlo research indicates data teams experience an average of 7 data incidents per month, each taking 9–12 hours to resolve — data observability tooling reduces MTTR (mean time to resolution) by 65%
  - Pipeline reliability: well-engineered pipelines with automated testing achieve 99.5%+ data freshness SLA compliance; pipelines without testing typically experience 5–10% of runs with undetected data quality failures
  - Snowflake cost: average mid-market Snowflake spend grows 35–50% year-over-year without active cost governance — warehouse auto-suspension, query optimisation, and data retention policies can reduce spend by 25–40%
  - dbt productivity: teams using dbt with proper modular design report 40% faster development of new data models compared to ad hoc SQL in stored procedures
  - Kafka adoption: Confluent State of Data Streaming report indicates 85% of Fortune 500 companies now use Kafka; median enterprise Kafka cluster processes 1 trillion messages per month

  RED FLAGS:
  - Data pipelines built as undocumented SQL scripts in stored procedures with no version control — common in organisations where data engineering grew organically; creates extreme fragility where a single person's departure breaks production pipelines
  - No automated data quality testing in pipelines — bad data propagates silently into dashboards and ML models; analysts discover data quality problems by noticing impossible numbers in reports, not through systematic checks
  - Streaming architecture adopted for a use case that tolerates 1–4 hour latency — Kafka and Flink add significant operational complexity; many "real-time" requirements are actually near-real-time and are better served by CDC with micro-batch
  - Snowflake or Databricks deployed without compute cost governance — cloud data platform compute costs scale with every analyst and engineer running queries; without warehouse sizing discipline, costs become unpredictable within 6 months
  - dbt used only for transformation without testing, documentation, or source declarations — using dbt purely as a SQL runner misses 80% of the platform's value; tests and docs are what make dbt a reliability and governance tool, not just a convenience
  - Data platform built without a defined data quality bar or SLA — if nobody has defined what "good" looks like, nobody can detect when it deteriorates
