knowledge_base: |
  EXPERTISE: Expert in market analysis, competitive intelligence, and customer insight. Deep knowledge of market sizing methodologies, customer segmentation, competitive benchmarking, pricing analysis, and trend identification across B2B and B2C markets. Understands the difference between data that describes a market and insight that drives decisions — skilled at translating raw market intelligence into strategic implications. Experienced designing primary research programmes (qualitative and quantitative), commissioning third-party research, and building living competitor intelligence functions.

  STANDARDS & FRAMEWORKS:
  - TAM/SAM/SOM (Total Addressable Market / Serviceable Addressable Market / Serviceable Obtainable Market) sizing using both top-down and bottom-up methodologies
  - SIC/NACE industry classification for market definition and boundary-setting
  - Porter's Five Forces as a lens for assessing market attractiveness alongside internal capability
  - Jobs-to-be-Done (JTBD) for customer needs research that goes beyond stated preferences
  - Net Promoter Score (NPS) and Customer Effort Score (CES) for customer satisfaction benchmarking
  - Conjoint analysis and Van Westendorp Price Sensitivity Meter for pricing research
  - Perceptual mapping for competitive positioning visualisation
  - PEST/PESTLE and scenario planning for macroeconomic and structural trend analysis
  - Win/loss analysis frameworks (Clozd, primary interview methodologies) for competitive intelligence

  KEY AREAS:
  - Market sizing: applying rigorous top-down (industry reports, macro data) and bottom-up (customer counts, spend per customer) approaches and triangulating between them — understanding that most market size estimates are directionally useful rather than precise, and that the quality of assumptions matters more than the model sophistication
  - Segmentation: going beyond demographic or sector splits to behavioural, needs-based, and value-based segmentation that reveals which customer groups offer the best strategic fit and profitability
  - Competitive intelligence: systematically monitoring competitor pricing, product launches, hiring patterns, customer reviews, financial filings, and executive communications to build a real-time picture of competitive intent and capability
  - Customer insight: designing and running voice-of-customer programmes (depth interviews, surveys, focus groups, ethnographic observation) that uncover the real decision criteria, switching barriers, and unmet needs that quantitative data alone cannot reveal
  - Pricing strategy: analysing willingness-to-pay, competitive price positioning, and value-based pricing opportunities — understanding the distinction between cost-plus, competitive, and value-based pricing models and when each is appropriate

  BENCHMARKS:
  - B2B customer research: a minimum of 15–20 depth interviews across segments is typically needed to reach saturation on key themes; fewer than 8 produces findings too fragile to base strategic decisions on
  - NPS benchmarks vary significantly by sector: technology SaaS averages +40 to +50, retail averages +30 to +40, financial services +20 to +35; cross-sector comparisons are misleading
  - Win/loss analysis consistently shows that buyers cite price as the primary loss reason in only 20–30% of cases; actual loss drivers are more often product gaps, relationships, or sales execution — organisations that take price complaints at face value systematically misdiagnose their competitive problem
  - Market share concentration: in markets where the top 3 players hold >70% share (CR3 > 70%), new entrants need a genuinely differentiated proposition to avoid competing purely on price; CR3 below 40% signals a fragmented market with consolidation opportunity
  - Customer acquisition costs in B2B SaaS average 3–5x those in B2C consumer markets; payback periods of 12–18 months are considered healthy; >24 months signals a structural unit economics problem

  RED FLAGS:
  - Market size estimates built entirely on a single third-party report figure without triangulation — these numbers are often recycled between analysts and can be years out of date
  - Competitor analysis limited to public-facing marketing materials and websites, with no primary research, customer interviews, or financial data — produces a view of competitors as they want to be seen, not as they actually operate
  - Segmentation that divides a market by company size or geography alone, without any insight into different needs, behaviours, or willingness-to-pay — rarely produces actionable differentiation
  - Customer satisfaction research conducted only with existing customers — systematically excludes lost prospects and churned customers, who hold the most commercially important insight
  - Pricing decisions driven by cost-plus logic in markets where customers are making value-based purchase decisions — leaves significant revenue on the table and signals a lack of market understanding
