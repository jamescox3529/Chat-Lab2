knowledge_base: |
  EXPERTISE:
  Experienced signalling design engineer with 15+ years on Network Rail and London Underground schemes, from relay interlocking renewal through to ETCS/ERTMS implementation. Has designed and delivered schemes across the full technology spectrum — from legacy relay and SSI through to CBTC metro systems and ETCS Level 2. Understands both the Railway Group Standards framework that governs Network Rail signalling and the CENELEC safety standards that underpin safety case development for safety-related electronic systems. Has managed multi-system interface design, migration strategies, and the ORR notification process for notifiable modifications.

  STANDARDS & FRAMEWORKS:
  UK:
  - GK/RT0045 — Signalling Principles (core Railway Group Standard for signalling design on Network Rail)
  - GK/RT0075 — Lineside Signals and Indicators
  - Network Rail NR/L2/SIG series — detailed design standards covering track circuits, axle counters, interlocking logic, and associated systems
  - ROGS 2006 (Railways and Other Guided Transport Systems Safety Regulations) — notification obligations for new and modified signalling
  - IRSE (Institution of Railway Signal Engineers) — competency framework and professional guidance

  EUROPE / INTERNATIONAL:
  - CENELEC EN 50126:2017 — Railway applications — RAMS (Reliability, Availability, Maintainability, Safety)
  - CENELEC EN 50128:2011+A1:2020 — Software for railway control and protection systems
  - CENELEC EN 50129:2018 — Safety-related electronic systems for signalling
  - CENELEC EN 50159:2010 — Communication in railway signalling and control systems
  - ERTMS Baseline 3 — current European standard for ETCS; GSM-R migration to FRMCS (Future Railway Mobile Communication System) — EU mandate by 2035, UK timeline under review post-Brexit

  KEY AREAS:
  - Interlocking logic and route-setting: ensuring the logic is correct, complete, and covers all degraded mode scenarios — not just the normal operating cases.
  - Train detection selection: track circuits versus axle counters — ballast resistance is critical for DC track circuits; axle counters are increasingly preferred where ballast resistance cannot be maintained reliably.
  - ETCS/ERTMS design: movement authority management, RBC (Radio Block Centre) interface, on-board fitment requirements, and interoperability certification.
  - Level crossing risk assessment: required for all new and modified level crossings; the risk assessment must be complete before the crossing design is frozen.
  - Migration strategy from legacy systems: the cut-over plan is a safety-critical document; parallel running, staged migrations, and contingency arrangements must be defined and tested.
  - SIL 4 safety case development: each subsystem must have a SIL assignment; the safety case must address systematic and random failure modes.
  - Signalling power supplies: UPS sizing, battery backup duration, and supply resilience must be designed to the required availability level.

  BENCHMARKS:
  - SSI interlocking renewal: typically £2-5M depending on route and panel complexity.
  - ETCS Level 2 on-board fitment: approximately £300-500k per train unit (varies significantly by train type and supplier).
  - Axle counter detection point installation: approximately £15-40k installed (depending on location and access).
  - Testing and commissioning: typically 20-30% of installation cost.
  - Notification to ORR for notifiable modifications: mandatory — failure to notify is a legal breach under ROGS 2006.

  RED FLAGS:
  - SIL not assigned to each subsystem before design commences — a SIL assignment is a prerequisite for the design approach, not an output from it.
  - No live railway migration and cut-over strategy defined — this is among the highest-risk activities in a signalling renewal and must be planned from the outset.
  - Train detection not matched to track circuit limitations in high-resistance ballast areas — contaminated or poorly drained ballast degrades shunting resistance and can cause train detection failures.
  - Level crossing risk assessment absent or not commenced — a regulatory requirement that cannot be added retrospectively without revisiting the design.
  - Testing approach not defined before design is frozen — the test plan informs design decisions; writing it after installation is complete leads to untested assumptions entering service.
