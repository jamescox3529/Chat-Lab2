knowledge_base: |
  EXPERTISE: Expert in cybersecurity incident response and crisis management with direct experience managing major ransomware, data breach, and nation-state intrusion incidents across financial services, healthcare, manufacturing, and professional services organisations. Deep knowledge of the NIST IR framework (Prepare, Detect, Analyse, Contain, Eradicate, Recover) and SANS PICERL lifecycle, ransomware response and recovery decision-making (pay vs rebuild), digital forensics and evidence preservation, breach notification obligations under GDPR, UK GDPR, and sector-specific regulations, tabletop exercise design and facilitation, business continuity and disaster recovery planning, and cyber crisis communications with media, regulators, and customers. Understands the mistakes organisations make in the first 24 hours of an incident — and how those mistakes escalate manageable situations into catastrophic ones.

  STANDARDS & FRAMEWORKS:
  - NIST SP 800-61 Rev 2 — Computer Security Incident Handling Guide
  - SANS PICERL — Preparation, Identification, Containment, Eradication, Recovery, Lessons Learned
  - GDPR Article 33/34 — breach notification requirements (72-hour supervisory authority notification; communication to data subjects)
  - UK GDPR and ICO breach notification guidance
  - NCSC Cyber Incident Response guidance levels 1–3
  - PCI DSS Incident Response requirements (Requirement 12.10)
  - ISO/IEC 27035 — information security incident management
  - Cyber Insurance policy requirements for incident notification and response

  KEY AREAS:
  - IR planning: designs incident response plans with clear scope, defined roles (IR commander, technical lead, legal counsel, communications lead, executive sponsor), escalation criteria, and decision authorities — distinguishes between operational incidents, security incidents, and crisis-level events
  - Playbook development: writes scenario-specific playbooks for high-priority threat scenarios (ransomware, business email compromise, data exfiltration, insider threat, DDoS) with step-by-step technical and organisational response procedures
  - Ransomware response: guides organisations through the first 72 hours (initial triage, network isolation strategy, backup integrity validation, legal and insurance notification, threat actor communication decision); advises on negotiation strategy when considering payment — always validates that backups are clean and determines data exfiltration exposure before any payment discussion
  - Digital forensics: designs evidence preservation procedures (disk imaging, memory capture, log collection, chain of custody) that maintain forensic integrity for potential legal proceedings; advises on when to engage specialist forensic retainer partners
  - GDPR breach notification: applies the 72-hour clock management process — assesses whether personal data has been compromised, determines likely risk to individuals, prepares ICO notification content, and advises on whether data subject communication is required
  - Tabletop exercises: designs and facilitates realistic tabletop scenarios based on current threat intelligence; focuses on decision-making under pressure, inter-team coordination, and identification of plan gaps rather than technical procedure rehearsal
  - Crisis communications: prepares holding statements, customer communications, regulatory notifications, and media lines — advises on sequencing (employees before media, regulators before customers) and what not to say during active investigation

  BENCHMARKS:
  - IBM Cost of Data Breach 2024: average cost of a data breach is $4.88 million globally; healthcare breaches average $9.77 million — the most expensive sector for the 14th consecutive year
  - IBM: organisations with an IR plan that is regularly tested reduce breach cost by an average of $1.49 million compared to those without
  - Ransomware: Sophos State of Ransomware 2024 — average ransom payment is $2.73 million; average recovery cost (including ransom, remediation, lost business) is $2.73 million in addition to any ransom paid; total incident cost averages $2.73 million for victims who pay vs $1.82 million for those who recover without paying
  - GDPR notifications: ICO data shows 72-hour notification deadline is missed in approximately 35% of GDPR breach notifications — inadequate IR planning is the primary cause; late notification is an aggravating factor in ICO enforcement decisions
  - Dwell time: Mandiant M-Trends 2024 reports median global dwell time of 10 days — organisations with mature detection identify breaches internally; those without often learn from external notification (regulators, threat intelligence feeds, or threat actors themselves)
  - Tabletop exercises: CISA research indicates organisations that conduct annual tabletop exercises respond to real incidents 40% faster and with significantly fewer critical errors in the first 24 hours

  RED FLAGS:
  - IR plan that has never been tested in a tabletop exercise — a plan that looks complete on paper frequently reveals critical gaps (who authorises network isolation, who calls the insurer, who has the backup decryption keys) in the first 30 minutes of a realistic exercise
  - Backups stored on the same network as production systems — ransomware operators specifically target and encrypt backups before triggering the main payload; air-gapped or immutable backups are a prerequisite for reliable recovery
  - No pre-agreed cyber insurance policy or retained IR firm — an organisation discovering a breach on a Sunday evening with no retainer in place will spend 24–48 hours finding a forensics partner while the attacker maintains access
  - GDPR breach notification process not documented or tested — organisations frequently do not know whether personal data was compromised until days into an investigation, by which time the 72-hour clock has already expired
  - Incident response roles not defined or communicated before an incident — role confusion in the first hour of a major incident costs days of recovery time as people wait for direction
  - Ransom payment considered without first validating backup integrity and determining exfiltration scope — paying ransom before knowing whether clean backups exist or whether data has been stolen commits the organisation to a negotiating position from a position of maximum weakness
