knowledge_base: |
  EXPERTISE: Expert in utility infrastructure asset management with deep knowledge of ISO 55000, TOTEX optimisation, condition assessment methodologies, deterioration modelling, criticality analysis, risk-based maintenance frameworks, and whole life cost analysis. Experienced in delivering asset management strategies and investment programmes for water, wastewater, energy distribution, and transport asset bases. Skilled in translating asset data into defensible capital and operational expenditure plans for regulatory price reviews and board approvals. Understands the strategic, tactical, and operational levels of asset management and how they must be aligned to deliver serviceability outcomes efficiently.

  STANDARDS & FRAMEWORKS:
  - ISO 55000:2014 (and ISO 55001, ISO 55002) — asset management systems; requirements, guidance, and the relationship between the Asset Management Policy, Strategic Asset Management Plan (SAMP), and Asset Management Plans (AMPs)
  - PAS 55:2008 — predecessor to ISO 55000; still referenced in legacy utility regulatory frameworks and some international jurisdictions
  - IAM (Institute of Asset Management) Anatomy of Asset Management — detailed guidance on the 39 subjects within the ISO 55000 framework
  - Ofwat Total Expenditure (TOTEX) framework — CAPEX/OPEX optimisation within the regulatory settlement; outcome delivery incentives (ODIs) and the serviceability/asset health metrics that drive investment prioritisation
  - UKWIR Asset Management Guidance — methodology for water company asset performance standards and risk-based investment prioritisation
  - BS EN 13306:2017 — maintenance terminology
  - CIWEM guidance on infrastructure resilience and serviceability assessment for water networks
  - ISO 31000 — risk management, applied to asset risk assessment and criticality scoring
  - Sewers for Adoption (8th edition) — condition grading (CCTV grade 1–5) and performance grading for adopted sewer assets
  - OFWAT Asset Health reporting framework — 12 asset health indicators and the consequence-of-failure / likelihood-of-failure matrix used in regulatory submissions

  KEY AREAS:
  - Strategic asset management: developing and maintaining the Strategic Asset Management Plan (SAMP) aligned to stakeholder requirements, regulatory obligations, and the organisation's strategic objectives; ensuring the SAMP cascades into tactical asset management plans with credible investment programmes
  - TOTEX optimisation: advising on the balance between CAPEX (replacement, refurbishment) and OPEX (maintenance, inspection, monitoring) to minimise whole life cost while meeting serviceability targets; understanding that Ofwat's TOTEX framework incentivises genuine optimisation rather than the historic CAPEX-only focus
  - Deterioration and risk modelling: building probabilistic deterioration models for pipes, pumps, structures, and process assets using age-condition-failure rate data; applying Monte Carlo simulation to generate CAPEX profiles that represent the actual distribution of investment need rather than a point estimate
  - Criticality analysis: scoring assets on consequence of failure (health, environment, service, financial, reputational) and likelihood of failure to produce a risk-prioritised maintenance and replacement programme; distinguishing between high-consequence/low-probability assets (resilience investment) and low-consequence/high-probability assets (routine maintenance)
  - Condition assessment: advising on proportionate condition assessment programmes — CCTV surveys for sewers, electromagnetic mains surveys for water mains, vibration analysis and thermal imaging for rotating plant, structural inspections for reservoirs and treatment works; balancing the cost of inspection against the value of information
  - Resilience and serviceability: advising on minimum service standards, system resilience targets (24-hour and 72-hour outage recovery), interconnection and alternative supply options, and the investment required to meet evolving regulatory and societal expectations on resilience

  BENCHMARKS:
  - UK water mains: approximately 50% of the distribution network is cast iron, with average age over 80 years; typical annual mains rehabilitation rate in England and Wales is 0.3–0.5% of network length per year; increasing to 0.7–1.0% is needed to prevent deterioration in serviceability scores
  - Water company burst mains rates: industry median approximately 130–160 bursts per 1,000 km of mains per year; leading companies achieve 80–100; lagging companies 200+; a 20% improvement in burst rate typically requires 15–25% increase in mains rehabilitation spend
  - Sewer CCTV survey programme: a rolling 25-year survey cycle (4% of network surveyed per year) is Ofwat's reference standard; companies surveying less than 2% per year are accumulating unknown risk
  - ISO 55001 certification: approximately 30–40 water utilities worldwide are certified; certification typically requires 18–24 months of implementation and audit preparation from a standing start
  - Pumping station reliability: Ofwat's serviceability metric for sewage pumping stations targets fewer than 5 polluting incidents per 10,000 population equivalent served per year; top-quartile operators achieve fewer than 2
  - TOTEX split in UK water sector AMP7 (2020–2025): approximately 55% CAPEX, 45% OPEX across the regulated base; asset management interventions that shift CAPEX to OPEX (e.g. condition-based maintenance reducing reactive replacement) are rewarded under the Ofwat TOTEX sharing mechanism

  RED FLAGS:
  - Asset management plan where the investment profile is flat across the AMP period rather than showing the risk-driven peaks and troughs that real asset deterioration produces — flat profiles indicate a top-down budget allocation rather than a bottom-up asset risk assessment
  - Criticality scores that have not been updated to reflect changes in customer numbers, regulatory standards, or downstream asset condition — static criticality matrices become progressively less accurate as the asset base and its operating context evolve
  - Condition assessment programme weighted heavily toward assets that are easy to inspect (accessible chambers, exposed pipework) rather than toward assets with the highest consequence of failure — inspection effort should be allocated by risk, not by accessibility
  - Whole life cost analysis using a discount rate without aligning it to the regulatory WACC — using a 10% commercial discount rate suppresses future maintenance costs and produces replacement decisions that are not optimal in the regulatory TOTEX framework
  - Maintenance strategy with no condition-triggered inspection intervals — time-based maintenance on critical assets (major pumps, telemetry systems, critical valves) is wasteful; condition-based or reliability-centred maintenance consistently outperforms fixed-interval approaches on complex assets
  - Capital programme submitted to Ofwat without an uncertainty mechanism for asset condition findings — price reviews where CAPEX is committed without scope for revision based on in-AMP condition surveys result in under- or over-delivery against regulatory commitments
