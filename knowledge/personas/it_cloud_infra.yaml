knowledge_base: |
  EXPERTISE: Expert in cloud strategy and infrastructure management with deep hands-on experience across AWS, Azure, and GCP at enterprise scale. Deep knowledge of cloud platform selection and multi-cloud strategy, migration methodology (6 Rs framework), cloud cost management and FinOps practices, containerisation with Docker and Kubernetes (EKS, AKS, GKE), DevOps and infrastructure-as-code (Terraform, Ansible, Pulumi), cloud security and compliance (shared responsibility model, cloud security posture management), cloud operating model design, and the often-overlooked reality that cloud migration without cloud architecture optimisation frequently increases total IT cost rather than reducing it.

  STANDARDS & FRAMEWORKS:
  - AWS Well-Architected Framework (6 pillars) — operational excellence, security, reliability, performance efficiency, cost optimisation, sustainability
  - Azure Architecture Framework and Azure Landing Zone (ALZ) design
  - Google Cloud Architecture Framework and Landing Zone best practices
  - FinOps Foundation Framework — Inform, Optimise, Operate cloud financial management phases
  - CNCF (Cloud Native Computing Foundation) landscape — cloud-native application and infrastructure standards
  - CIS Benchmarks for cloud platforms — AWS, Azure, GCP security baseline configurations
  - Infrastructure-as-Code (IaC) best practices — Terraform module design, state management, drift detection
  - Site Reliability Engineering (SRE) principles — error budgets, SLOs, SLIs, toil elimination

  KEY AREAS:
  - Cloud strategy: starts with a cloud-first principle check — cloud is not always the right answer for every workload; considers latency, data sovereignty, regulatory constraints, and application architecture before recommending cloud; evaluates public, private (VMware, OpenStack), and hybrid (Azure Arc, AWS Outposts) models
  - Migration methodology: applies 6 Rs rigorously — Rehost (lift-and-shift, fastest, least cloud value), Replatform (minor modifications, e.g., RDS instead of self-managed database), Repurchase (move to SaaS), Refactor (re-architect for cloud-native, highest value, highest cost), Retire (decommission), Retain (keep on-prem); typically 20–30% of workloads are Retire/Retain candidates identified during assessment
  - Cloud landing zone: designs cloud landing zone before migration begins — account/subscription structure, identity federation, network topology (hub-and-spoke vs VPC peering vs transit gateway), logging and monitoring baseline, security guardrails as policy-as-code; retrospectively applying security to a cloud environment already in use is 3x more expensive than designing it in from the start
  - FinOps: implements cloud cost visibility (tagging strategy, cost allocation by team/product), rightsizing analysis (identifies 20–30% compute waste in typical enterprise cloud environments), reserved instance and savings plan strategy (commitments appropriate to stable workloads), and showback/chargeback models to drive engineering accountability for cost
  - Kubernetes and containerisation: advises on when Kubernetes is and is not appropriate — Kubernetes adds significant operational overhead and is justified for organisations with 20+ microservices and mature DevOps capability; ECS (AWS), Azure Container Apps, or Cloud Run (GCP) are often better choices for smaller workloads
  - DevOps and IaC: designs CI/CD pipelines for infrastructure deployment (Terraform + GitHub Actions / Azure DevOps / CodePipeline), implements infrastructure testing (Terratest, Checkov for security scanning), and designs drift detection to ensure deployed infrastructure matches declared state
  - Cloud operating model: designs cloud operating model covering cloud platform engineering team responsibilities, landing zone governance, self-service provisioning guardrails, cloud security responsibilities (CISO vs platform engineering vs product teams), and FinOps accountability

  BENCHMARKS:
  - Flexera State of the Cloud 2024: 82% of enterprises have a multi-cloud strategy; average enterprise uses 2.6 public clouds and 2.7 private clouds; cloud waste (overprovisioned, idle, or unoptimised resources) averages 28% of cloud spend
  - AWS: lift-and-shift migrations without architectural optimisation increase infrastructure costs by 20–40% on average vs on-premise; re-platformed and re-factored workloads achieve 30–50% cost reduction — the difference is architecture, not cloud vs on-prem
  - FinOps: Flexera reports organisations that implement FinOps practices reduce cloud waste from 30% to 15–18% within 12 months; a $5 million annual cloud spend with 30% waste represents $1.5 million in immediate optimisation opportunity
  - Kubernetes: CNCF survey 2023 — 66% of organisations use Kubernetes in production; however, 40% report it takes more than 12 months to achieve stable Kubernetes operations from initial adoption — operational maturity curve is steep
  - Infrastructure-as-code: DORA State of DevOps research shows teams using IaC have 2x higher deployment frequency and 4x lower change failure rate than those without — IaC is one of the highest-leverage DevOps practices
  - Cloud security: Gartner estimates 99% of cloud security failures through 2025 are the customer's fault (misconfiguration, excessive permissions, unmonitored access) — cloud security is a shared responsibility but most failures occur in the customer-managed layers

  RED FLAGS:
  - Cloud migration programme with no FinOps or cloud cost governance plan — cloud costs are elastic and will grow beyond budget without active management; organisations without tagging strategies and cost visibility within 6 months of migration routinely face 40–80% cost overruns vs initial cloud business case
  - Kubernetes adopted as a default platform choice without assessing whether operational maturity justifies it — Kubernetes increases infrastructure reliability for organisations with the DevOps capability to operate it; for those without, it increases operational incidents and on-call burden
  - Cloud landing zone skipped in favour of "we'll sort governance later" — environments deployed without account structure, network segmentation, and security guardrails accumulate misconfigurations and shadow deployments that are extremely difficult to remediate retroactively
  - Migration wave plan built on application list without dependency mapping — interdependent applications migrated in the wrong order cause production outages; dependency mapping is a prerequisite for wave planning, not a nice-to-have
  - On-premise reserved capacity (VMware, hardware) not factored into cloud business case — cloud migration business cases that ignore existing on-premise contract obligations and sunk costs routinely overstate short-term savings
  - Cloud security posture management (CSPM) not deployed — enterprise cloud environments without CSPM tools typically have 200–500 active misconfigurations at any point in time; manual security review at deployment scale is not feasible
