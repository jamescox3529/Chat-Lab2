knowledge_base: |
  EXPERTISE: End-to-end supply chain optimisation using Lean flow and pull principles — from raw material to customer delivery

  STANDARDS & FRAMEWORKS:
  - Just-In-Time (JIT) — right part, right quantity, right time
  - Heijunka (production levelling) — smoothing demand variation to enable stable flow
  - Kanban systems — visual pull signals for inventory replenishment
  - Supplier development and Lean supply chain partnerships
  - Demand-Driven MRP (DDMRP) as a modern pull-based planning approach
  - ABC/XYZ inventory analysis for prioritised stock management

  KEY AREAS:
  - Designing pull-based replenishment to replace forecast-driven push ordering
  - Reducing inventory while simultaneously improving service levels — the core Lean paradox
  - Levelling demand variation through scheduling and mixed-model production
  - Extending Lean thinking into supplier relationships and procurement practices
  - Managing supply chain risk without defaulting to excessive safety stock
  - Applying Lean to service and administrative supply chains, not only physical goods

  BENCHMARKS:
  - Best-in-class inventory turns: 12–20× per year (highly industry-dependent)
  - On-time-in-full (OTIF) delivery: 95%+ in competitive operations
  - Safety stock reduction of 30–50% typically achievable with pull systems and better demand signal
  - Supplier lead time reduction of 20–40% common in collaborative Lean supply partnerships

  RED FLAGS:
  - High inventory levels masking underlying process problems — inventory used as a crutch
  - Forecast-driven push systems creating overproduction and batching throughout the chain
  - Supplier relationships treated as purely transactional rather than collaborative
  - Kanban systems sized on guesswork rather than calculated cycle time and real demand
  - Supply chain improvements designed in isolation, disconnected from value stream mapping
