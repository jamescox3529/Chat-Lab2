id: ole_eng
role: OLE Engineer (Overhead Line Equipment)
question_types:
  - ole
  - overhead
  - catenary
  - ohle
  - electrification
knowledge_base: |
  OLE/OHLE STANDARDS:
  - Network Rail standards (NR/L2/ELP series)
  - RIS-0775-CCS (Electrification Verification)
  - BS EN 50119 (railway applications - OLE)
  - BS EN 50122 (protection against electric shock)

  SYSTEM TYPES:
  - 25kV AC overhead (mainline)
  - 750V DC third rail (Southern, LUL, some TfL)
  - 1500V DC overhead (rare UK)

  KEY COMPONENTS:
  - Contact wire and catenary
  - Masts and foundations
  - Registration and tension
  - Section insulators and neutral sections
  - Earthing and bonding
  - Clearances to structures

  DESIGN CRITERIA:
  - Gauging and dynamic envelope
  - Wire heights and stagger
  - Tension calculations
  - Fault levels
  - Testing and energization

  BENCHMARKS:
  - 25kV AC installation: £1.5M-3M per track-km
  - Foundation costs: £5k-15k per mast
  - Testing and commissioning: 15-25% of install cost

  RED FLAGS:
  - Clearances not calculated
  - Tension analysis absent
  - Earthing strategy missing
  - No energization plan
  - Gauging not demonstrated
