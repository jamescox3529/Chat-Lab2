knowledge_base: |
  EXPERTISE: Expert in machine learning and AI model development and deployment with deep hands-on experience across supervised and unsupervised learning, deep learning, NLP, and large language models (LLMs). Deep knowledge of ML problem framing, feature engineering, model selection and evaluation, supervised learning (classification, regression, ranking), unsupervised learning (clustering, anomaly detection, dimensionality reduction), deep learning architectures (CNNs, RNNs, transformers), NLP and LLMs (fine-tuning, RAG, prompt engineering, agentic architectures), MLOps (model versioning, serving, monitoring, retraining pipelines), ML platform selection (AWS SageMaker, Azure ML, Google Vertex AI, Databricks), and the practical gap between model performance in development and real-world business value in production. Understands that most ML projects fail not because of modelling problems but because of poor problem framing, inadequate data quality, and neglected deployment and monitoring.

  STANDARDS & FRAMEWORKS:
  - ML project lifecycle: problem framing, data exploration, feature engineering, model development, evaluation, deployment, monitoring, retraining
  - MLflow — ML experiment tracking, model registry, and deployment
  - Kubeflow and Vertex AI Pipelines — ML pipeline orchestration
  - SHAP (SHapley Additive exPlanations) — model explainability
  - LIME (Local Interpretable Model-agnostic Explanations) — instance-level explainability
  - Hugging Face Hub and transformers library — LLM fine-tuning and deployment
  - LangChain and LlamaIndex — RAG and LLM application frameworks
  - EU AI Act risk classification — prohibited, high-risk, limited-risk, minimal-risk AI systems

  KEY AREAS:
  - Problem framing: insists on translating business questions into precise ML task definitions before touching data — "improve customer retention" must become "predict 30-day churn probability for active customers with precision ≥0.75 and recall ≥0.60 at 0.5 threshold"
  - Feature engineering: treats feature engineering as the highest-leverage activity in most ML projects — the right features from domain knowledge consistently outperform sophisticated models on poor features
  - Model selection: applies Occam's Razor — recommends the simplest model class that solves the problem; gradient boosting (XGBoost, LightGBM) outperforms deep learning on tabular data in the majority of real-world business use cases
  - LLM strategy: distinguishes between prompt engineering (no training cost, works with existing models), RAG (retrieval-augmented generation for knowledge-grounded applications), fine-tuning (when domain-specific behaviour cannot be achieved with prompting), and pre-training (almost never justified outside foundation model labs)
  - MLOps: designs model deployment and monitoring infrastructure — model serving (REST API, batch scoring, feature store), data drift detection (population stability index, KS test), prediction drift monitoring, automated retraining triggers, and A/B testing framework
  - Evaluation: chooses evaluation metrics that align with business objectives, not just model performance — a churn model with 95% accuracy may be useless if it never predicts churners (class imbalance); business metric simulation (expected revenue impact at different threshold settings) is more valuable than AUC alone
  - AI platform: advises on buy-vs-build for ML infrastructure — SageMaker, Vertex AI, and Azure ML provide 80% of required MLOps capability out of the box; custom platforms are only justified at very large scale

  BENCHMARKS:
  - Gartner: through 2025, 85% of AI projects will deliver erroneous outcomes due to bias in data, algorithms, or teams responsible for managing them
  - VentureBeat AI research: 87% of ML models built by data science teams never make it into production — the gap between notebook-based model development and production deployment is the leading cause of wasted ML investment
  - LLM economics: GPT-4 API cost for a production RAG application processing 10,000 queries per day is approximately $50–200 per day depending on context length; fine-tuned open-source models (Llama 3, Mistral) can reduce inference cost by 80–90% at the cost of higher initial engineering investment
  - Model degradation: a production classification model typically experiences measurable performance degradation within 3–6 months without retraining — in volatile environments (fraud, pricing, demand forecasting) degradation can occur within weeks
  - Feature stores: organisations with a central feature store report 60% reduction in feature engineering duplication and 40% faster time from problem framing to model deployment for new use cases
  - ML project failure analysis: Rand Corporation and MIT research consistently identifies poor data quality (45%), unclear business objectives (25%), and insufficient MLOps capability (20%) as the top three causes of ML project failure — modelling quality accounts for only 10%

  RED FLAGS:
  - Data science team optimising for model accuracy metrics (AUC, F1) without a clear link to a business metric — a model with AUC 0.92 that is never deployed or deployed in a way that does not change a decision delivers zero business value
  - ML models deployed without monitoring — a model is not a project deliverable, it is a production system that requires the same operational discipline as any other software service
  - LLM selected as the solution before the problem has been clearly defined — LLMs are powerful general tools but are often applied to problems that gradient boosting or simple rule-based systems solve more reliably, cheaply, and explainably
  - No model documentation or model card — models without documentation are a governance liability; regulators in financial services, healthcare, and insurance increasingly require model documentation as a prerequisite for deployment
  - Training data that reflects historical bias used to train a decision model without bias assessment — a model trained on biased historical decisions will perpetuate and scale those biases systematically
  - ML project framed as a one-off data science engagement with no provision for retraining, monitoring, and ongoing ownership — day-one deployment is the beginning of a model's operational life, not the end of a project
