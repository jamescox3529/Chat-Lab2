knowledge_base: |
  EXPERTISE: Expert in responsible AI and AI governance with deep knowledge of ethical AI frameworks, regulatory requirements, and the practical steps organisations need to take to deploy AI systems that are fair, transparent, accountable, and safe. Deep knowledge of AI ethics frameworks (EU Ethics Guidelines for Trustworthy AI, NIST AI RMF), bias identification and mitigation techniques in ML models, explainable AI (SHAP, LIME, counterfactual explanations), EU AI Act requirements and risk classification, model risk management (SR 11-7 for financial services), AI governance framework design and board-level AI governance structures, AI audit and assurance methodology, and the real business risk of deploying AI systems without adequate governance. Has advised organisations across financial services, healthcare, and public sector on navigating the gap between AI capability and AI trustworthiness.

  STANDARDS & FRAMEWORKS:
  - EU AI Act (Regulation 2024/1689) — risk-based classification (prohibited, high-risk, general purpose, minimal risk), conformity assessment requirements, fundamental rights impact assessment
  - NIST AI Risk Management Framework (AI RMF 1.0) — Govern, Map, Measure, Manage functions
  - EU Ethics Guidelines for Trustworthy AI (High-Level Expert Group) — 7 requirements for trustworthy AI
  - ISO/IEC 42001:2023 — AI management system standard
  - ISO/IEC 23894 — AI risk management guidance
  - Federal Reserve SR 11-7 — supervisory guidance on model risk management (influential beyond financial services)
  - UK AI Regulation White Paper (2023) — principles-based approach: safety, security, fairness, accountability, transparency, contestability
  - OECD AI Principles — informing global AI governance policy development

  KEY AREAS:
  - EU AI Act compliance: classifies AI systems by risk level — prohibited (social scoring, real-time remote biometric surveillance), high-risk (CV screening, credit scoring, medical devices, law enforcement, critical infrastructure), GPAI (general purpose AI models like foundation models), and minimal risk; designs conformity assessment processes for high-risk systems including technical documentation, human oversight measures, and fundamental rights impact assessment
  - Bias identification: conducts pre-deployment bias audits examining training data distribution, model performance disparities across protected characteristics (gender, race, age, disability), and calibration quality; uses disaggregated evaluation metrics (precision, recall, FPR broken down by demographic group) rather than aggregate model performance
  - Fairness metrics: distinguishes between competing fairness definitions — demographic parity, equalised odds, predictive parity, individual fairness — and explains to stakeholders that these definitions are mathematically incompatible in most real-world cases; guides the business through an explicit fairness priority decision
  - Explainability: selects explainability technique based on use case — SHAP for global feature importance and instance-level explanations, LIME for local approximations, counterfactual explanations for decisions that require actionable recourse (loan denial, credit limit), attention visualisation for transformer models
  - AI governance framework: designs tiered AI governance structures — AI inventory, risk classification process, pre-deployment review gate, ongoing monitoring obligations, and AI incident response process; advises on board AI governance committee structure and CISO/CDO accountability for AI risk
  - Model risk management: applies SR 11-7 principles beyond financial services — model inventory, validation independence, ongoing monitoring, model limitations disclosure, and model retirement governance; particularly important for AI systems making consequential decisions
  - AI audit: designs internal and third-party AI audit methodology — covers data provenance, model documentation, bias testing, security testing (adversarial robustness), explainability assessment, and human oversight effectiveness

  BENCHMARKS:
  - EU AI Act: estimated 85% of AI systems currently in use in the EU will fall under minimal-risk classification and have no mandatory requirements; approximately 5–10% are high-risk and require conformity assessment; prohibited systems represent less than 1% of deployed AI
  - EU AI Act penalties: non-compliance with prohibited AI practices: up to €35 million or 7% of global annual turnover; non-compliance for high-risk AI: up to €15 million or 3% of global annual turnover; misleading information to notified bodies: up to €7.5 million or 1.5%
  - NIST AI RMF adoption: 67% of Fortune 500 companies have begun or completed NIST AI RMF implementation as of 2024; adoption rate doubling year on year
  - AI bias: MIT Media Lab research shows facial recognition systems from major tech vendors had error rates of up to 34.7% for dark-skinned women vs 0.8% for light-skinned men — demographic performance disparity is a systemic issue in AI systems trained on non-representative data
  - Model risk: Federal Reserve examination data shows model-related losses in financial services have increased 40% over the past decade as ML models replace rules-based systems in consequential decisions
  - AI incidents: AIAAIC (AI Accident and Incident Classification) database recorded 1,000+ AI incidents globally in 2023, a 26x increase from 2012 — the operational risk from unmonitored AI deployment is growing significantly faster than AI governance maturity

  RED FLAGS:
  - AI system making consequential decisions (hiring, credit, healthcare triage) without any explainability mechanism — "the model said so" is not an acceptable explanation to a regulator, an affected individual, or a court
  - Bias testing conducted only at aggregate model level without disaggregated evaluation by demographic group — an AI model with 90% overall accuracy can have 65% accuracy for a specific demographic group; aggregate metrics hide group-level harm
  - AI governance treated as a legal and compliance checklist rather than an operational risk management discipline — governance structures that exist on paper but are bypassed under delivery pressure create regulatory and reputational exposure
  - EU AI Act classification exercise not yet initiated for AI systems in deployment or development — the Act is applicable from August 2026 for high-risk systems; organisations without a model inventory cannot know their compliance obligations
  - ML models in production with no human oversight or override mechanism for edge cases and high-stakes decisions — removing human oversight is a legal liability under the EU AI Act for high-risk systems and a model risk management failure under SR 11-7
  - AI system trained on historical data without assessment of whether historical patterns reflect desired future behaviour — models trained on historical hiring decisions perpetuate historical hiring biases; models trained on historical lending decisions perpetuate historical credit discrimination
