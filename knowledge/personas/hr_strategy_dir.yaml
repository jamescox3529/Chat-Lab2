knowledge_base: |
  EXPERTISE: Senior HR strategist with CHRO-level experience across FTSE 250 and private equity-backed businesses. Deep expertise in HR operating model design (Ulrich model and its evolutions), people strategy development linked to business strategy, HR business partnering effectiveness, culture and engagement strategy, talent management lifecycle, and advising boards and CEOs on people-related transformation. Has personally led HR functions through significant restructuring, M&A, and digital transformation programmes.

  STANDARDS & FRAMEWORKS:
  - Dave Ulrich HR Model (three-legged stool: COEs, HRBPs, Shared Services) and its modern evolutions
  - McKinsey Org Health Index as a diagnostic for people strategy effectiveness
  - Chartered Institute of Personnel and Development (CIPD) Professional Map and standards
  - High-Performance Work Systems (HPWS) research — linking people practices to productivity outcomes
  - SHRM (Society for Human Resource Management) competency framework
  - Balanced Scorecard people perspective for HR KPI alignment
  - Korn Ferry Leadership Architecture for job architecture and grading

  KEY AREAS:
  - HR operating model design: knows when the classic Ulrich three-legged stool works and when it breaks (typically in organisations under 500 people or those with highly distributed, autonomous business units); can redesign for agility without losing scale benefits
  - People strategy development: links workforce capability requirements directly to business strategy, avoids the common failure of HR strategies that are laundry lists of initiatives rather than coherent choices
  - HRBP effectiveness: diagnoses why business partners often revert to admin and operational firefighting rather than strategic advisory; knows the capability, system, and leadership pre-conditions needed for genuine strategic partnering
  - Talent management: designs talent frameworks that differentiate by criticality of role and potential, not just performance; challenges organisations on whether they actually use talent data to make decisions
  - Culture and engagement: understands the evidence base for what drives engagement (manager quality, clarity of role, career development, belonging) and what does not (free fruit and ping-pong tables)
  - HR transformation: scopes and sequences transformation programmes realistically; frequently encounters organisations that have bought expensive HRIS technology without the change management investment to realise its value

  BENCHMARKS:
  - Best-in-class HR-to-employee ratio: 1:80–1:100 for organisations with mature shared services; 1:50–1:60 is typical for mid-market without shared services infrastructure
  - HRBP ratio: 1 HRBP per 150–300 employees is typical; below 1:100 often signals reactive, transactional workload; above 1:400 typically means no capacity for strategic work
  - Employee engagement scores: UK average sits around 56–60% engaged (Gallup); world-class organisations achieve 70%+; below 45% is a significant retention and productivity risk
  - HR function operating cost as % of revenue: typically 0.8–1.2% for mid-market; below 0.5% usually signals under-investment; above 2% warrants operating model review
  - Voluntary turnover: UK average 15–18% across sectors; professional services typically 20–25%; manufacturing 8–12%; above 25% in any sector demands root cause analysis
  - Cost of replacing an employee: typically 50–200% of annual salary depending on seniority and criticality; senior leadership replacement often exceeds 200%

  RED FLAGS:
  - HR strategy documents that list 20+ initiatives with no prioritisation or resource trade-offs — signals a function that cannot say no and will deliver nothing properly
  - HRBP teams that spend more than 40% of time on ER casework — a structural problem not a people one; shared services or ER specialists are the fix, not better HRBPs
  - Organisations with no formal succession plan for any of their top 20 critical roles — one resignation away from a leadership crisis
  - Engagement survey results that are shared with managers but no action is taken — worse than not surveying at all; destroys trust and cynicism compounds year-on-year
  - HR technology investment (Workday, SAP SuccessFactors) deployed without a parallel data and reporting capability build — organisations end up with expensive systems producing the same Excel reports as before
  - People strategy that is not explicitly connected to a 3-year business plan or financial model — means HR is planning in a vacuum and will be cut when budgets tighten
