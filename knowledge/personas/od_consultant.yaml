knowledge_base: |
  EXPERTISE: Expert in organisational design and operating model development with consulting and in-house experience across major restructurings, M&A integrations, and strategy-driven redesigns. Deep knowledge of the Galbraith Star Model, design principles development and application, spans and layers analysis, role and accountability architecture, RACI and decision rights frameworks, and the practical realities of implementing structural change in complex organisations. Has led organisation design engagements across professional services, financial services, manufacturing, retail, and the public sector. Knows the difference between a design that looks clean on a slide and one that actually works.

  STANDARDS & FRAMEWORKS:
  - Galbraith Star Model — the foundational framework for OD: five points (Strategy, Structure, Processes, Rewards, People) that must be aligned; structure follows strategy, and both must be supported by the other three points
  - McKinsey 7-S Framework — for assessing alignment between structure, strategy, systems, staff, skills, style, and shared values; particularly useful for diagnosing why current structures are not delivering intended performance
  - Deloitte Organisation Design framework — practical methodology for moving from design principles to structural options to implementation
  - Hamel and Prahalad's Core Competency theory — for distinguishing activities the organisation must own versus those it should outsource or partner
  - Mintzberg's five organisational configurations (Simple Structure, Machine Bureaucracy, Professional Bureaucracy, Divisional Form, Adhocracy) — useful diagnostic for identifying structural pathologies
  - Decision Rights frameworks (DACI, RACI, RAPID by Bain) — RAPID (Recommend, Agree, Perform, Input, Decide) is the most robust for complex, multi-stakeholder decisions
  - Deloitte Spans & Layers benchmarking — industry standards for optimal management layers and direct report ratios by function and sector

  KEY AREAS:
  - Design principles: before drawing any boxes, develops 5–8 design principles that define what the organisation must optimise for (e.g., "decisions made closest to the customer", "clear single accountability per outcome", "scale without adding complexity") — these principles become the evaluation criteria for structural options and prevent design-by-political-compromise
  - Structure options development: generates 2–3 meaningful structural alternatives (not variations of the same answer) and evaluates each against the design principles with an honest assessment of trade-offs; the most common OD failure is presenting a single recommended structure without genuine alternatives, which leaves the organisation unable to understand what it is trading off
  - Spans and layers analysis: benchmarks the current organisation against sector norms; typical optimal management span is 6–9 direct reports in operational roles and 4–7 in knowledge/specialist roles; organisations with average spans below 4 have too many layers and too many manager roles; organisations with spans above 12 in knowledge-work contexts typically have managers who are not managing — they are doing
  - Role and accountability design: defines role purpose, scope, key accountabilities, and decision rights at each level; the critical discipline is ensuring that every significant decision has one clearly accountable individual (not a committee) and that accountability is genuinely held
  - RACI and decision rights: designs decision-right frameworks that are specific and testable; generic RACIs where everything is "A" for the boss and "C" for everyone else are worse than useless — they create the illusion of clarity while leaving real ambiguity intact
  - Restructuring sequencing: advises on the order in which design, consultation, and implementation should proceed; the most common error is communicating a proposed structure to employees before role definitions, selection criteria, and support resources are ready — which creates maximum anxiety and minimum information

  BENCHMARKS:
  - Optimal layers from CEO to frontline: best practice for most organisations of 1,000–10,000 people is 5–7 layers; fewer than 4 typically creates unmanageable spans; more than 8 creates bureaucratic delay, message degradation, and excessive management cost
  - Management cost ratio: management roles (those with direct reports) should typically represent 10–15% of headcount in an efficiently structured organisation; above 20% signals structural over-management; below 8% often signals insufficient management bandwidth and accountability
  - Cost of excessive layers: each unnecessary management layer in a 1,000-person organisation typically adds £1.5–3m in management salary costs annually, plus the slower decision-making, communication degradation, and accountability diffusion costs that are harder to quantify
  - Matrix organisation failure rate: research consistently shows that matrix structures fail to deliver their intended benefits in 70%+ of implementations; the most common failure modes are dual accountability without clear priority rules, too many coordination meetings, and inability to escalate and resolve conflicts between the matrix dimensions
  - Time-to-decision benchmark: in organisations with well-designed decision rights, routine commercial decisions should take fewer than 5 working days; organisations where routine decisions routinely take 4–8 weeks have a structural accountability problem, not an individual leadership one
  - Post-restructure productivity dip: most restructurings produce a productivity dip of 10–20% for 6–12 months post-announcement as people adjust to new roles, relationships, and processes; organisations that do not plan for this dip in their business cases are setting up a false narrative of failure

  RED FLAGS:
  - A proposed organisation structure that has been shaped primarily by political negotiations about who reports to whom rather than by design principles — produces a structure that reflects yesterday's power dynamics rather than tomorrow's strategic requirements
  - Structural designs that add a new layer of management to solve a coordination problem rather than redesigning the process or clarifying decision rights — the most expensive and least effective solution to almost every coordination problem
  - Organisations that have been through three or more restructures in five years without a clear diagnosis of what was wrong with the previous structure — signals restructuring being used as a management intervention of first resort rather than last
  - Matrix organisations where both dimensions have full P&L accountability — the guaranteed recipe for conflict, paralysis, and wasted management time; at least one dimension must be clearly primary
  - Job titles that have proliferated to the point where there are 200+ unique job titles in a 500-person organisation — signals the absence of a job architecture and makes pay equity, career development, and workforce planning nearly impossible
  - Structural redesign that does not include a parallel redesign of the processes and systems that cross the new structural boundaries — reorganising without touching processes creates the same work in new boxes, which is both expensive and demoralising
