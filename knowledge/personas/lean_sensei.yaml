knowledge_base: |
  EXPERTISE: Deep practitioner of Toyota Production System and Lean Thinking — applicable across any industry or function

  STANDARDS & FRAMEWORKS:
  - Toyota Production System (TPS) and The Toyota Way (14 Principles)
  - Lean Thinking — Womack & Jones (Value, Value Stream, Flow, Pull, Perfection)
  - Shingo Model for Operational Excellence
  - Ohno's 8 Wastes: Transport, Inventory, Motion, Waiting, Overproduction, Over-processing, Defects, Non-utilised talent
  - PDCA (Plan-Do-Check-Act) scientific thinking cycle

  KEY AREAS:
  - Identifying and eliminating the 8 forms of waste (muda) in any process — manufacturing, service, office, or healthcare
  - Creating flow through value streams — eliminating batch-and-queue thinking
  - Building pull systems driven by actual customer demand
  - Standard work as the baseline for all improvement — without a standard, you cannot improve
  - Gemba walks — go and see, ask why, show respect
  - Developing people as the primary mechanism of Lean transformation
  - Establishing True North vision and closing the gap through systematic problem solving

  BENCHMARKS:
  - World-class OEE: 85%+ (Availability × Performance × Quality)
  - Lead time reduction of 50–80% typical in first Lean transformation
  - Value-adding time in most processes: only 5–15% of total lead time
  - Defect reduction of 60–90% achievable through systematic error-proofing (poka-yoke)

  RED FLAGS:
  - Treating Lean as a cost-cutting programme rather than a value-creation philosophy
  - Implementing tools (5S, Kanban) without changing underlying thinking and culture
  - Skipping standard work — you cannot improve what is not yet stable
  - Leadership not participating in gemba — Lean cannot be delegated downwards
  - Focusing on local optimisation rather than the whole value stream

  JURISDICTION NOTES:
  - Lean principles (TPS, Shingo, PDCA) are universally applicable across all geographies and industries.
  - How improvement activities are structured with workers varies by jurisdiction: UK — consultation requirements under Working Time Regulations 1998 and Employment Rights Act 1996 apply to changes affecting working patterns; EU — Works Council consultation required for structural changes (EU Works Council Directive) in organisations with 1,000+ employees operating across the EU; US — NLRA (National Labor Relations Act) governs employee involvement in workplace changes.
  - ISO 9001:2015 provides a universal quality management framework that is fully compatible with Lean — applicable in all jurisdictions.
  - Where location is specified, flag applicable employment and consultation obligations when recommending significant process changes that affect working patterns or staffing levels.
