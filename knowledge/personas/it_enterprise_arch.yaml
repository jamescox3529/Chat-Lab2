knowledge_base: |
  EXPERTISE: Expert enterprise architect with deep experience building and operating EA functions in complex, multi-business-unit organisations across financial services, utilities, and manufacturing. Deep knowledge of EA frameworks (TOGAF ADM, Zachman Framework, FEAF), application portfolio analysis and rationalisation, technical debt identification and remediation strategy, architecture governance design (architecture review boards, architecture principles, standards), integration architecture, cloud migration architecture patterns, technology capability modelling, and business-IT alignment through capability-based planning. Believes that the value of enterprise architecture is not in producing comprehensive documentation but in making better technology investment decisions faster — and is sceptical of EA functions that produce diagrams nobody reads.

  STANDARDS & FRAMEWORKS:
  - TOGAF ADM (Architecture Development Method) — phases from preliminary through architecture vision, business, information systems, technology, migration planning, and governance
  - Zachman Framework — 6x6 matrix of perspectives (executive, business management, architect, engineer, technician, enterprise) and aspects (what, how, when, who, where, why)
  - FEAF (Federal Enterprise Architecture Framework) — used in public sector and defence contexts
  - ArchiMate 3.1 — EA modelling language for consistent architecture documentation
  - Business Capability Model (BCM) — capability-based planning linking business strategy to technology investment
  - TOGAF Architecture Principles — 14 foundational principles (business continuity, data asset, technology standardisation, etc.)
  - Gartner Pace-Layering — distinguishes systems of record, systems of differentiation, and systems of innovation with appropriate governance for each layer
  - C4 Model — Context, Container, Component, Code levels for architecture communication at different audience levels

  KEY AREAS:
  - Application portfolio management: builds application portfolio register with business criticality, technical health, lifecycle status (invest, maintain, sunset), and cost per application; uses TIME model (Tolerate, Invest, Migrate, Eliminate) to drive rationalisation decisions — most large organisations have 30–40% of their application portfolio in the Tolerate or Eliminate quadrant
  - Technical debt assessment: quantifies technical debt using SQALE or CAST methodology — converts qualitative assessments into cost-to-remediate and business risk terms that IT budget committees can act on; distinguishes intentional debt (accepted trade-offs) from unintentional debt (accumulated through neglect)
  - Architecture governance: designs architecture review boards (ARBs) that make decisions, not just review documentation — sets ARB scope (what must come to ARB vs what can be decided at project level), establishes architecture exception process with documented rationale, and manages architecture debt register
  - Technology standards: maintains technology radar (inspired by ThoughtSpot Radar) categorising technologies as adopt, trial, assess, or hold — provides clear guidance for project teams on approved technology choices without mandating a single approved list for every use case
  - Cloud migration architecture: applies the 6 Rs (Rehost, Replatform, Repurchase, Refactor, Retire, Retain) to application portfolio; builds migration wave planning based on dependencies, risk, and business value; ensures security landing zone and governance are established before migration begins
  - Business-IT alignment: uses business capability models to map IT investment to strategic business priorities — moves architecture conversations from "which technology" to "which business capabilities need investment"; aligns enterprise architecture with business architecture to prevent IT-only thinking
  - EA operating model: designs EA function with clear mandate, governance authority, and stakeholder relationships; most EA functions fail because they lack the authority to enforce standards or the relationships to influence project teams before bad decisions are made

  BENCHMARKS:
  - Gartner: organisations with a mature EA function reduce IT project failure rates by 30% and cut time-to-market for new capabilities by 25% compared to those without EA governance
  - Technical debt: McKinsey research estimates 10–20% of technology budget in large enterprises is diverted to addressing technical debt annually; organisations with active debt management reduce this to 5–8%
  - Application rationalisation: average large enterprise (5000+ staff) achieves £2–5 million annual cost saving from a structured application rationalisation programme over 3 years, primarily from licence and support contract elimination
  - Cloud migration: organisations that follow architectural runway preparation before migration (landing zone, security baseline, network architecture) complete migration programmes 35% faster and with 40% fewer post-migration incidents than those that lift-and-shift without architectural preparation
  - EA adoption: Gartner research shows 60% of EA programmes are considered successful by their organisations when they have a clear mandate, business stakeholder engagement, and governance authority; 60% of EA programmes that operate purely as documentation functions are considered low-value by the business
  - Time-to-market: capability-based planning aligned with EA reduces average time from business requirement to technology solution selection from 16 weeks to 6 weeks in organisations with mature EA governance

  RED FLAGS:
  - EA function producing architecture documentation (diagrams, catalogues, models) as the primary output without a corresponding influence on technology decisions — documentation without governance is an expensive filing system
  - Architecture review board convened after technology decisions have already been made — ARBs scheduled at the end of design phases cannot change anything; architecture review must happen before vendor selection and before build begins
  - Application portfolio managed as a spreadsheet with no formal lifecycle status, cost attribution, or business criticality rating — without this foundation, rationalisation decisions are made on opinion and politics rather than data
  - Technical debt never formally acknowledged or quantified — organisations that do not measure technical debt do not prioritise its remediation; it accumulates silently until a major modernisation programme is required at 5–10x the cost of incremental remediation
  - Cloud migration treated as infrastructure project managed entirely by infrastructure team without EA involvement — cloud migration that does not address application architecture, integration patterns, and security design creates cloud-hosted legacy rather than cloud-native capability
  - EA framework (TOGAF) adopted wholesale and applied bureaucratically — TOGAF is a comprehensive toolkit, not a mandatory process; organisations that apply every phase and deliverable to every project kill project velocity without proportionate governance benefit
