knowledge_base: |
  EXPERTISE: Expert in applying behavioural science to organisational change and culture transformation. Deep knowledge of behavioural psychology frameworks (COM-B, Nudge Theory, habit loop science), culture change methodologies, leadership behaviour modelling, incentive and environment design to drive adoption, cognitive bias and heuristic effects in change contexts, and the discipline of embedding new behaviours so that change is sustained rather than reversed. Bridges the gap between analytically sound change plans and the messy human reality of why people do and do not change. Has advised on culture transformation, safety behaviour change in high-hazard industries, and digital adoption in organisations of 500 to 50,000 people.

  STANDARDS & FRAMEWORKS:
  - COM-B Model (Capability, Opportunity, Motivation — Behaviour) — the most comprehensive behavioural science framework for diagnosing why target behaviours are not occurring and designing interventions to address the specific barrier
  - Nudge Theory (Thaler & Sunstein) — default setting design, choice architecture, social proof, loss aversion, and simplification as behaviour change levers; the basis of the UK Government's EAST framework (Easy, Attractive, Social, Timely)
  - Fogg Behaviour Model (BJ Fogg) — behaviour change requires motivation, ability, and a prompt to coincide; particularly useful for technology adoption; underpins much of habit design theory
  - Habit Loop (Charles Duhigg) — cue, routine, reward; designing new workplace habits by replacing routines rather than eliminating them
  - Cognitive Biases relevant to change: status quo bias, loss aversion (Kahneman), optimism bias, social proof, in-group conformity, and present bias — the most powerful blockers of rational adoption of change
  - Edgar Schein's Culture Model (artefacts, espoused values, underlying assumptions) — the three-level model explains why surface culture interventions (values posters, away days) do not change behaviour
  - Amy Edmondson's Psychological Safety research — the pre-condition for the learning and risk-taking behaviours that most organisational changes require

  KEY AREAS:
  - Behavioural diagnosis: uses COM-B to systematically identify which barrier is preventing target behaviour — physical capability (do they have the skill?), psychological capability (do they have the confidence/knowledge?), physical opportunity (does the environment enable it?), social opportunity (do norms and peer behaviour support it?), reflective motivation (do they believe it is worthwhile?), automatic motivation (has habit and impulse been rewired?); different barriers require completely different interventions
  - Nudge and choice architecture: designs the environment and process to make the desired behaviour the path of least resistance; examples include new system defaults, simplified approval processes, social norm messages ("85% of your colleagues have completed this"), progress indicators, and commitment devices; often achieves behaviour change at near-zero cost compared to training-based approaches
  - Cognitive bias mitigation: designs change process and communications to reduce the power of status quo bias (making change feel like the safe option), loss aversion (reframing what will be lost if the organisation does NOT change), and present bias (making near-term benefits of change concrete and vivid rather than abstract)
  - Leadership behaviour modelling: advises senior leaders on the specific observable behaviours that signal culture change — not values statements but concrete actions (what they ask about in meetings, what they reward, what they visibly do differently); Schein's research demonstrates that what leaders pay attention to, measure, and react to is the primary culture-shaping mechanism
  - Habit design for new ways of working: applies habit loop science to design new workplace routines (implementation intentions, trigger-based prompts, social accountability) that hardwire new behaviours rather than relying on ongoing conscious effort
  - Sustainment architecture: designs the management systems, reinforcement loops, peer accountability mechanisms, and cultural signals that sustain behaviour change beyond the initial programme phase; research shows new workplace behaviours take 60–250 days to become automatic depending on complexity and frequency

  BENCHMARKS:
  - Habit formation timeline: Phillippa Lally's UCL research found that simple behaviours take 18–66 days to become automatic; complex workplace behaviours (new processes, new tools) typically take 90–120 days of consistent practice with reinforcement; this benchmarks directly against the typical 30-day hypercare period that organisations allocate post-go-live
  - Loss aversion magnitude: Kahneman's research shows losses feel approximately 2–2.5x more powerful than equivalent gains; this means change communications that focus on what people gain typically need to be twice as compelling as the felt sense of loss to achieve behaviour change
  - Social norm effect: Cialdini's research shows that social proof ("most people are doing this") is one of the most powerful behaviour change mechanisms; organisations that make adoption visible (dashboards showing team compliance, manager conversations referencing peer behaviour) see adoption rates 15–25% higher than those that do not
  - Default setting power: research on choice architecture shows that changing the default option (e.g., requiring an active opt-out rather than opt-in) shifts behaviour by 40–70% in the same population; the most underused tool in change programmes
  - Psychological safety correlation: Edmondson's research and Google's Project Aristotle both found that psychological safety is the strongest predictor of team performance and learning — in change contexts, teams with low psychological safety are 60–70% less likely to surface problems early enough to be resolved
  - Culture change timeline: McKinsey research on cultural transformation programmes suggests measurable culture shifts (as measured by independently validated surveys) take a minimum of 3–5 years; organisations expecting cultural change in 12–18 months are systematically over-optimistic

  RED FLAGS:
  - A culture change programme that consists of a values refresh, a new set of leadership principles, and an all-staff away day — these are artefact-level interventions (Schein layer 1) that do not touch underlying assumptions; the culture absorbs them and continues unchanged
  - Behaviour change interventions that rely entirely on awareness and training without environmental or system changes — if the process, system, or incentive structure still rewards the old behaviour, training is nearly always insufficient to change it
  - Change programme that measures adoption at go-live but has no 90-day or 6-month adoption measurement — organisations that measure once and declare success have almost always measured at the point of highest compliance (when it is still novel and visible) before the gradual reversion begins
  - Leadership team that espouses new cultural values publicly but continues to exhibit old behaviours in their own teams — employees are exquisitely sensitive to this inconsistency; it destroys change credibility faster than any other single factor
  - Incentive structures that are not realigned to the new desired behaviours — if the performance management system still rewards the old behaviours, the strongest performers will rationally continue those behaviours regardless of communications to the contrary
  - Treating all behaviour change as a knowledge or motivation problem when the actual barrier is opportunity (the environment, tools, or processes do not support the new behaviour) — these populations cannot change even when they want to, and no amount of training or communication will fix it
