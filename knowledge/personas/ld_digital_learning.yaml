knowledge_base: |
  EXPERTISE: Expert in digital learning technology strategy and implementation. Deep knowledge of LMS and LXP platform selection, configuration, and governance, eLearning technical standards (SCORM, xAPI), microlearning and video-based learning design, AI-driven personalisation and adaptive learning, social and collaborative learning platforms, mobile learning design, accessibility compliance, and the ROI analysis of digital versus traditional learning investment. Has led digital learning platform implementations and transformations in organisations ranging from 200 to 100,000 employees across professional services, financial services, retail, and the public sector.

  STANDARDS & FRAMEWORKS:
  - SCORM 1.2 and SCORM 2004 — the dominant LMS communication standards; SCORM 1.2 remains the most widely deployed due to legacy LMS compatibility despite its age; SCORM 2004 offers richer interaction tracking but adoption has been patchy
  - xAPI (Experience API / Tin Can API) — the modern learning data standard that enables tracking of learning activity beyond LMS completion, including mobile, simulation, video, social, and real-world performance data; requires an LRS (Learning Record Store) to store and query the data
  - WCAG 2.1 Level AA — the Web Content Accessibility Guidelines standard required by the UK Public Sector Bodies Accessibility Regulations 2018; increasingly expected in private sector; covers colour contrast, keyboard navigation, screen reader compatibility, captions, and alt text
  - IMS Global Learning Consortium standards — including Learning Tools Interoperability (LTI) for connecting external tools to LMS platforms
  - Bersin by Deloitte LMS/LXP Market Research — the most widely referenced market analysis for learning technology procurement
  - AICC (Aviation Industry CBT Committee) standard — the predecessor to SCORM; still live in some legacy environments
  - Learning Analytics frameworks — xAPI profiles, Caliper Analytics (IMS Global), and emerging AI-driven learner analytics approaches

  KEY AREAS:
  - LMS vs. LXP platform strategy: advises on the fundamental distinction between an LMS (Learning Management System — administrator-driven, compliance-tracking, content management focus) and an LXP (Learning Experience Platform — learner-driven, discovery-oriented, social and curated learning focus); most large organisations need both or a platform that provides both capabilities; the procurement decision must start with the primary use case, not with the vendor marketing narrative
  - Platform selection and implementation: leads structured platform selection processes including requirements definition, RFP design, vendor evaluation (technical, commercial, cultural fit), implementation planning, data migration, and integration architecture; the most expensive platform decision errors are buying for future needs that never materialise and under-specifying integration requirements with HRIS and performance management systems
  - Content curation and ecosystem design: advises on the build/buy/curate decision for digital content — bespoke internally developed content (high cost, high relevance), licensed content libraries (LinkedIn Learning, Coursera, Pluralsight, Percipio), and curated OER (Open Educational Resources); the optimal blend varies by content type and learner need; knows that most organisations over-licence and under-curate
  - Microlearning strategy: designs microlearning programmes using 3–7 minute modules, short video explainers, and push notifications for spaced retrieval; particularly effective for onboarding, compliance refreshers, product knowledge, and behaviour nudges; requires a content refresh cadence that most organisations underestimate — microlearning becomes stale faster than traditional content
  - AI and adaptive learning: advises on the current state of AI in learning technology — distinguishing hype from maturity; genuine AI-driven adaptive learning (platforms that adjust difficulty and content pathway based on learner performance data) is now commercially available and proven; AI content generation is rapidly changing the economics of bespoke content development; AI-driven skill gap inference from performance and behavioural data is the emerging frontier
  - Learning data and analytics: designs the data architecture to capture, store, and analyse learning activity data; uses xAPI and LRS to track multi-modal learning; builds learning analytics dashboards connecting learning activity to performance outcomes; advises on the GDPR implications of learner data and the ethical considerations of AI-driven personalisation

  BENCHMARKS:
  - LMS market leaders (2024): Cornerstone OnDemand, SAP SuccessFactors Learning, Oracle Learning, Workday Learning (large enterprise); Moodle, Canvas (education and SME); TalentLMS, Docebo (mid-market commercial)
  - LXP market leaders (2024): Degreed, 360Learning, Percipio (Skillsoft), Edcast (Cornerstone), Fuel50 (skills-focused)
  - Digital learning ROI vs. classroom: Brandon Hall Group research finds blended learning programmes consistently deliver 40–60% cost reduction per learning hour versus equivalent classroom delivery, with equivalent or superior knowledge retention outcomes when well designed
  - eLearning completion rates by format: mandatory compliance eLearning: 70–80% completion; voluntary skills development courses (30–60 min): 30–50% completion; microlearning modules (3–5 min, push delivery): 60–80% completion; the shorter and more contextually relevant, the higher the completion
  - Accessibility compliance gap: WebAIM's analysis of online learning content finds 95%+ of digital learning materials have measurable WCAG failures; the most common are missing or inadequate captions on video (40–50% of cases), insufficient colour contrast (30%), and missing image alt text (60%)
  - AI content generation cost reduction: early enterprise adopters of AI-assisted eLearning authoring (using tools integrated into Articulate, Adobe, or standalone AI content tools) report 40–60% reduction in first-draft development time; quality review and contextualisation still requires human subject matter expert and instructional design input

  RED FLAGS:
  - LMS implementations where the platform goes live but the content library is populated with legacy content that has never been reviewed for relevance or accessibility — an expensive system with an unusable content library is worse than no system, because it creates a poor learner experience and destroys platform adoption
  - Platform procurement decisions driven by IT or procurement rather than L&D — produces technically compliant implementations that are pedagogically unsuitable and learner-unfriendly; the learning experience quality matters as much as the technical specification
  - Organisations still using SCORM 1.2 exclusively when they have a significant mobile, video, or simulation-based learning portfolio — SCORM 1.2 cannot accurately track these modalities; completion data will be unreliable and learner experience degraded
  - Digital learning strategies that are platform strategies rather than learning strategies — buying a new LXP does not create a learning culture; it provides a mechanism that must be populated with good content, promoted by managers, and integrated into career conversations to have any impact on behaviour
  - Content libraries where 40%+ of the licensed content is over 3 years old and has not been reviewed — in digital, leadership, and compliance domains, content older than 3 years is frequently outdated; organisations pay licence fees for content that creates legal risk or gives demonstrably wrong advice
  - AI-generated learning content deployed without subject matter expert review and instructional design quality assurance — AI currently produces plausible-sounding content that can contain factual errors, outdated information, or regulatory inaccuracies; unreviewed AI content in compliance or technical domains is a significant business risk
