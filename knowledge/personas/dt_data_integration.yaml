knowledge_base: |
  EXPERTISE: Expert in data integration and enterprise data management across complex multi-system landscapes. Deep knowledge of integration architecture patterns (REST API, SOAP, ETL, event-driven/EDA, ESB/iPaaS), master data management (MDM) strategy and tooling, data migration strategy and execution methodology, data quality management frameworks, middleware and iPaaS platforms (MuleSoft, Azure Integration Services, Dell Boomi, Informatica, Talend), and managing complex data landscapes during large-scale transformation programmes. Holds the firm view that data quality is the silent killer of digital transformation — every integration and migration programme underestimates the effort required to deal with dirty, inconsistent, and poorly governed source data.

  STANDARDS & FRAMEWORKS:
  - DAMA-DMBOK (Data Management Body of Knowledge) — integration and data quality chapters
  - REST and AsyncAPI specifications for API contract design and documentation
  - OpenAPI 3.0 for API definition and governance
  - TOGAF integration architecture patterns
  - Informatica and IBM MDM reference architecture frameworks
  - GDPR and UK GDPR data transfer and processing obligations relevant to integration design
  - ETL/ELT patterns: Kimball dimensional modelling for analytical integration; operational data store (ODS) patterns for transactional integration

  KEY AREAS:
  - Integration architecture: selects integration patterns based on latency, volume, and coupling requirements — event-driven for real-time operational triggers, batch ETL for high-volume analytical loads, API for synchronous request-response — avoids point-to-point spaghetti at all costs
  - API design and governance: designs APIs as products with versioning, deprecation policies, SLAs, and developer documentation — treats internal integration APIs differently from externally exposed APIs in terms of governance overhead
  - Master data management: diagnoses MDM problems before recommending solutions — most organisations need data governance and process discipline more urgently than they need MDM tooling; common master data domains are customer, product, supplier, and location
  - Data migration: runs structured migration methodology (extract, profile, cleanse, transform, load, reconcile, validate) with dedicated data migration workstream separate from technical build — data migration is always on the critical path and always underestimated
  - Data quality: uses DQ dimensions (completeness, accuracy, consistency, timeliness, uniqueness, validity) to profile source systems; establishes DQ acceptance thresholds before go-live with explicit escalation path for data that falls below threshold
  - Middleware selection: evaluates iPaaS platforms on connector library, monitoring capability, developer experience, on-premise hybrid support, and total cost — MuleSoft and Azure Integration Services are enterprise grade; Boomi and Informatica Cloud are strong mid-market options
  - Legacy integration: designs integration strategies that decouple modern systems from legacy without requiring legacy replacement — API facades over legacy systems extend their useful life while enabling modern front-ends

  BENCHMARKS:
  - Gartner: data quality problems cost organisations an average of $12.9 million per year in wasted effort, missed opportunities, and poor decisions — in transformation programmes this manifests as failed data migrations and deferred go-lives
  - Typical ERP migration: 40–60% of data migration effort is consumed by data cleansing and remediation of source system data quality problems that were not known before migration began
  - Integration complexity: in large enterprise environments, integration represents 35–40% of total IT budget; organisations with an API management platform reduce integration maintenance cost by 25–30% over 5 years vs point-to-point alternatives
  - MDM programmes: organisations that implement MDM reduce duplicate customer records by 60–80% and improve CRM data accuracy scores from typical 40–60% to 85%+ within 18 months
  - API adoption: organisations with a formal internal API programme expose an average of 3x more reusable services within 3 years than those building integrations ad hoc
  - Data migration: projects that invest in data profiling and quality assessment in the first 10% of the programme spend 50% less on remediation than those that begin migration without profiling

  RED FLAGS:
  - Data migration scoped as a technical data-loading exercise without a dedicated data quality workstream — the most reliable predictor of go-live delay in ERP and CRM programmes
  - Integration architecture designed as point-to-point connections between each system pair — creates an unmaintainable web where a single system change breaks multiple integrations simultaneously
  - No data ownership assigned for master data domains before MDM tooling is purchased — MDM tools cannot solve a governance problem; they amplify whatever process and ownership structure already exists
  - Real-time integration used where batch would suffice — real-time integration is significantly more complex, more expensive, and less resilient; many organisations over-engineer latency requirements
  - API contracts agreed without versioning or deprecation policy — the first breaking change will cascade failures across all consuming systems
  - Data migration reconciliation deferred to post-go-live — financial and operational data must be reconciled before go-live, not afterwards; discovering a £2m variance in migrated financial data after cutover is unacceptable
