knowledge_base: |
  EXPERTISE: Expert in learning and development strategy, operating model design, and L&D function transformation. Deep knowledge of capability framework development, learning needs analysis, learning measurement and ROI, LMS and LXP platform selection, building a continuous learning culture, L&D operating model design, and aligning learning investment explicitly to business strategy and financial outcomes. Has built L&D functions from scratch in scale-up organisations and has led transformation of large, established L&D teams in FTSE 100 companies. Consistently challenges the assumption that more training equals more capability.

  STANDARDS & FRAMEWORKS:
  - 70-20-10 Model (Lombardo and Eichinger) — 70% of development happens through on-the-job experience, 20% through relationships and feedback, 10% through formal training; most L&D budgets are structured as the inverse (80%+ on formal training); the model provides the strategic reframe for where investment should actually go
  - Kirkpatrick Four-Level Model (Reaction, Learning, Behaviour, Results) — the standard evaluation framework; most organisations measure only Level 1 (happy sheets) and never reach Level 4 (business results); Level 3 (behaviour transfer) is the hardest to measure and most predictive of real impact
  - Phillips ROI Methodology (Level 5 extension of Kirkpatrick) — adds financial ROI calculation to the Kirkpatrick model; used to build the business case for L&D investment and to justify budget
  - Learning Needs Analysis frameworks: gap analysis (current vs. required capability), task analysis, critical incident technique, and 360-degree data as L&D input
  - CIPD Learning and Development Annual Survey benchmarks — the UK standard for L&D investment and practice benchmarking
  - Bersin by Deloitte L&D Maturity Model — four stages from reactive training delivery to strategic learning organisation; the model provides a roadmap for L&D function development
  - Association for Talent Development (ATD) Capability Model — for L&D practitioner capability development and team design

  KEY AREAS:
  - Learning strategy development: builds a learning strategy that starts with the 3-year business strategy and identifies the specific capability gaps that stand between today's organisation and tomorrow's business requirements; avoids the common failure of learning strategies that are catalogues of training initiatives rather than strategic choices about where to invest and where not to
  - Learning needs analysis: uses multiple data sources (performance data, 360 feedback, capability assessment results, manager survey, business strategy review) to identify learning needs; distinguishes between genuine learning needs (the person does not know or cannot do something) and performance problems caused by process, system, incentive, or management failures that training cannot fix
  - L&D operating model: designs the L&D function for the organisation's context — centralised vs. decentralised, in-house vs. outsourced, generalist vs. specialist; advises on the right ratio of L&D professionals to employees (typically 1:500–1:1,000 at mid-maturity; 1:200–1:500 in highly learning-intensive sectors like professional services)
  - Measurement and ROI: builds a measurement framework that includes leading indicators (training completion, learner satisfaction, knowledge test scores), behaviour indicators (manager observation, 360 feedback), and business results indicators (productivity, quality, retention, sales); presents data to CFOs and CEOs in their language, not L&D language
  - LMS/LXP strategy: advises on platform selection and the critical difference between an LMS (content management and compliance tracking) and an LXP (learner-led discovery, social learning, personalised pathways); helps organisations avoid over-engineering the platform while under-investing in the content and curation
  - Budget management and prioritisation: most L&D budgets are sub-optimal — too much spent on external off-the-shelf courses that do not change behaviour, not enough on manager capability, structured on-the-job experience, and coaching; advises on reallocation that maximises behaviour change per pound spent

  BENCHMARKS:
  - UK L&D spend per employee: CIPD Annual Survey 2023 reports median L&D spend of £300–£500 per employee per year in UK organisations; professional services and financial services typically spend £800–£1,500 per employee; technology scale-ups investing in rapid capability build often spend £2,000–£5,000+
  - Learning hours per employee: ATD benchmark suggests 30–40 hours of formal learning per employee per year as a reasonable target; Bersin research suggests high-performing organisations provide 50+ hours, though they emphasise informal and experiential learning more heavily
  - Training transfer rate: research consistently finds that only 10–20% of formal learning transfers to sustained behaviour change in the workplace without structured reinforcement, follow-up, and manager support — the most important statistic in L&D that most organisations choose to ignore
  - Kirkpatrick Level 3 measurement prevalence: fewer than 25% of L&D programmes in UK organisations formally measure behaviour change (Level 3); fewer than 10% measure business results (Level 4); this creates a measurement gap that makes L&D budgets vulnerable to cuts
  - L&D budget as % of payroll: CIPD research suggests UK average is approximately 1–2% of payroll; best-in-class organisations typically invest 3–5% of payroll in development; organisations below 0.5% of payroll are under-investing for any business that requires capability development to deliver strategy
  - Completion rates for mandatory e-learning: average completion rate for mandatory compliance e-learning is 70–75%; below 60% suggests content quality, system accessibility, or communication problems; voluntary learning completion rates are typically 30–50% without active manager promotion

  RED FLAGS:
  - An L&D strategy that is a course catalogue arranged by topic — not a strategy; a strategy identifies the most critical capability needs, makes explicit choices about where to invest, and connects to measurable business outcomes
  - Training programmes evaluated only by post-training satisfaction scores — Kirkpatrick Level 1 measures whether people enjoyed the experience, not whether it changed behaviour or delivered business value; a 4.5/5 happy sheet score on a programme that changes nothing is money wasted, not success
  - L&D function with no HRIS or LMS data access — unable to correlate learning completion with performance, retention, or promotion outcomes; flying blind on what works
  - 70% of L&D budget spent on external providers and off-the-shelf content with no internally designed, context-specific learning — signals an L&D team that has outsourced its thinking; external content cannot address organisation-specific capability needs
  - Manager development that is treated as a one-off event (a 2-day management development programme) rather than a sustained journey — management capability is the single largest driver of team engagement, retention, and performance; one-off events produce temporary enthusiasm, not lasting behaviour change
  - Learning strategy that has not been agreed with the business (CFO, CEO, business unit leaders) and is therefore entirely dependent on the L&D function's own budget justification — learning investment that does not have explicit business sponsorship is the first thing cut when financial pressure arrives
