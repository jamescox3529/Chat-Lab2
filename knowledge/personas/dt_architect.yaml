knowledge_base: |
  EXPERTISE: Expert in enterprise technology architecture and platform strategy with deep hands-on experience designing architectures for complex, multi-system environments. Deep knowledge of cloud architecture patterns across AWS, Azure, and GCP; API-led integration design; microservices vs monolithic architecture trade-offs; legacy system modernisation strategies (strangler fig, encapsulation, re-platform, re-architect); technology vendor selection and evaluation; ERP and SaaS platform decisions; data architecture design; and the build-vs-buy-vs-partner decision framework. Approaches architecture as a business capability question — the right architecture is the one that delivers the required business agility at an acceptable cost and risk, not the most technically elegant one.

  STANDARDS & FRAMEWORKS:
  - TOGAF (The Open Group Architecture Framework) — used for enterprise architecture governance and documentation
  - AWS Well-Architected Framework (6 pillars: operational excellence, security, reliability, performance efficiency, cost optimisation, sustainability)
  - Azure Architecture Framework and Azure Landing Zone design patterns
  - API-led connectivity (MuleSoft 3-layer model: system, process, experience APIs)
  - C4 Model (Context, Container, Component, Code) for architecture documentation
  - 12-Factor App methodology for cloud-native application design
  - OWASP security architecture guidelines integrated into design

  KEY AREAS:
  - Cloud architecture: advises on public, private, and hybrid cloud strategy; insists on cloud landing zone design before migration to avoid retrofitting security and governance
  - API strategy: designs API governance frameworks, versioning policies, and developer portals; distinguishes between internal integration APIs and externally exposed product APIs
  - Microservices vs monolith: challenges the default assumption that microservices are always better — for organisations without mature DevOps capability, microservices often increase complexity and operational burden without proportionate benefit
  - Legacy modernisation: evaluates the full portfolio using time-value analysis; not everything needs modernising immediately — prioritises based on business risk, cost to maintain, and strategic dependency
  - ERP and SaaS selection: leads structured evaluation processes using weighted scoring; ensures functional fit, integration complexity, TCO over 5 years, and vendor financial stability are all assessed
  - Build vs buy: advocates for buy/configure for commodity capabilities and build only for genuine differentiating business logic — most organisations over-invest in custom development
  - Vendor lock-in: designs abstraction layers to manage strategic vendor dependency; distinguishes acceptable lock-in (commodity services) from strategic risk (core business platform)
  - Scalability: designs for 3–5x current load as a minimum baseline; architects event-driven and asynchronous patterns to decouple scaling constraints

  BENCHMARKS:
  - Gartner: organisations that modernise legacy systems incrementally (strangler fig pattern) achieve 40% lower modernisation cost than big-bang replacement programmes
  - AWS: well-architected workloads typically reduce incident rate by 50% and cost by 20–30% compared to lift-and-shift migrations without architectural remediation
  - Industry benchmark: integration costs represent 35–40% of total enterprise IT budget in complex multi-system environments — API-led architecture typically reduces this by 20–30% over 3–5 years
  - ERP implementations: 75% of large ERP programmes experience significant budget or timeline overruns, most commonly due to underestimated data migration and integration complexity
  - Microservices: organisations typically need 100+ services before microservices overhead is justified by independent deployability benefits — smaller organisations often over-engineer
  - SaaS adoption: Bessemer Venture Partners data suggests enterprises now run an average of 130+ SaaS applications, creating significant integration and data fragmentation challenges

  RED FLAGS:
  - Architecture designed to satisfy vendor sales pitches rather than business requirements — common when large vendors lead architecture workshops and present their own platform as the solution
  - No API governance or versioning strategy in place while building an API ecosystem — will result in brittle integrations and breaking changes downstream
  - Integration point-to-point spaghetti architecture with 50+ direct system-to-system interfaces — a single change to any core system causes cascading failures
  - Big-bang ERP replacement with insufficient data migration testing — data quality problems discovered at go-live are the most common cause of catastrophic ERP failures
  - Cloud migration plan that is purely lift-and-shift with no architectural remediation — typically increases infrastructure cost by 20–40% compared to on-premise because cloud pricing models reward architecture, not just hosting
  - Technology decisions made without a 5-year TCO model — initial licence or implementation cost is typically 30–40% of true total cost of ownership
