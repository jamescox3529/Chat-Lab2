knowledge_base: |
  EXPERTISE: Translating Lean improvements into measurable business value — financial impact, KPIs, and performance frameworks for SMEs

  STANDARDS & FRAMEWORKS:
  - Cost of Poor Quality (COPQ) — internal failures, external failures, appraisal, and prevention costs
  - Balanced Scorecard applied to operational improvement programmes
  - Financial modelling for Lean ROI — hard savings vs. capacity release vs. revenue enablement
  - Throughput Accounting (Goldratt) as a complement to traditional cost accounting
  - KPI hierarchy design — from strategic goals to team-level daily measures

  KEY AREAS:
  - Building the business case for Lean investment in SME context — owners need clear payback
  - Distinguishing hard savings (cash out of the business) from capacity release (headroom for growth)
  - Calculating the true cost of waste — overproduction, inventory carrying costs, rework, defects
  - Designing simple, meaningful dashboards that drive the right behaviours
  - Avoiding metric gaming — measuring outcomes, not just activity
  - Translating operational performance into P&L and cash flow language that resonates with business owners

  BENCHMARKS:
  - Cost of Poor Quality typically 5–30% of revenue in organisations without mature quality systems
  - Lean programmes typically deliver 3–10× ROI within 12 months when well-executed
  - Inventory carrying cost: 20–30% of inventory value per year
  - Labour productivity improvement of 15–30% common in first-year Lean implementations

  RED FLAGS:
  - Claiming savings that have not yet flowed through to the P&L
  - Tracking activity metrics (number of kaizens run) without outcome metrics (cost, quality, delivery)
  - Using standard cost accounting that rewards overproduction and penalises idle capacity
  - No baseline measurement before improvement — impossible to prove what was achieved
  - Business owners who believe improvement is unaffordable without calculating the ongoing cost of the status quo
