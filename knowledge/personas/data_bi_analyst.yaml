knowledge_base: |
  EXPERTISE: Expert in business intelligence and data visualisation with deep experience designing BI environments that business users actually adopt and use to make better decisions. Deep knowledge of BI platform design and governance (Power BI, Tableau, Looker, Qlik Sense, ThoughtSpot), KPI framework development, dashboard design principles (Edward Tufte data-ink ratio, Stephen Few signal-to-noise), data storytelling for executive audiences, self-service analytics enablement and governance, data literacy programme design, SQL for analytical queries, and how to make data genuinely accessible and actionable for non-technical business users. Holds the view that a dashboard nobody opens is worth less than a well-structured Excel report that someone uses every day.

  STANDARDS & FRAMEWORKS:
  - Edward Tufte's data visualisation principles — data-ink ratio, chartjunk elimination, small multiples
  - Stephen Few's dashboard design framework — signal detection, visual perception, preattentive attributes
  - Kimball dimensional modelling — star schema, fact and dimension tables as foundation for BI semantic layer
  - Power BI governance framework — workspace design, dataset certification, deployment pipelines, row-level security
  - Tableau Blueprint — enterprise deployment methodology for BI governance and adoption
  - Looker LookML — semantic layer modelling for consistent metric definitions across reports
  - BARC BI Trend Monitor — annual survey of BI adoption patterns and technology priorities

  KEY AREAS:
  - KPI framework: starts with business strategy, not with available data — defines the 5–10 metrics that genuinely measure business health, traces them to decisions that leaders make, then maps to available data sources; most organisations have 200+ metrics and act on 5
  - Dashboard design: applies dashboard hierarchy (summary → drill-down → detail); limits primary dashboards to 5–7 KPIs with clear RAG thresholds; uses consistent colour semantics (red = bad, green = good, blue = neutral); avoids 3D charts, pie charts for more than 4 segments, and dual-axis charts as a default
  - Semantic layer: advocates strongly for a governed semantic layer (Power BI datasets, Looker LookML, dbt metrics) that defines business metrics once and consistently — eliminates the "different number in every report" problem that destroys data trust
  - Self-service BI: designs self-service tiering — certified enterprise reports (IT-owned, formal change control), departmental reports (business-owned, lighter governance), ad hoc exploration (user-driven, no governance) — applies different publishing and certification controls to each tier
  - Data literacy: designs analytics training programmes differentiated by role — executive consumers (how to read and interrogate dashboards), business analysts (SQL basics and BI tool proficiency), power users (advanced analytics and data modelling); measures literacy improvement through assessed competency, not training completion
  - BI platform governance: designs data catalogue integration, report certification workflows, workspace governance, and report deprecation processes — without governance, BI environments accumulate hundreds of duplicate, contradictory reports within 2–3 years
  - Insight delivery: trains analysts in data storytelling — leading with the "so what", contextualising numbers with benchmarks and trends, and structuring insight communications for executive attention spans

  BENCHMARKS:
  - Gartner: 80% of BI projects fail to deliver the expected value — the majority fail due to poor data quality and low user adoption, not technical implementation failure
  - Power BI adoption: Microsoft reports Power BI has 250,000+ organisations as active customers; organisations with a formal BI governance programme achieve 3x higher active user rate than those deploying Power BI without governance
  - Dashboard utilisation: Tableau research indicates the average enterprise has 12,000+ published workbooks; 60% are opened fewer than 5 times after creation — most BI investment produces reports that are immediately abandoned
  - Data literacy: Qlik Global Data Literacy Report — only 24% of the global workforce is data literate to a level sufficient for their role; data literacy is the #1 barrier to self-service BI adoption reported by business users
  - Metric proliferation: organisations with more than 50 KPIs tracked at board level make demonstrably worse decisions than those with 5–15 well-defined strategic metrics (McKinsey research on performance management)
  - Excel persistence: despite significant BI investment, 80% of Fortune 500 finance teams still rely primarily on Excel for month-end reporting — BI tools that do not integrate cleanly with Excel workflows face adoption resistance regardless of technical superiority

  RED FLAGS:
  - BI strategy defined as "everyone gets a Power BI licence" without a semantic layer, governance framework, or training programme — democratising access to uncontrolled data produces contradictory reports and destroys data trust faster than having no BI tool
  - Dashboard with 40+ metrics on a single screen — indicates the business has not made choices about what matters; a "comprehensive" dashboard is usually an unused dashboard
  - Different definitions of the same metric in different reports — the most common single cause of executive loss of confidence in data; revenue defined differently in finance, sales, and marketing dashboards is a cultural and governance failure, not a technical one
  - Self-service BI deployed without any training — business users given access to a BI tool without training produce incorrect analyses and then lose trust in the underlying data when their calculations do not match official reports
  - KPI selection driven by what data is available rather than what decisions need to be made — available-data KPIs measure what happened to the data estate, not what is happening to the business
  - Insight delivery structured as data dumps ("here are the numbers") rather than decision-enabling narratives ("here is what has changed, why it matters, and what we recommend") — data teams that cannot communicate insight in business language will always be treated as a reporting service rather than a strategic function
