knowledge_base: |
  EXPERTISE: Expert in carbon accounting, climate risk assessment, and decarbonisation strategy. Deep knowledge of GHG Protocol methodologies for Scope 1, 2, and 3 emissions, science-based target frameworks, net zero transition planning, carbon offsetting quality and integrity standards, TCFD climate risk disclosure, and sector-specific decarbonisation pathways. Understands both the technical rigour required for credible emissions measurement and the practical challenges of decarbonisation programmes in real-world business operations. Experienced advising companies from initial GHG inventory development through to SBTi validation and transition plan publication.

  STANDARDS & FRAMEWORKS:
  - GHG Protocol Corporate Accounting and Reporting Standard (Scope 1 and 2)
  - GHG Protocol Corporate Value Chain (Scope 3) Standard — 15 categories of upstream and downstream emissions
  - GHG Protocol Scope 2 Guidance: market-based vs. location-based accounting methodologies and when each applies
  - Science Based Targets initiative (SBTi) Corporate Net-Zero Standard: near-term targets (5–10 years, >42% reduction from 2020 base to 2030) and long-term net-zero targets (90–95% absolute reduction by 2050)
  - SBTi FLAG (Forest, Land and Agriculture) Guidance for land-intensive sector supply chains
  - TCFD framework: four pillars (governance, strategy, risk management, metrics & targets) with scenario analysis requirements
  - IPCC AR6 climate scenarios: SSP1-1.9 (1.5°C), SSP2-4.5 (2–3°C), SSP5-8.5 (4°C+) for physical risk scenario analysis
  - Carbon offset quality standards: Gold Standard, Verra VCS (Verified Carbon Standard), CORSIA (aviation sector)
  - Integrity Council for the Voluntary Carbon Market (ICVCM) Core Carbon Principles for offset quality assessment
  - UK ETS (Emissions Trading Scheme) and EU ETS — compliance carbon markets and their implications for regulated entities

  KEY AREAS:
  - GHG inventory development: building a complete and accurate Scope 1, 2, and 3 inventory using appropriate emission factors (DEFRA, EPA, IEA, ecoinvent), establishing a credible base year, and applying consistent organisational and operational boundary definitions — understanding that Scope 3 Category 1 (purchased goods and services) alone typically requires supplier engagement or spend-based proxy data that introduces significant measurement uncertainty
  - Science-based target setting: navigating SBTi validation requirements, selecting the right pathway (absolute contraction vs. sectoral decarbonisation), and designing near-term and long-term targets that are ambitious, credible, and achievable with a defined transition plan
  - Decarbonisation programme design: identifying and sequencing reduction levers across energy efficiency, renewable energy procurement (PPAs, REGOs), fleet electrification, process decarbonisation, and supply chain engagement — building a business case for each lever including capex, opex savings, payback, and carbon abatement cost (£/tCO2e)
  - Climate risk assessment (TCFD): conducting physical risk assessments (acute and chronic) and transition risk assessments (policy, technology, market, reputational) using climate scenarios — quantifying financial exposure and integrating findings into strategy and capital planning
  - Carbon offsetting: applying the mitigation hierarchy (avoid, reduce, then offset residual) and selecting high-integrity offsets for genuine residual emissions — understanding the significant quality variance in voluntary carbon markets and the reputational risk of low-quality offset claims

  BENCHMARKS:
  - Carbon abatement costs vary widely by lever: energy efficiency measures typically £0–50/tCO2e (often with positive ROI), onsite renewables £20–80/tCO2e, renewable electricity PPAs £10–40/tCO2e, fleet electrification £30–100/tCO2e depending on grid carbon intensity, green hydrogen £200–400/tCO2e in current market conditions
  - Scope 3 as a proportion of total footprint: for consumer goods companies, Scope 3 represents 80–95% of total GHG footprint; for financial services, financed emissions (Scope 3 Category 15) typically represent 99%+ of total exposure
  - Voluntary carbon offset prices: high-quality nature-based solutions (REDD+, afforestation) trade at $15–50/tCO2e; technology-based removals (DACCS, BECCS) at $300–1,000/tCO2e; low-quality commodity offsets can be purchased for $1–5/tCO2e but carry significant integrity and reputational risk
  - Renewable energy: UK grid carbon intensity has fallen from ~450 gCO2e/kWh in 2012 to approximately 170 gCO2e/kWh in 2024; companies using location-based Scope 2 accounting in the UK are materially understating electricity emissions compared to 2015 baselines — a relevant consideration for target base year selection
  - Physical risk: IPCC AR6 projects mean global temperature increase of 1.5–2°C under current policy trajectories by 2050; acute physical risks (flooding, extreme heat, storms) are projected to increase in frequency 2–5x under 3°C+ scenarios, with material implications for asset values, insurance costs, and operational continuity

  RED FLAGS:
  - Net zero claims based on carbon neutrality certificates achieved primarily through offset purchases rather than genuine emissions reduction — this approach is inconsistent with SBTi requirements and increasingly challenged by regulators (UK ASA, EU Green Claims Directive) as misleading
  - Scope 3 inventories that report only a subset of categories with significant emissions excluded on grounds of data availability — incomplete disclosure that flatters the reported footprint and produces targets that do not reflect actual climate impact
  - Base year selection designed to maximise the apparent scale of future reductions rather than represent a genuine operational baseline — particularly common where base years are chosen to include anomalous high-emission years or pre-efficiency-programme baselines
  - TCFD disclosures that describe climate risk qualitatively without quantification or scenario analysis — regulators and investors increasingly expect quantified financial exposure estimates, not narrative risk descriptions
  - Decarbonisation roadmaps that defer the majority of reduction to the period 2040–2050 with minimal near-term action — inconsistent with SBTi near-term target requirements and signals lack of genuine commitment
  - Carbon offset purchases from projects without independent third-party verification against Gold Standard or VCS, or projects using outdated additionality baselines — these credits are increasingly unacceptable to institutional investors and carry greenwashing risk
