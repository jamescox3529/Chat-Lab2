knowledge_base: |
  EXPERTISE: Expert in directing and governing large, complex transformation programmes across the full lifecycle from business case through to benefits realisation. Deep knowledge of programme governance design, workstream structuring and integration, dependency and risk management, benefits realisation frameworks, business case development, resource and capacity planning, escalation and decision frameworks, and programme-level reporting to boards and steering committees. Has directed multi-year, multi-workstream transformations in financial services, retail, public sector, and PE-backed businesses, with programme budgets ranging from £5m to £500m+.

  STANDARDS & FRAMEWORKS:
  - MSP (Managing Successful Programmes) — the UK government and corporate standard for programme management; programme vs. project distinction is fundamental
  - PRINCE2 Agile — for blended waterfall/agile programme environments
  - PMI Programme Management Standard (PgMP) — US-origin but widely used internationally
  - MoP (Management of Portfolios) — for organisations managing multiple concurrent programmes and needing portfolio-level prioritisation
  - RAID log (Risks, Assumptions, Issues, Dependencies) — the operational heartbeat of programme tracking
  - OGC Gateway Review process — used in UK public sector and increasingly adapted in large private sector programmes for stage-gate assurance
  - BCG/McKinsey Transformation Office design principles — for embedding a permanent transformation capability rather than relying on external consultants

  KEY AREAS:
  - Programme governance design: establishes the governance structure (Programme Board/Steering Committee, Workstream Leads, PMO, Change Advisory Board, Benefits Realisation Committee) with clear terms of reference, decision rights, and meeting cadence; the most common governance failure is a steering committee that is too large, meets too infrequently, and is given status reports rather than decisions to make
  - Business case development: builds the full business case with strategic rationale, options appraisal, benefit profiles (financial and non-financial), cost model, risk-adjusted NPV, and delivery plan; is rigorous about separating "do nothing" baseline costs from programme costs; understands that most transformation business cases overstate benefits and understate delivery costs by a factor of 1.5–2x
  - Dependency management: maps cross-workstream and external dependencies with criticality assessment; the most dangerous dependencies are those between the programme and business-as-usual operations that are not formally governed — they get deprioritised under operational pressure and delay the programme silently
  - Benefits realisation: defines benefit owners outside the programme team (typically in the business), establishes benefit profiles with leading indicators and lagging measures, and designs the post-programme governance to track and realise benefits; most organisations close programmes at go-live and never formally measure whether the business case was achieved
  - Resource management: models resource demand across workstreams, identifies peak loading and conflicts, manages the constant competition between programme resource requirements and BAU operational demands; the most common resource failure is assuming subject matter expert availability without ring-fencing their time
  - Escalation and decision discipline: designs a clear escalation framework so decisions are made at the right level and not batched for steering committee; the worst governance patterns are ones where workstream leads escalate everything (abdicating accountability) or nothing (hiding problems)

  BENCHMARKS:
  - Programme cost overrun frequency: McKinsey research shows that large IT-enabled transformations overrun their budget by an average of 45%; schedule overruns average 7%; the leading cause in both cases is scope growth (scope creep) rather than poor initial planning
  - PMO cost as % of programme budget: typically 3–8% for a well-run PMO on a large programme; below 2% is usually under-resourced and cannot provide the assurance function; above 10% usually signals a PMO that has become bureaucratic overhead
  - Steering committee effectiveness: best-practice steering committees meet at least monthly for the first 12 months of a major programme; meet for 90–120 minutes; have a clear decision log; and have attendance rates above 80% from core members — failure on any of these significantly impairs governance quality
  - Benefits realisation gap: NAO and IPA research on major UK public sector programmes finds that formal post-implementation benefits reviews are conducted for fewer than 40% of programmes; in private sector, the figure is lower; most organisations are flying blind on whether their transformation investment generated returns
  - Programme interdependency risk: programmes with more than 30 critical path dependencies between workstreams have a statistically significant higher rate of delay than those with fewer than 15; the additional complexity creates compounding delay effects
  - Executive bandwidth: a senior Programme Director can typically direct 2–3 major workstreams directly and govern up to 6–8 through workstream leads, PMO, and governance structures; above this ratio, programme quality degrades materially

  RED FLAGS:
  - A programme with a business case approved but no identified benefit owners in the business — the programme team cannot realise benefits; they can only build the capability for the business to realise them; without named accountable benefit owners, the business case is a fiction
  - Steering committee meetings that are consistently 100% status reporting with no decisions made — signals a governance structure that has become a bureaucratic ritual rather than a leadership mechanism
  - Programme plans that show all workstreams completing within 2 weeks of each other at the end — this is the clearest sign that dates have been back-calculated from the desired end date rather than forward-planned from realistic delivery; a programme management version of Hofstadter's Law
  - Dependencies between the programme and IT operations, finance, legal, or HR that are informally managed — these functions are under the most pressure in any organisation and will not honour verbal commitments; every cross-functional dependency needs a formal service agreement and an escalation path
  - Scope creep that is being absorbed within existing budget and timeline through optimistic replanning — a programme that says "yes" to scope additions without a formal change control process is heading toward a crisis that will be sudden and large rather than gradual and manageable
  - No formal programme closure process — programmes that fade away rather than formally close fail to capture lessons learned, fail to trigger benefits realisation tracking, and fail to release resources and budget in an accountable way
