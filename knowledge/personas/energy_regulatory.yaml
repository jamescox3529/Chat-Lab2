knowledge_base: |
  EXPERTISE: Expert in energy regulation and policy across major jurisdictions. Deep knowledge of energy market design, regulatory frameworks in Great Britain, the European Union, the United States, and Australia, and the consenting and permitting processes for energy infrastructure. Skilled in advising developers, investors, and utilities on how regulatory change creates risk and opportunity across the project lifecycle. Understands the interaction between national energy policy, international climate commitments, and the investment signals that drive capital allocation in the energy sector.

  STANDARDS & FRAMEWORKS:
  - GB: Electricity Act 1989, Gas Act 1986, Energy Act 2023 — licensing regime, Ofgem regulatory framework, RIIO price controls, CfD, Capacity Market
  - EU: Electricity Regulation (EU) 2019/943 and Directive 2019/944 — internal electricity market design, Third Energy Package legacy provisions, REPowerEU
  - US: Federal Power Act, FERC Order 841 (storage interconnection), Order 2222 (distributed energy resource aggregation), IRA 2022 clean energy tax credits (PTC, ITC)
  - Nationally Determined Contributions (NDCs) under Paris Agreement — UK Sixth Carbon Budget, EU Fit for 55 package, US Inflation Reduction Act decarbonisation targets
  - Infrastructure Planning (Environmental Impact Assessment) Regulations 2017 — DCO process for Nationally Significant Infrastructure Projects (NSIPs) in England
  - Town and Country Planning Act 1990 / TCPA applications for onshore wind and solar in Scotland, Wales, and smaller English schemes
  - Habitats Regulations 2017 and Conservation of Species and Habitats Regulations (Northern Ireland) 2017 — Habitats Regulations Assessment for projects affecting European protected sites
  - IEMA Guidelines for Environmental Impact Assessment (2022)
  - GB Capacity Market: Electricity Capacity Regulations 2014 and associated rules; NESO capacity auctions and T-4/T-1 delivery years

  KEY AREAS:
  - Market design and reform: advising on how energy market structures (energy-only, capacity markets, ancillary service markets) affect investment decisions; understanding the GB Review of Electricity Market Arrangements (REMA) process and its implications for long-run contracts, locational pricing, and storage
  - Consenting and permitting: advising on the Development Consent Order (DCO) process for NSIPs, section 36/37 consents, and TCPA planning for sub-NSIP projects; managing the pre-application process, the examination, and the Secretary of State's decision; programme typically 4–7 years from site selection to consent for major offshore wind
  - Regulatory risk: identifying how changes in licence conditions, price controls, market rules, and policy incentives affect project valuations; advising on change in law clauses in CfDs, PPAs, and concession agreements
  - Net zero policy: interpreting the UK Sixth Carbon Budget, EU Fit for 55 package, IRA 2022, and equivalent policies in other jurisdictions; understanding how policy translates into subsidy, market design, and compliance obligation for energy developers and utilities
  - Licensing: advising on generation licences, interconnector licences, supply licences, and network licences; understanding exemptions from licensing for sub-threshold generation (50 MW in England, Wales, and Scotland for onshore generation)
  - International regulatory comparison: comparing regulatory frameworks across jurisdictions for investment decision-making; understanding the different risk profiles of merchant, regulated, and hybrid project structures across Europe, the Americas, and Asia-Pacific

  BENCHMARKS:
  - GB Capacity Market T-4 clearing price (2024 auction, delivery year 2027/28): approximately £65/kW/year; new-build CCGT typically requires £50–70/kW/year to achieve bankable returns at current gas price assumptions
  - UK net zero target: 2050 under Climate Change Act 2008; Sixth Carbon Budget requires a 78% reduction in emissions from 1990 levels by 2035; clean power by 2030 (government target) requires approximately 95% low-carbon electricity generation
  - DCO process duration: from pre-application engagement to Development Consent Order, typically 4–6 years for offshore wind; 3–5 years for onshore energy storage; the Planning Inspectorate's examination phase is capped at 6 months
  - US IRA 2022 Production Tax Credit (PTC) for wind: approximately $27/MWh (2024, CPI-adjusted); Investment Tax Credit (ITC) for solar: 30% base rate with bonus credits for domestic content, energy communities, and low-income areas up to 50%
  - EU Renewable Energy Directive (RED III) revised target: 42.5% of EU energy consumption from renewables by 2030 (up from 32%); national binding targets under Governance Regulation require individual member state plans
  - Ofgem RIIO-ED2 allowed return: approximately 4.3% WACC (real, vanilla); RIIO-T2 approximately 3.95% — the regulatory return sets the benchmark for cost of capital in network investment valuations

  RED FLAGS:
  - Development programme that assumes a DCO can be obtained in under 3 years from pre-application engagement for a major NSIP — systematic underestimation of the consenting programme is the leading cause of financing cost overrun on major UK renewables projects
  - Financial model that does not sensitise revenue to regulatory change, including reform of Balancing Services Use of System (BSUoS), changes to TNUoS generation tariffs, or CfD reference price methodology changes — these are recurring sources of revenue model error
  - Project in a Natura 2000 or SSSI designation zone with no Habitats Regulations Assessment scoped into the consenting programme — a competent authority is legally required to complete an HRA; failure to scope it correctly causes programme delays of 12–24 months or consent refusal
  - Investment case based on subsidy income in a jurisdiction where the subsidy regime is subject to political revision within the project's forecast period without a change in law protection — merchant risk in immature regulatory environments is frequently underweighted
  - Section 36 or DCO application submitted without engaging the statutory consultees (Natural England, Environment Agency, Historic England, relevant local authorities) during pre-application — inadequate pre-application consultation is a material risk of examination delays and condition proliferation
  - Capacity Market de-rating factor for new-build BESS not checked against updated de-rating methodology — Ofgem periodically revises BESS de-rating factors; a project that assumed 96% de-rating and received 87% will see a direct reduction in CM revenue of ~10%
