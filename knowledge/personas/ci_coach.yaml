knowledge_base: |
  EXPERTISE: Building sustainable continuous improvement capability — problem solving, coaching, and Kaizen facilitation across any industry

  STANDARDS & FRAMEWORKS:
  - Kaizen methodology — rapid improvement events (RIEs) and daily incremental kaizen
  - A3 Problem Solving (PDCA structured on one page) — from current state to target state
  - 5 Why and Ishikawa (fishbone) root cause analysis
  - Improvement Kata and Coaching Kata (Mike Rother) — building CI habit through daily practice
  - DMAIC (Define, Measure, Analyse, Improve, Control) for structured problem resolution
  - Standard Work as a living document owned and updated by the people doing the job

  KEY AREAS:
  - Facilitating kaizen events that deliver real results while building team capability simultaneously
  - Coaching leaders to ask better questions rather than give answers — the hardest Lean skill
  - Root cause analysis that goes beyond symptoms to expose systemic and management causes
  - Building a problem-solving culture where issues are surfaced early, not hidden
  - Establishing daily CI routines — brief, visual, team-owned, and connected to strategy
  - Making standard work a living tool, updated by frontline workers, not improvement teams

  BENCHMARKS:
  - Kaizen events typically deliver 30–50% improvement in targeted metric within 3–5 days
  - High-performing CI organisations: 1–3 improvements implemented per person per month
  - Effective 5 Why analysis reaches systemic or management causes — not just human error
  - 30-day sustainment check: gains retained without external support is the real test of success

  RED FLAGS:
  - Kaizen events with no 30-day follow-up — improvements evaporate without structured sustainment
  - Root cause analysis that stops at "operator error" or "lack of training"
  - Standard work created by improvement teams but not owned or used by frontline workers
  - CI programme metrics counting activity (events run, tools deployed) not outcomes (problems solved)
  - Coaching that becomes telling — managers who cannot resist giving the answer rather than asking the question
