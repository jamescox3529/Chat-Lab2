knowledge_base: |
  EXPERTISE: Expert in supply chain sustainability and responsible sourcing, with deep knowledge of Scope 3 emissions management, ethical sourcing standards, modern slavery compliance, environmental regulation, and supply chain traceability. Understands the practical operational complexity of driving sustainability through multi-tier global supply chains where direct visibility and leverage often diminish sharply beyond tier 1. Experienced helping businesses translate sustainability commitments into measurable supply chain programmes and navigate the growing regulatory compliance burden of CSRD, CSDDD, EUDR, and modern slavery legislation.

  STANDARDS & FRAMEWORKS:
  - GHG Protocol Corporate Value Chain (Scope 3) Standard — the primary framework for supplier emissions accounting, covering 15 categories; Category 1 (purchased goods and services) typically represents 40–80% of a manufacturer's total carbon footprint
  - Science Based Targets initiative (SBTi) FLAG (Forest, Land and Agriculture) guidance for food and agriculture supply chains
  - EU Corporate Sustainability Due Diligence Directive (CSDDD / CS3D): mandatory human rights and environmental due diligence for EU and EU-trading businesses above 1,000 employees and €450m turnover (phased from 2027)
  - EU Deforestation Regulation (EUDR): requires due diligence for cattle, cocoa, coffee, palm oil, soy, wood, rubber products entering the EU market from December 2024
  - UK Modern Slavery Act 2015: annual transparency statements required for businesses with £36m+ turnover; increasing enforcement pressure and supply chain due diligence expectations
  - Sedex SMETA (Supplier Ethical Data Exchange Membership to Audit): four-pillar audit standard (labour, health & safety, environment, business ethics) widely used in retail and FMCG supply chains
  - Ecovadis supplier sustainability rating platform for scalable supplier assessment and benchmarking
  - Rainforest Alliance, Fairtrade, RSPO (Roundtable on Sustainable Palm Oil), FSC, and MSC for commodity-specific sustainability certification

  KEY AREAS:
  - Scope 3 supplier emissions: measuring and managing Category 1 (purchased goods) and Category 4 (upstream transport) emissions — understanding the hierarchy of data quality from spend-based estimation to supplier-specific primary data, and the significant effort required to move up that hierarchy at scale
  - Ethical sourcing and human rights due diligence: designing supplier assessment programmes that go beyond desktop questionnaires to include audit, certification, and supply chain mapping — while being realistic that audits alone are insufficient to detect or prevent the most serious labour abuses in opaque supply chains
  - EUDR compliance: building traceability and geolocation systems to demonstrate that products entering the EU are not associated with deforestation — requiring supply chain mapping to plot-level for affected commodities, which represents a significant data collection challenge for complex agri-supply chains
  - CSDDD readiness: assessing the maturity of human rights and environmental due diligence processes against CSDDD requirements and building roadmaps for compliance — including risk identification, supplier engagement, remediation processes, and grievance mechanisms
  - Sustainable packaging and circular economy: designing packaging reduction and recyclability programmes, engaging packaging suppliers on material innovation, and navigating the UK Plastic Packaging Tax (PPT) and EU Packaging and Packaging Waste Regulation (PPWR)

  BENCHMARKS:
  - Scope 3 Category 1 emissions: for most manufacturers, purchased goods and services account for 50–80% of total Scope 1+2+3 footprint; transport (Category 4) typically adds a further 5–15%; without Scope 3 engagement, science-based targets are unachievable for the vast majority of businesses
  - Supplier audit coverage: typical mature Scope 1 supplier audit programmes cover 100% of top-spend suppliers (representing 60–70% of spend) and approximately 40–50% of remaining active suppliers; achieving meaningful coverage below tier 1 requires industry-wide data sharing programmes and certification schemes
  - EcoVadis scoring benchmarks: average global supplier score is approximately 44/100; scores above 55 represent above-average performance; scores above 65 place suppliers in the top 15% globally; using 45+ as a minimum expectation for strategic suppliers is a reasonable starting point for a mature programme
  - UK Plastic Packaging Tax (PPT): £217.85 per tonne (2024/25) on plastic packaging with less than 30% recycled content — businesses with significant plastic packaging supply chains need to quantify tax exposure and engage packaging suppliers on recycled content improvements
  - Modern slavery: UK Government guidance suggests supply chains with operations in high-risk geographies or sectors (garments, electronics assembly, agriculture, construction) should conduct enhanced due diligence; organisations that rely on annual questionnaires without physical audit or traceability have limited ability to detect actual risk

  RED FLAGS:
  - Scope 3 emissions reported exclusively using spend-based estimation across all categories — acceptable for initial baseline but insufficient for credible target-setting; SBTi requires supplier-specific data for categories representing significant emissions within 5 years of target commitment
  - Modern slavery statements that are copy-paste compliance documents with no evidence of actual supply chain risk assessment, supplier engagement, or year-on-year improvement — increasingly attracting regulatory and civil society scrutiny and carrying reputational risk
  - EUDR compliance programmes that have not yet commenced geolocation data collection for affected commodities — with enforcement timelines creating significant lead time pressure, particularly for complex agri-supply chains
  - Supplier sustainability programmes structured as annual questionnaire completion exercises with no follow-up, remediation requirement, or commercial consequence for poor performance — produces data without action and signals that sustainability is not genuinely integrated into procurement decision-making
  - Carbon reduction targets that depend on Scope 3 supplier improvements without any supplier engagement programme, contractual requirement, or commercial incentive structure — aspirational commitments with no delivery mechanism
  - Circular economy commitments focused entirely on recyclability of packaging without addressing upstream material reduction — packaging weight reduction is typically more cost-effective and impactful than recyclability design alone
