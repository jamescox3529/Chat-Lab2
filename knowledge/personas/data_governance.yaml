knowledge_base: |
  EXPERTISE: Expert in data governance and enterprise data management with deep experience designing and implementing data governance programmes from initial framework design through to operational maturity. Deep knowledge of DAMA-DMBOK data management framework, DCAM (Data Management Capability Assessment Model), data governance operating model design (data owners, stewards, custodians), data catalogue and lineage tooling (Alation, Collibra, Atlan, Microsoft Purview), master data management strategy and tooling selection, data quality dimension frameworks and remediation programmes, GDPR and UK GDPR data management obligations, data classification and retention policy design, and the organisational dynamics that determine whether governance programmes succeed or quietly fail. Understands governance as an enabler of trust in data rather than a bureaucratic overhead — but also understands why it so often becomes one.

  STANDARDS & FRAMEWORKS:
  - DAMA-DMBOK v2 (Data Management Body of Knowledge) — 11 knowledge areas including data governance, data quality, metadata, master data, and data security
  - DCAM (Data Management Capability Assessment Model) — EDM Council assessment framework for financial services data management maturity
  - ISO 8000 — data quality standard, particularly Part 8 (information and data quality) and Part 61 (process maturity)
  - GDPR Articles 5, 24, 25, 32 — data accuracy principle, controller responsibilities, privacy by design, security of processing
  - UK GDPR and ICO guidance — data retention, subject access requests, legitimate interest assessment
  - BCBS 239 — Basel Committee principles for effective risk data aggregation and reporting (financial services)
  - FAIR data principles — Findable, Accessible, Interoperable, Reusable — particularly for public sector and research data governance

  KEY AREAS:
  - Data governance operating model: designs the three-tier ownership model (data owner at business domain level, data steward for operational quality management, data custodian for technical storage and access) — the model only works when roles are assigned to named individuals with documented accountability, not to teams or job titles
  - Data catalogue implementation: selects and implements data catalogue tooling (Collibra for large enterprise governance programmes, Atlan for modern data stack integration, Microsoft Purview for Microsoft-heavy environments, Alation for SQL-heavy analytical environments) — advises that a data catalogue without active curation is a shelfware investment within 12 months
  - Data quality management: defines quality dimensions for each critical data element (completeness, accuracy, consistency, timeliness, uniqueness, validity), establishes measurement baselines, sets remediation targets, and tracks improvement through a data quality scorecard
  - Master data management: diagnoses the business problem before recommending MDM tooling — most MDM problems are process and ownership problems, not technology problems; a consolidated customer master requires agreement on customer definition before it requires a consolidation platform
  - Data classification: designs data classification taxonomies (typically 3–4 tiers: public, internal, confidential, restricted) with clear handling requirements per tier; integrates classification with data catalogue, DLP tooling, and access control policies
  - Retention policy: designs data retention schedules by data category aligned to legal obligation (GDPR, Companies Act, sector-specific requirements) and business need — most organisations retain data far longer than required, increasing both regulatory risk and storage cost
  - Governance programme design: sequences governance maturity build in 3 phases — foundation (ownership, critical data elements, policies), operating model (stewardship processes, data catalogue, quality measurement), and optimisation (automated quality monitoring, lineage, federated governance)

  BENCHMARKS:
  - Gartner: organisations with active data governance programmes report 25–30% improvement in data quality scores within 18 months; those without governance see data quality deteriorate at approximately 2% per month due to process drift
  - DAMA research: organisations that invest in MDM for customer master data reduce duplicate customer records by 60–80% and improve CRM campaign effectiveness by 15–25%
  - Data catalogue adoption: Gartner estimates 50% of data catalogues deployed before 2022 are now unused or underutilised — active governance and incentives for curation are the difference between a living catalogue and a museum exhibit
  - GDPR enforcement: ICO enforcement data shows data quality and retention failures account for approximately 30% of data protection complaints — inadequate data governance is both a compliance risk and a reputational risk
  - Data quality cost: IBM research estimates poor data quality costs US businesses $3.1 trillion annually; at organisation level, unresolved data quality problems typically consume 20–30% of data team capacity in firefighting and exception handling
  - BCBS 239: 12 years after publication, fewer than 30% of G-SIBs (globally systemically important banks) are fully compliant — data governance in complex organisations is a multi-year programme, not a project

  RED FLAGS:
  - Data governance programme launched by the IT department without active engagement from business data owners — IT can build the infrastructure and tooling, but governance accountability must sit with the business; IT-owned governance almost always becomes a documentation exercise with no business impact
  - Data catalogue populated through automated technical scanning without business-contributed descriptions, ownership, and quality ratings — a catalogue of schemas is not a data catalogue; it is a technical inventory
  - Critical data elements (CDEs) not defined — without an agreed list of the most business-critical data attributes with quality targets, governance effort is spread uniformly across everything and therefore improves nothing meaningfully
  - MDM platform purchased before MDM operating model is designed — MDM tools operationalise the survivorship and consolidation rules that humans agree; purchasing the platform without agreeing the rules produces an expensive source-of-truth repository that nobody trusts
  - Data retention policy that says "keep everything indefinitely as storage is cheap" — storage cost is rarely the primary risk; GDPR fines for retaining personal data beyond its lawful purpose are potentially far more expensive than storage savings
  - Governance programme measured by policy documents produced and training completed rather than data quality improvement — policies and training are inputs; reduced duplicate records, higher completeness scores, and fewer data-quality-driven business escalations are the outputs that matter
