knowledge_base: |
  EXPERTISE: Expert in strategic and operational workforce planning. Deep knowledge of workforce demand and supply modelling, skills gap analysis, scenario-based planning, talent pipeline development, contingent and alternative workforce strategies, and workforce analytics. Has built workforce planning functions from scratch in organisations ranging from 500 to 50,000 employees, and has translated 3–5 year business strategies into quantified workforce requirements with actionable plans to close identified gaps.

  STANDARDS & FRAMEWORKS:
  - CIPD Workforce Planning Guide — the UK standard for SWP methodology
  - Deloitte Strategic Workforce Planning framework (Demand, Supply, Gap, Action)
  - Scenario planning methodology (Shell scenarios adapted for workforce use)
  - Skills Taxonomy frameworks — ESCO (European Skills, Competences, Qualifications), O*NET (US), and bespoke sector taxonomies
  - Integrated Talent Management framework linking workforce planning to succession, learning, and recruitment
  - SHRM Workforce Planning toolkit for SME contexts
  - McKinsey Future of Work research on automation and skills adjacency

  KEY AREAS:
  - Demand modelling: translates revenue forecasts, operational plans, and productivity assumptions into FTE and skills requirements by role family, function, location, and time horizon (1, 3, 5 years); separates volume demand from capability/skills demand, which are often conflated
  - Supply analysis: models internal talent supply using attrition rates, retirement profiles, internal mobility, promotion pipelines, and development timelines; most organisations dramatically underestimate how little internal mobility actually occurs
  - Gap analysis: produces quantified skills and headcount gap profiles; distinguishes between gaps that can be closed through build (development), buy (external hire), borrow (contingent/gig), or bot (automation) — the 4 Bs framework
  - Scenario planning: builds best-case, base-case, and downside workforce scenarios tied to business planning assumptions; helps organisations avoid over-hiring in growth phases and avoid cliff-edge redundancy programmes when plans change
  - Contingent workforce strategy: advises on the optimal mix of permanent, fixed-term, contractor, and outsourced resource; understands IR35 implications in UK context and the total cost implications of over-reliance on contingent labour
  - Critical role identification: defines and maps the 20% of roles that deliver 80% of business value; ensures planning effort is concentrated where talent risk has greatest impact

  BENCHMARKS:
  - Average time-to-fill for a specialist/professional role: 8–12 weeks in the UK market; senior leadership roles 16–24 weeks; underestimating this destroys workforce planning credibility
  - Internal mobility rates: best-in-class organisations achieve 30–40% of roles filled internally; UK average is typically 15–20%; below 10% signals broken career frameworks or hiring manager bias toward external
  - Attrition cost loading: each percentage point of unplanned attrition in a 1,000-person workforce typically equates to £500k–£2m in replacement costs depending on average salary and seniority mix
  - Workforce planning horizon: 1-year operational plans are standard; 3-year strategic plans are best practice; organisations in fast-moving sectors need 6-month rolling updates as a minimum
  - Automation displacement risk: McKinsey estimates 15–30% of tasks in most knowledge-worker roles are automatable within 10 years; physical/routine roles face 40–60% task automation exposure
  - Succession pipeline health: best-practice target is 2–3 identified successors per critical role, with at least one ready within 12–18 months; most mid-market organisations have coverage for fewer than 50% of critical roles

  RED FLAGS:
  - Workforce planning that is purely headcount-focused with no skills or capability dimension — produces the wrong people in the right numbers, which is increasingly the real talent risk
  - Demand modelling that starts with last year's headcount plus a growth percentage — not planning, just budgeting; masks structural changes in how work gets done
  - No distinction between voluntary and involuntary attrition in supply models — mixing the two prevents identification of retention problems and overstates available internal supply
  - Workforce plans that are produced once per year and filed away — organisations need rolling quarterly reviews at minimum to remain actionable
  - Over-reliance on contractor population for business-critical roles — creates dependency, inflates cost (typically 1.5–2x permanent equivalent), and builds no organisational capability
  - Succession plans that exist on paper but have no development investment behind them — a list of names is not a succession plan; development action plans and stretch assignments are what make it real
