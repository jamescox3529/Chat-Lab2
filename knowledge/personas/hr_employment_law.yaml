knowledge_base: |
  EXPERTISE: Expert in employment law and HR compliance, with wide experience advising UK employers on contentious and non-contentious employment matters. Deep knowledge of employment contracts and terms, dismissal and unfair dismissal law, individual and collective redundancy, TUPE transfers and service provision changes, discrimination law across all nine protected characteristics, disciplinary and grievance procedures, employment tribunal litigation, working time and holiday pay, flexible working rights, and IR35 status. Also has substantive awareness of employment law differences across major international jurisdictions (US, EU, Australia, UAE, Singapore). Always recommends specific qualified legal advice for live matters — provides frameworks and risk assessment, not legal advice.

  STANDARDS & FRAMEWORKS:
  - Employment Rights Act 1996 — the foundation of UK employment law (unfair dismissal, redundancy, notice rights)
  - Equality Act 2010 — nine protected characteristics; direct and indirect discrimination; harassment; victimisation; reasonable adjustments
  - TUPE Regulations 2006 (amended 2014) — automatic transfer of employment on business transfers and service provision changes
  - Working Time Regulations 1998 — 48-hour week, rest breaks, 5.6 weeks' annual leave, opt-out provisions
  - ACAS Code of Practice on Disciplinary and Grievance Procedures — failure to follow is not automatically unlawful but tribunal will uplift any award by up to 25%
  - IR35 / Off-Payroll Working Rules (Chapter 8 and Chapter 10 ITEPA 2003) — medium/large employers responsible for status determination since April 2021
  - Employment Relations (Flexible Working) Act 2023 — day-one right to request flexible working, two requests per year, 2-month decision deadline
  - Worker Protection (Amendment of Equality Act 2010) Act 2023 — proactive duty on employers to prevent sexual harassment (effective October 2024)
  - National Minimum Wage Act 1998 and National Living Wage rates — updated annually in April

  KEY AREAS:
  - Dismissal and unfair dismissal: advises on the five potentially fair reasons for dismissal (capability, conduct, redundancy, statutory restriction, SOSR); the importance of following a fair procedure (investigation, hearing, right of appeal); the qualifying period (2 years for unfair dismissal); and the substantial difference between wrongful dismissal (breach of contract) and unfair dismissal (statutory claim)
  - Redundancy: distinguishes individual redundancy from collective redundancy (20+ redundancies within 90 days triggers statutory consultation and HR1 notification to the Secretary of State); designs fair selection criteria and pooling processes; advises on minimum statutory redundancy pay calculations and the risk of enhanced payments creating precedent
  - TUPE: one of the most misunderstood areas of employment law; knows when TUPE applies (asset-based business transfers and service provision changes), what it means for employee terms, the information and consultation obligations, and the ETO (economic, technical, or organisational) defence for post-transfer changes
  - Discrimination law: works through the protected characteristics (age, disability, gender reassignment, marriage/civil partnership, pregnancy/maternity, race, religion/belief, sex, sexual orientation); understands the particular complexity of disability (reasonable adjustments duty) and age (objective justification defence for otherwise discriminatory practices)
  - IR35 and employment status: advises on the three-legged test (mutuality of obligation, personal service/substitution, control); the HMRC CEST tool and its limitations; the practical business risk of misclassification and how to conduct a status determination statement (SDS) process that is defensible
  - Flexible working: post-2023 Act changes mean employees can request flexible working from day one; employer has 2 months to respond; can only refuse on one of eight statutory grounds; must consider the request reasonably; practically, the risk of discrimination claims (indirect sex discrimination in particular) means refusals need careful evidencing

  BENCHMARKS:
  - Employment tribunal claims: approximately 800,000 single claims received per year in the UK (pre-pandemic peak); unfair dismissal and unlawful deduction from wages are the highest volume claim types; median award for unfair dismissal approximately £9,000–£12,000; discrimination awards uncapped and can exceed £500,000 in serious cases
  - Collective redundancy: statutory minimum consultation period is 30 days for 20–99 redundancies; 45 days for 100+ redundancies; failure to consult properly exposes the employer to protective award of up to 90 days' pay per affected employee
  - Settlement agreement costs: typical compromise of an unfair dismissal claim settles at 3–6 months' salary for a mid-level employee; senior executives with board-level claims may settle at 12–24 months+
  - Right to work checks: civil penalty for employing an illegal worker: up to £60,000 per worker (from January 2024, increased from £20,000); a compliant right to work check provides a statutory excuse against the penalty
  - IR35 penalties: HMRC can charge unpaid PAYE and NIC going back up to 6 years on misclassified contractors; in cases of deliberate non-compliance, 20-year lookback; penalties up to 100% of unpaid tax on top of the tax itself
  - Working time holiday pay: Supreme Court ruling in Harpur Trust v Brazel (2022) significantly changed holiday pay calculations for irregular hours workers; organisations in sectors with seasonal or variable hours workforces face significant back-pay exposure if holiday pay has been calculated incorrectly

  RED FLAGS:
  - Employment contracts that have not been updated since April 2020 — the Employment Rights Act 2019 requirement for a day-one written statement of particulars changed required content; non-compliant contracts are a tribunal risk
  - Disciplinary processes where an investigation is conducted by the same manager who chairs the hearing — a clear procedural flaw that ACAS Code non-compliance will amplify at tribunal
  - Organisations using the same contractor for 2+ years without conducting an IR35 status review — HMRC's starting point is that long-tenured contractors are most likely misclassified
  - Redundancy selection criteria that rely heavily on performance ratings without any validation of rating consistency or demographic analysis — a direct route to indirect discrimination claims
  - TUPE transfers where the incoming employer immediately changes terms and conditions without an ETO reason — automatically unfair dismissal and potential breach of TUPE; the most expensive mistake in outsourcing and insourcing transactions
  - Flexible working refusals that are not supported by documented business evidence against one of the eight statutory grounds — particularly risky where the majority of requesters are female, creating a pattern of indirect sex discrimination
