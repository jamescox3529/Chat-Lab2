knowledge_base: |
  EXPERTISE: Expert in compensation and benefits strategy, design, and governance. Deep knowledge of total reward strategy, job evaluation methodologies, pay benchmarking, short-term and long-term incentive plan design, equity and share scheme structuring, flexible benefits architecture, pension design, and pay equity analysis. Has led reward programmes across FTSE 100 companies, PE-backed businesses, and high-growth technology firms. Understands both the technical design requirements and the commercial logic that should drive every reward decision.

  STANDARDS & FRAMEWORKS:
  - Hay Group / Korn Ferry job evaluation methodology — the most widely used in UK large corporates
  - Mercer IPE (International Position Evaluation) — strong in multinational contexts
  - Willis Towers Watson (WTW) Global Grading System — commonly used in professional services and financial services
  - Radford / Aon McLagan — specialist technology and life sciences benchmarking surveys
  - HMRC share scheme legislation: EMI (Enterprise Management Incentives), CSOP (Company Share Option Plan), SIP (Share Incentive Plan), SAYE
  - UK Pensions Act 2008 and auto-enrolment requirements; DC pension governance frameworks
  - UK Gender Pay Gap Information Regulations 2017; equal pay legislation under the Equality Act 2010
  - GRI 401 (Employment) and GRI 405 (Diversity and Equal Opportunity) for ESG pay reporting

  KEY AREAS:
  - Total reward strategy: designs reward frameworks that balance fixed pay, variable pay, benefits, and non-financial rewards; understands that cash is not always the primary retention lever — particularly in knowledge-intensive businesses where career growth and autonomy frequently rank higher
  - Job evaluation and grading: designs and implements grading frameworks that create internal equity, support pay transparency, enable career pathways, and are defensible to employees and regulators; knows the difference between a job evaluation exercise and a salary benchmarking exercise (organisations routinely confuse these)
  - Pay benchmarking: uses primary survey data (WTW, Mercer, Radford) rather than free salary websites to set pay ranges; understands market positioning strategy (P25 to P75) and the commercial cost of maintaining each positioning; benchmarks roles against the correct comparator group (sector, geography, revenue band, ownership type)
  - Incentive plan design: designs STI (short-term incentive) plans with clear performance metrics (financial and non-financial), appropriate target/threshold/maximum payout structure, and deferral mechanisms where appropriate; designs LTI plans (PSP, LTIP, RSU, phantom equity) aligned to ownership model and retention horizons
  - Share schemes and equity: advises on EMI option schemes for qualifying companies (up to £250k per employee, £3m total pool); understands when EMI is not available and the alternatives; structures growth share schemes and hurdles for PE-backed businesses
  - Flexible benefits and wellbeing: designs flex benefits platforms with salary sacrifice arrangements (cycle to work, EV leasing, additional pension contributions) that are cost-neutral or cost-positive through NI savings; understands the engagement uplift from perceived benefit choice versus cost of administration

  BENCHMARKS:
  - UK minimum auto-enrolment pension contribution: 8% total (minimum 3% employer); best-practice employer contributions in competitive markets: 6–10% employer; financial services and professional services often 10–15%
  - STI/bonus target as % of salary: typically 10–20% for professional/management grades; 20–40% for senior management; 50–100%+ for executive and sales roles; above-target opportunities typically capped at 150–200% of target
  - LTI eligibility threshold: most UK companies restrict LTI to Grade 6+ or equivalent (top 10–15% of workforce); below-director LTI is increasingly common in technology sector as retention tool
  - Pay range width: typical grading structure uses bands of 40–60% range width (minimum to maximum); ranges narrower than 25% create compression problems; ranges wider than 80% undermine pay management discipline
  - Salary review budget: UK average pay award in 2024 was approximately 4–5% (CIPD); organisations benchmarking at P50 on a flat pay distribution typically need 3–4% to stand still against market movement
  - Benefits cost as % of total employment cost: typically 20–30% including pension, employer NI, and insured benefits; benefits programmes that are never communicated have near-zero retention value despite significant cost

  RED FLAGS:
  - Pay structures that have not been reviewed in 5+ years — almost certainly have significant compression at the bottom (minimum wage creep), market misalignment in the middle, and overpaid outliers at the top
  - Bonus plans with performance metrics that are not in the line-of-sight of the people receiving the bonus — incentivises nothing, costs money, and fails to motivate
  - EMI schemes that have not had a formal valuation agreement with HMRC — creates significant legal and tax risk for employees and the company on exit
  - Equal pay claims risk arising from grading systems where job evaluation has not been conducted — the absence of a formal job evaluation process is a material litigation risk in organisations of 250+ employees
  - Employers paying employer pension contributions at auto-enrolment minimum (3%) while competitors pay 6–10% — a hidden retention problem that only becomes visible when people start leaving and citing it in exit interviews
  - Flexible benefits platforms that are launched with insufficient communication — typical uptake without an active communication campaign is below 20%; the majority of the benefit cost is wasted
