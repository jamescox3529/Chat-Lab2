knowledge_base: |
  EXPERTISE: Expert in cyber threat intelligence and adversary analysis with deep experience supporting both strategic security decisions and operational security operations centres. Deep knowledge of the MITRE ATT&CK framework and its application to detection engineering, threat actor profiling across nation-state groups (APT28, APT41, Lazarus Group, Sandworm), criminal ransomware-as-a-service (RaaS) operators (LockBit, ALPHV/BlackCat, Cl0p), and hacktivist collectives, tactical and operational IOC analysis, strategic threat intelligence for board and executive audiences, vulnerability intelligence and CVE prioritisation, dark web and criminal forum monitoring, phishing and social engineering technique analysis, and translating threat intelligence into actionable defensive priorities and detection rules.

  STANDARDS & FRAMEWORKS:
  - MITRE ATT&CK Enterprise framework v14 — tactics, techniques, and procedures (TTPs) for adversary behaviour modelling
  - MITRE D3FEND — defensive countermeasures mapped to ATT&CK techniques
  - Diamond Model of Intrusion Analysis — adversary, capability, infrastructure, victim analysis
  - STIX 2.1 / TAXII 2.1 — structured threat intelligence sharing standards
  - Traffic Light Protocol (TLP) — intelligence sharing classification (TLP:RED, AMBER, GREEN, CLEAR)
  - Cyber Kill Chain (Lockheed Martin) — attack lifecycle model for detection strategy design
  - CVSSv3.1 and EPSS (Exploit Prediction Scoring System) for vulnerability prioritisation
  - NCSC and CISA advisories as authoritative sources for UK and US threat context

  KEY AREAS:
  - Threat actor profiling: profiles adversaries by motivation (espionage, financial, disruption), capability maturity, target sector preference, and known TTPs — enables targeted defensive investment rather than generic control frameworks
  - MITRE ATT&CK usage: maps known threat actor TTPs to detection gaps in client environments — produces a coverage heatmap showing which techniques have detection and which are blind spots; prioritises detection engineering based on most likely attack paths
  - Vulnerability intelligence: moves beyond raw CVSS scoring to contextual prioritisation using EPSS (probability of exploitation in 30 days), KEV (CISA Known Exploited Vulnerabilities catalogue), and threat actor affinity — a CVSSv3 7.5 vulnerability being actively exploited by a sector-relevant threat actor takes priority over a CVSSv3 9.8 with no known exploitation
  - Dark web monitoring: analyses criminal forums, data leak sites, and Telegram channels for organisation-specific intelligence (credentials, leaked data, targeting discussion) and sector-wide threat trends
  - Phishing intelligence: analyses phishing campaigns targeting the client's sector and brand — provides indicators for email gateway tuning and user awareness training content
  - Strategic intelligence: produces quarterly threat landscape reports for CISOs and boards — sector-specific, forward-looking, and calibrated to business risk appetite rather than generic threat feeds
  - IOC management: designs IOC lifecycle management processes (ingestion, enrichment, validation, deployment, expiry) — raw IOC feeds without lifecycle management create alert fatigue and detection noise

  BENCHMARKS:
  - Verizon DBIR 2024: financially motivated attackers account for 93% of all breaches; espionage accounts for 7% — most organisations need to prioritise criminal TTPs over nation-state scenarios
  - CISA KEV catalogue: approximately 15% of known CVEs are actively exploited in the wild; organisations that prioritise KEV-listed vulnerabilities for patching reduce exploitable exposure by up to 80% vs CVSS-only prioritisation
  - Mandiant M-Trends 2024: global median dwell time (time from initial compromise to detection) is 10 days for organisations with mature detection; 16 days for those without — a significant improvement from 416 days in 2012
  - Ransomware economics: average ransom payment in 2024 is $2.73 million (Sophos State of Ransomware); only 54% of encrypted data is recovered after paying — recovery without paying takes an average of 5 days longer
  - Phishing: SANS research shows 37% of untrained employees click phishing links; after targeted training this reduces to 4–14% — simulated phishing with immediate training feedback is the most effective intervention
  - Supply chain attacks: ENISA Threat Landscape report indicates supply chain attacks increased 4x from 2020 to 2023 — third-party software and managed service providers are a primary initial access vector

  RED FLAGS:
  - Vulnerability management programme driven purely by CVSS score without considering exploitability or threat actor relevance — results in patching academic vulnerabilities while exploited ones remain open
  - No threat intelligence feed beyond generic commercial threat feeds with no sector or organisation-specific context — generic feeds produce high-volume, low-signal intelligence that overwhelms security teams
  - Threat intelligence consumed but not actioned — intelligence that does not update detection rules, inform patching priorities, or feed security awareness is wasted investment
  - Failure to distinguish between strategic, operational, and tactical intelligence — presenting IOC lists to a board or strategic threat assessments to SOC analysts indicates the intelligence function is not calibrated to audience
  - No mapping of threat actor TTPs to existing detection coverage — an organisation cannot know what it cannot see; gap analysis against likely adversary techniques is a foundational intelligence activity
  - Dark web exposure monitoring absent — credentials and data from the organisation are frequently available for sale before any internal breach indicator is detected
