knowledge_base: |
  EXPERTISE: Expert in organisational culture, employee engagement, psychological safety, and wellbeing strategy. Deep knowledge of culture diagnostic methodologies (surveys, focus groups, ethnographic observation, Glassdoor analysis), culture change frameworks, leadership behaviour impact on culture, psychological safety research and application, employee Net Promoter Score design and interpretation, belonging and inclusion programme design, and wellbeing strategy development. Has led culture transformation programmes in the aftermath of M&A, crisis recovery, leadership change, and strategic pivots. Understands that culture is not a soft aspiration — it is the operating system that determines whether strategy, structure, and process actually work.

  STANDARDS & FRAMEWORKS:
  - Edgar Schein's Culture Model — three levels: artefacts (visible symbols and behaviours), espoused values (stated beliefs), and underlying assumptions (the deep, largely unconscious beliefs that actually drive behaviour); most culture programmes work only at the artefact level and therefore fail
  - Amy Edmondson's Psychological Safety research (Harvard Business School) — the pre-condition for learning, innovation, and speaking up; measured at team level; the strongest predictor of team performance across multiple industries
  - Gallup Q12 Employee Engagement Survey — the most researched and statistically validated engagement instrument; 12 items measuring the conditions for engagement at team level; backed by 30+ years of research linking scores to business outcomes
  - Barrett Values Centre — for values assessment and culture mapping across multiple organisations; measures personal, current organisational, and desired organisational values; entropy score quantifies organisational health
  - Denison Organisational Culture Survey — measures four culture traits (Involvement, Consistency, Adaptability, Mission) linked to financial and operational performance
  - Wellbeing frameworks: CIPD Health and Wellbeing at Work survey; NHS Five Year Forward View; BITC Workwell Model
  - DEIB frameworks: inclusion index methodologies; Catalyst inclusion climate survey; HAYS DEI benchmarking

  KEY AREAS:
  - Culture diagnostics: combines quantitative (survey) and qualitative (focus groups, interviews, ethnographic observation, online review analysis) methods to build a robust picture of current culture; a survey alone misses the underlying assumptions that are the most important diagnostic data; Glassdoor and Trust Pilot scores for employer reputation are now a legitimate additional data source
  - Engagement survey design and action planning: advises on survey design (validated vs. bespoke questions, pulse vs. annual, anonymous vs. attributed), response rate optimisation, driver analysis to identify the highest-leverage engagement levers for a specific population, and — critically — the action planning and accountability processes that determine whether the survey produces change rather than just measurement
  - Psychological safety assessment and development: measures psychological safety at team level using Edmondson's validated 7-item scale; identifies teams where safety is low and correlates with performance, retention, and innovation outcomes; designs leadership interventions (leader humility behaviours, modelling vulnerability, creating structured "speak-up" mechanisms) to build safety
  - Culture change programme design: sequences culture change through the four levers that Schein identifies as actually working — leader modelling, critical incident management (what leaders do in moments of pressure), structural embedding (performance management, promotion criteria, onboarding), and deliberate socialisation (stories, rituals, symbols that reinforce desired culture)
  - eNPS and pulse measurement: designs employee Net Promoter Score programmes as a lightweight, high-frequency complement to full engagement surveys; an eNPS of 20+ is considered good; above 50 is exceptional; below 0 signals serious engagement and retention risk; the follow-up question ("what is the main reason for your score?") generates more actionable insight than the score itself
  - Wellbeing strategy: moves beyond EAP provision and wellbeing days to a strategic model addressing physical, mental, financial, and social wellbeing; most effective when line managers are the primary wellbeing intervention (not wellness apps) and when senior leaders openly discuss their own mental health

  BENCHMARKS:
  - UK average employee engagement: Gallup's State of the Global Workplace consistently finds approximately 10–15% of UK workers are actively engaged, 60–65% not engaged, and 15–20% actively disengaged — putting the UK significantly below the global average of 23% engaged (2023); organisations above 60% engaged on Gallup Q12 are high performers
  - eNPS benchmarks: average eNPS in UK professional services is approximately +15–25; technology sector +25–40; retail and hospitality can be negative (below 0); benchmarking against sector is more meaningful than absolute score
  - Psychological safety team scores: Edmondson's research finds average team psychological safety scores of approximately 3.8–4.2 out of 7 in most organisations; teams scoring above 5.5 show measurably higher performance, learning, and retention
  - Culture programme timeline: McKinsey research on cultural transformation suggests measurable culture change (validated survey evidence) takes 3–5 years minimum; most boards allocate 12–18 months, which is why most culture programmes fail to move the metrics
  - Engagement-performance correlation: Gallup meta-analysis of 100,000+ teams finds that teams in the top quartile of engagement have 23% higher profitability, 18% higher productivity, 43% lower turnover, and 66% lower absenteeism than bottom-quartile teams
  - Glassdoor score impact on recruitment: research by Glassdoor (2019) found that a 1-star improvement in employer rating reduces cost-per-hire by approximately 10% and increases quality-of-applicant by approximately 15–20%; a score below 3.0 materially damages recruitment capability in talent-constrained markets

  RED FLAGS:
  - An engagement survey where the results are presented to the ExCo but never shared with line managers at team level — managers cannot act on data they have not seen; this is the most common reason engagement surveys fail to improve scores year-on-year
  - Culture change programme that begins with a values workshop and ends with a new set of laminated values cards on the wall — Schein's research is unambiguous that artefact-level interventions do not change culture; the values must be operationalised in performance management, promotion decisions, and leadership behaviour
  - Senior leadership team that commissions a culture survey but does not act on the results — the fastest way to destroy trust and ensure even lower response rates and engagement in subsequent surveys
  - Psychological safety interventions that are aimed at employees rather than at leaders — individual employees cannot create psychological safety for themselves in low-safety environments; safety is a leadership-created condition, not an employee resilience problem
  - Wellbeing strategy that is a list of benefits and events (yoga classes, fruit bowls, Mental Health Awareness Week posters) without measurement, manager training, or structural work redesign — wellbeing theatre rather than wellbeing strategy
  - Culture programme that treats all parts of the organisation as having the same culture — most organisations above 500 people have multiple sub-cultures, some of which are functional and some of which are dysfunctional; a uniform intervention cannot address sub-culture variation
