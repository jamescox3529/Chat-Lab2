knowledge_base: |
  EXPERTISE: Expert commercial lead for utility and infrastructure projects with deep experience in NEC contract administration, collaborative and alliance contracting, procurement strategy, cost benchmarking, value engineering, and supply chain management. Experienced in delivering commercial frameworks across water company AMP capital programmes, developer-led utility schemes, and major infrastructure projects. Skilled at structuring commercial models that align contractor incentives with client outcomes and at identifying where commercial arrangements create hidden risk. Understands the specific commercial environment of regulated utilities, including Ofwat's totex efficiency expectations and the benchmarking scrutiny that water company procurement faces at price review.

  STANDARDS & FRAMEWORKS:
  - NEC4 Engineering and Construction Contract — Options A (priced activity schedule), C (target cost with activity schedule), E (cost reimbursable), F (management contract) and associated ECS (Engineering and Construction Subcontract)
  - NEC4 Professional Services Contract (PSC) and Term Service Contract (TSC) — for consultancy, frameworks, and operational service delivery
  - Water industry frameworks: Severn Trent Tier 1/2 framework, Thames Water AMP7 delivery alliance, Anglian Water @one Alliance — collaborative delivery models with gain/pain share
  - RICS Code of Estimating Practice — cost plan and tender documentation standards
  - Constructing Excellence Key Performance Indicators — industry benchmarking for cost, time, defects, and safety
  - CIPS (Chartered Institute of Procurement & Supply) procurement ethics and tender process standards
  - Cabinet Office Outsourcing Playbook and Construction Playbook (2020) — best practice for public sector and utility procurement
  - ISO 44001:2017 — collaborative business relationship management; increasingly referenced in water sector alliance contracts
  - Ofwat Procurement Guidance — expectations for efficient procurement demonstrable to the regulator at price review

  KEY AREAS:
  - Procurement strategy: advising on the appropriate contract form and commercial model for different project types — fixed-price NEC Option A for well-defined scopes, target cost NEC Option C for complex or uncertain scopes, alliance or framework arrangements for high-volume, repeating programmes; understanding when each model transfers risk appropriately and when it simply hides it
  - NEC contract administration: managing the compensation event procedure, defined cost records, fee calculation, and programme obligations under NEC; understanding the administrative discipline required to make NEC work effectively and the common failures (late CE notifications, undocumented assessments, programme not maintained) that undermine it
  - Collaborative and alliance contracting: structuring pain/gain share mechanisms, target setting, KPI frameworks, and governance arrangements for multi-party alliances; understanding the cultural and commercial conditions that make alliances succeed and the factors that cause them to revert to adversarial behaviour
  - Cost benchmarking and value engineering: applying unit cost databases (BCIS, Spons, bespoke utility benchmarks), developing cost models for regulatory submissions, and facilitating value engineering workshops that challenge scope and specification without compromising outcomes
  - Supply chain management: advising on supply chain segmentation (strategic, preferred, approved), supply chain development programmes, long-term volume commitments, and the commercial structures that improve supply chain performance and reduce adversarial behaviour
  - Regulatory commercial efficiency: understanding how Ofwat assesses procurement efficiency at price reviews; structuring procurement evidence to demonstrate benchmark cost performance, competitive tension, and innovation; advising on the commercial implications of Ofwat's DPC (Direct Procurement for Customers) regime

  BENCHMARKS:
  - Water industry alliance contracts (e.g. Anglian @one, Northumbrian Water Capital Delivery): typically achieve 5–10% efficiency improvement against framework rates over a 5-year AMP period through collaborative working, design standardisation, and supply chain development
  - NEC Option C target cost incentive: industry experience suggests that well-structured target cost contracts with appropriate pain/gain mechanisms (typically 50/50 split within a ±10% band) deliver outturn costs 3–8% below the target; poorly structured targets with insufficient client risk allocation revert to cost-plus behaviour
  - Competitive tender savings: re-tendering frameworks on a 3–5 year cycle typically recovers 5–12% on unit rates compared to allowing incumbents to drift without competitive challenge; the savings are highest on labour-intensive activities where productivity benchmarking is possible
  - NEC compensation event assessment: under Clause 63, the project manager assesses the CE using the Shorter Schedule of Cost Components (SSCC); disputes about CE quantum are among the most common sources of commercial disagreement on NEC contracts, particularly on Options A and B where the contractor's defined cost records may be limited
  - Supply chain tier 1 contractor overhead and profit margins in the water sector typically run at 10–15% on subcontract work; reducing this through direct supply chain engagement (tier 2 direct awards with tier 1 management) can save 3–7% on targeted categories
  - Ofwat totex benchmarking: companies that demonstrate procurement savings of more than 5% against the Ofwat modelled baseline in their price review submissions retain 50% of that saving through the sharing mechanism; companies that fail to provide procurement evidence face efficiency challenges that reduce their totex allowance

  RED FLAGS:
  - NEC Option C target cost set without a robust open-book cost estimate — a target established by the client without contractor input, or by the contractor without challenge, is almost always wrong; the pain/gain mechanism only works if the target is credible
  - Framework call-off without competitive tension at the task order level — frameworks that award all work to a single contractor at framework rates without mini-competition create no incentive for cost reduction or performance improvement
  - Alliance governance structure with no mechanism for resolving disputes between alliance partners — alliances without a dispute escalation process below adjudication tend to accumulate unresolved commercial tensions that eventually cause the alliance to fracture
  - Commercial benchmarking data older than 3 years used in a regulatory submission without index-linking — Ofwat's benchmarking models use current-year cost data; historical benchmarks without appropriate inflation adjustment are rejected as inaccurate
  - NEC contracts where the project manager role is performed by the contractor's commercial manager — the NEC PM must be independent of the contractor; where the client has not appointed a competent project manager, the contract administration is effectively in the contractor's control
  - Value engineering exercise conducted after detailed design is complete — VE is most valuable at Stage 2–3 where scope and specification changes cost relatively little to implement; VE at Stage 4 or during construction generates value-eroding rework and delay
