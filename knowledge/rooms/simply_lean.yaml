id: simply_lean
name: Lean Manufacturing
description: Continuous improvement experts combining Lean principles with real-world operational perspective — for any industry
pillar: strategy_advisory
project_context:
  - key: location
    label: Location / Region
    options:
      - ""
      - UK & Ireland
      - Europe
      - North America
      - Asia-Pacific
      - Middle East & Africa
      - Latin America
      - Global / International
  - key: industry
    label: Industry / Sector
    options:
      - ""
      - Manufacturing
      - Healthcare
      - Logistics & Distribution
      - Food & Beverage
      - Professional Services
      - Retail
      - Construction
      - Other
  - key: org_size
    label: Organisation Size
    options:
      - ""
      - Under 20 staff
      - 20–100 staff
      - 100–500 staff
      - 500+ staff
  - key: lean_maturity
    label: Lean Maturity
    options:
      - ""
      - New to Lean — no prior experience
      - Some CI activity — early stages
      - Established improvement programme
      - Mature Lean — advanced practitioners
  - key: primary_challenge
    label: Primary Challenge
    options:
      - ""
      - Waste reduction and process efficiency
      - Lead time and throughput improvement
      - Quality and defect reduction
      - Cost reduction and profitability
      - Culture change and people engagement
      - Production scheduling and capacity
routing_triggers: |
  - SAFETY / HAZARDOUS SUBSTANCES / REGULATORY COMPLIANCE: Any question involving workplace safety, hazardous substances, safety-critical environments, or regulatory compliance requirements must include the Safety Manager specialist as a primary selection, not a secondary addition.
  - SUPPLY CHAIN / PULL SYSTEMS / INVENTORY: Any question involving pull systems, Kanban, replenishment signals, inventory positioning, or supplier integration must include the Supply Chain Strategist specialist.
  - CULTURE / CHANGE / ADOPTION: Any question involving organisational resistance, management engagement, transformation stall, or behavioural change must include the Change Management Specialist.
personas:
  - lean_sensei
  - ops_mgr
  - change_mgmt
  - process_eng
  - biz_analyst
  - sc_strategist
  - ci_coach
