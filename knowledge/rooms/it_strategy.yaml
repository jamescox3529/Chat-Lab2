id: it_strategy
name: IT Strategy & Architecture
description: Expert panel covering IT strategy, enterprise architecture, cloud, vendor management, IT governance, and the leadership of technology functions
pillar: digital_technology
project_context:
  - key: location
    label: Location / Region
    options:
      - ""
      - UK & Ireland
      - Europe
      - North America
      - Asia-Pacific
      - Middle East & Africa
      - Latin America
      - Global / International
  - key: org_size
    label: Organisation Size
    options:
      - ""
      - Under 50 staff
      - 50–250 staff
      - 250–1000 staff
      - 1000–5000 staff
      - 5000+ staff
  - key: current_environment
    label: Current IT Environment
    options:
      - ""
      - Legacy-heavy — on-premise, mixed old systems
      - Transitioning — active cloud migration
