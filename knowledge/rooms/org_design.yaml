id: org_design
name: Organisational Design
description: Expert panel covering organisational structure, operating models, culture, process design, and integration for businesses going through structural change
pillar: people_organisation
project_context:
  - key: location
    label: Location / Region
    options:
      - ""
      - UK & Ireland
      - Europe
      - North America
      - Asia-Pacific
      - Middle East & Africa
      - Latin America
      - Global / International
  - key: org_size
